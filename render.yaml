services:
  - type: web
    name: bnb-turnkey-qc
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      # ── AI scoring engine (live config: Claude Haiku) ──
      - key: AI_ENGINE
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false
      # ── Single-credential admin gate (Jul 24) — NOT full multi-user auth.
      # ADMIN_PASSWORD: the one shared credential that unlocks mutating actions.
      # AUTH_SECRET: random signing key for admin session tokens — pick a long
      # random string, keep it secret, changing it instantly invalidates all
      # existing admin sessions (a built-in "log everyone out" switch).
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      # Token pricing per MILLION tokens — drives the in-app cost figure.
      # Defaults match Claude Haiku 4.5 list rates ($1 in / $5 out).
      # UPDATE THESE IF CLAUDE_MODEL CHANGES, or the cost display will be wrong.
      #   Haiku 4.5 = 1 / 5   ·   Sonnet 5 = 3 / 15   ·   Opus 4.8 = 5 / 25
      - key: PRICE_INPUT_PER_MTOK
        value: "1"
      - key: PRICE_OUTPUT_PER_MTOK
        value: "5"
      # ── Trainer voice (ElevenLabs) — team-wide TTS ──
      - key: ELEVENLABS_API_KEY
        sync: false
      # ── Slack daily digest → #qc-bot-reports-digest ──
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_DIGEST_CHANNEL
        value: C0BHVR3777C
      - key: SLACK_DIGEST_MENTION
        value: channel
      # Optional: activity pings ("someone's using the bot"). Set the channel ID to
      # turn it on; leave blank to keep it off. Throttled to 1 ping / visitor / N min.
      - key: SLACK_ACTIVITY_CHANNEL
        sync: false
      - key: SLACK_ACTIVITY_THROTTLE_MIN
        value: "20"
      # Set to "true" for real-time "someone's active" pings; default is the daily summary only.
      - key: SLACK_ACTIVITY_REALTIME
        value: "false"
      # Optional incoming-webhook fallback (used only if SLACK_BOT_TOKEN is unset)
      - key: SLACK_WEBHOOK_URL
        sync: false
      # Public base URL for deep links inside the Slack digest
      - key: PUBLIC_BASE_URL
        value: https://bnb-turnkey-qc.onrender.com
      # ── Database (Supabase Postgres connection string) ──
      - key: DATABASE_URL
        sync: false
      # ── Webhook auth key (validates incoming Aloware/Fathom calls) ──
      - key: WEBHOOK_SECRET_KEY
        sync: false
      - key: DAILY_BUDGET_USD
        value: "0"
      # ── Optional Gemini fallback (only used if AI_ENGINE=gemini) ──
      - key: GEMINI_API_KEY
        sync: false

services:
  - type: web
    name: bnb-turnkey-qc
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_ENGINE
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: WEBHOOK_SECRET_KEY
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "0"

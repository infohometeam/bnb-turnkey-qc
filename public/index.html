<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BNB Turnkey QC — The Rise Collective</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--f:'Outfit',sans-serif;--m:'IBM Plex Mono',monospace;--bg:#12161f;--card:#1a1f2b;--border:#2a3140;--t1:#eef1f6;--t2:#aab4c5;--t3:#6b7686;--t4:#55606f;--t5:#2a3140;--accent:#7c83ff;
/* ── P1 semantic tokens (Design Lab, Jul 20) — additive only, no visual change. Passes P2+ migrate inline hex onto these. ── */
/* Spacing scale (dashboard density 4→48) */
--s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;
/* Radii (match existing: btn 8, card 14) */
--r-sm:6px;--r-md:8px;--r-lg:14px;
/* Typography scale + rhythm */
--fs1:12px;--fs2:14px;--fs3:16px;--fs4:18px;--fs5:24px;--fs6:32px;--lh:1.5;
/* Status semantics (fg + paired bg) — mirror sClr()/stClr() */
--pos:#34d399;--pos-bg:#052e16;--neg:#ef4444;--neg-bg:#2a0a0a;--warn:#fbbf24;--warn-bg:#2a1a00;--info:#60a5fa;--info-bg:#14224a;
/* Action accent (captures the live #6366f1 button drift so it can be reconciled with --accent later) */
--accent-solid:#6366f1;--accent-solid-h:#4f46e5;
/* Interaction */
--focus:#818cf8;--dur:.18s;--z-dropdown:20;--z-modal:100;--z-toast:1000}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh}
#root{display:flex;min-height:100vh;width:100%}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a3140;border-radius:3px}
button{font-family:var(--f)}input,select{font-family:var(--f)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px}
.stat-card{padding:16px 20px}.stat-label{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:var(--m)}.stat-value{font-size:26px;font-weight:900;font-family:var(--m)}.stat-sub{font-size:10px;color:var(--t4);margin-top:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;font-family:var(--m);letter-spacing:.5px}
.section-head{font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:1px;font-family:var(--m);margin-bottom:16px}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}.btn:hover{background:#2a3140;color:var(--t1)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#6366f1;border-color:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-green{background:#052e16;border-color:#166534;color:#22c55e}.btn-red{background:#2a0a0a;border-color:#991b1b;color:#ef4444}.btn-sm{padding:4px 10px;font-size:10px}
.grid{display:grid;gap:16px}.grid-stats{grid-template-columns:repeat(auto-fit,minmax(155px,1fr))}
.flex-col{display:flex;flex-direction:column}.gap-24{gap:24px}.gap-20{gap:20px}.gap-18{gap:18px}.gap-16{gap:16px}.gap-12{gap:12px}.gap-10{gap:10px}.gap-8{gap:8px}.gap-6{gap:6px}
aside{width:220px;flex-shrink:0;background:#050910;border-right:1px solid #2a3140;display:flex;flex-direction:column}
nav button{display:flex;align-items:center;gap:11px;width:100%;padding:9px 14px;background:transparent;border:none;border-radius:8px;cursor:pointer;color:var(--t4);font-size:12px;font-weight:500;transition:background var(--dur) ease,color var(--dur) ease,transform var(--dur) ease,box-shadow var(--dur) ease;border-left:3px solid transparent;text-align:left}
nav button:hover{background:rgba(255,255,255,.05);color:var(--t2);transform:translateX(2px)}
nav button:hover .nav-ico{color:var(--t2)}
nav button.active{font-weight:800;border-left-color:currentColor;box-shadow:0 0 16px -6px currentColor,inset 0 0 0 1px rgba(255,255,255,.05)}
nav button.active .nav-ico{filter:drop-shadow(0 0 5px currentColor)}
main{flex:1;overflow:auto;padding:28px 32px}.max-w{max-width:min(1600px,94vw);margin:0 auto}
select,input[type=date]{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--t1);font-size:11px;cursor:pointer}
.period-toggle{display:flex;gap:2px;background:var(--card);border-radius:8px;padding:3px;border:1px solid var(--border)}
.period-toggle button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--f);background:transparent;color:var(--t3)}
.period-toggle button.active{background:#1e293b;color:var(--t1)}
.tab-btn{padding:9px 16px;border-radius:10px;border:2px solid var(--border);cursor:pointer;background:transparent;color:var(--t3);font-size:12px;font-weight:600;transition:all .2s}
.tab-btn.active{color:#fff;font-weight:800}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:var(--z-modal)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:500px;width:90%}
.modal label{display:block;font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:600}
.modal input,.modal select{width:100%;margin-bottom:14px;padding:8px 12px}
@media(max-width:768px){aside{display:none}main{padding:16px}.grid-stats{grid-template-columns:repeat(2,1fr)}}
.manual-body{font-size:14px;line-height:1.75;color:var(--t2)}
.manual-body h2{font-size:19px;font-weight:800;color:var(--t1);margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid #1e293b}
.manual-body h2:first-child{margin-top:0}
.manual-body h3{font-size:15px;font-weight:700;color:var(--t2);margin:22px 0 8px}
.manual-body h4{font-size:13px;font-weight:700;color:#a5b4fc;margin:18px 0 6px}
.manual-body p{margin:10px 0}
.manual-body ul{margin:10px 0;padding-left:22px}
.manual-body li{margin:6px 0}
.manual-body b,.manual-body strong{color:var(--t1)}
.rep-card{break-inside:avoid}
@media print{
  aside,.no-print,.tab-btn{display:none!important}
  main{margin:0!important}
  body,:root{--bg:#fff!important;--card:#fff!important}
  .report-sheet,.report-sheet *{color:#111!important}
  .card{border:1px solid #ddd!important;box-shadow:none!important;background:#fff!important}
  .report-sheet .stat-value{color:#111!important}
}
/* ── P2.5 grey-scale unification (Design Lab, Jul 20): near-duplicate slate greys migrated onto --t1/--t2/--t3/--t4/--bg/--card. Print scorecard, rep palette, #374151 faint text left as-is. ── */
/* ── P2 accessibility (Design Lab, Jul 20) — global, consumes --focus/--dur from P1 ── */
/* Kill the default focus outline only when a mouse is used; show a clear ring for keyboard nav */
:focus{outline:none}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--focus);outline-offset:2px;border-radius:var(--r-sm)}
/* Standardise interactive transitions on the P1 duration token (was ad-hoc .15s/.2s) */
.btn,.tab-btn,.period-toggle button,nav button{transition:background var(--dur) ease,color var(--dur) ease,border-color var(--dur) ease}
/* Respect the OS "reduce motion" setting — neutralise transitions + animations, incl. skeleton shimmer */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}
/* Decorative emoji/glyph icons shouldn't be announced by screen readers */
.nav-ico{speak:none}
/* ── Call Detail two-pane (Design Lab, Jul 22): sticky score rail + tabbed pane ── */
.cd-grid{display:grid;grid-template-columns:420px minmax(0,1fr);gap:20px;align-items:stretch;justify-items:stretch}
.cd-rail{width:100%;box-sizing:border-box;background:#10141d;border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px;min-width:0}
@media(max-width:1200px){.cd-grid{grid-template-columns:320px minmax(0,1fr)}}
@media(max-width:1000px){.cd-grid{grid-template-columns:1fr}.cd-rail{position:static}}
/* ── P3 loading/error states (Design Lab, Jul 20) ── */
@keyframes sksh{0%{background-position:-300px 0}100%{background-position:300px 0}}
.sk{background:linear-gradient(90deg,var(--card) 0%,var(--border) 40%,var(--card) 80%);background-size:600px 100%;animation:sksh 1.3s infinite linear;border-radius:var(--r-sm)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
/* ── P5 data tables (Design Lab, Jul 21) ── */
.stat-value,table td,table th,.badge{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
table tbody tr{transition:background var(--dur) ease}
table tbody tr:hover{background:rgba(255,255,255,.035)}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--t2)!important}
th .sort-caret{opacity:.9;margin-left:4px;font-size:9px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const API="/api";
// Fire-and-forget activity beacon. A stable per-browser id lets the server collapse
// a session's clicks into one Slack ping. No-op server-side unless the activity
// channel is configured. Never blocks or surfaces errors to the user.
function qcVisitorId(){try{let v=localStorage.getItem("qc_visitor");if(!v){v=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("qc_visitor",v);}return v;}catch(e){return "anon";}}
function pingActivity(page){try{fetch(`${API}/activity/visit`,{method:"POST",headers:{"Content-Type":"application/json"},keepalive:true,body:JSON.stringify({page,visitorId:qcVisitorId()})}).catch(()=>{});}catch(e){}}
function useApi(p,deps=[]){const[d,setD]=useState(null);const[l,setL]=useState(true);const[err,setErr]=useState(null);const reload=useCallback(()=>{setL(true);setErr(null);fetch(API+p).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}).then(x=>{setD(x);setErr(null)}).catch(e=>{console.error("useApi",p,e);setErr(e)}).finally(()=>setL(false))},[p]);useEffect(()=>{reload()},[reload,...deps]);return{data:d,loading:l,error:err,reload}}
async function postApi(p,b){return fetch(API+p,{method:"POST",headers:{"Content-Type":"application/json"},body:b?JSON.stringify(b):undefined}).then(r=>r.json())}
async function patchApi(p,b){return fetch(API+p,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}).then(r=>r.json())}
async function deleteApi(p){return fetch(API+p,{method:"DELETE"}).then(r=>r.json())}
// ── P3 shared async-state UI ──
function Skel({rows=5,pad=40}){return<div className="card" style={{padding:pad}} aria-busy="true"><span className="sr-only">Loading…</span><div className="flex-col" style={{gap:12}}><div className="sk" style={{height:18,width:"38%",marginBottom:6}}/>{Array.from({length:rows}).map((_,i)=><div key={i} className="sk" style={{height:12,width:[92,78,85,66,73,80][i%6]+"%"}}/>)}</div></div>}
function SkelStats({n=5}){return<div className="grid grid-stats" aria-busy="true"><span className="sr-only">Loading…</span>{Array.from({length:n}).map((_,i)=><div key={i} className="card" style={{padding:"18px 20px"}}><div className="sk" style={{height:10,width:"55%",marginBottom:14}}/><div className="sk" style={{height:26,width:"40%"}}/></div>)}</div>}
// ── P3+ persisted state + error boundary (Design Lab, Jul 20) ──
function usePersisted(key,initial){const[v,setV]=useState(()=>{try{const s=localStorage.getItem("qc:"+key);return s!==null?JSON.parse(s):initial}catch(e){return initial}});useEffect(()=>{try{localStorage.setItem("qc:"+key,JSON.stringify(v))}catch(e){}},[key,v]);return[v,setV]}
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null}}
  static getDerivedStateFromError(err){return{err}}
  componentDidCatch(err,info){console.error("ErrorBoundary",this.props.tag||"",err,info)}
  componentDidUpdate(prev){if(prev.resetKey!==this.props.resetKey&&this.state.err)this.setState({err:null})}
  render(){if(this.state.err){return React.createElement("div",{className:"card",style:{padding:"48px 40px",textAlign:"center",margin:"40px auto",maxWidth:520},role:"alert"},
    React.createElement("svg",{width:38,height:38,viewBox:"0 0 24 24",fill:"none",stroke:"var(--warn)",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style:{marginBottom:14}},React.createElement("path",{d:"M12 3l9 17H3z"}),React.createElement("line",{x1:12,y1:9,x2:12,y2:14}),React.createElement("circle",{cx:12,cy:17.5,r:.6,fill:"var(--warn)"})),
    React.createElement("div",{style:{fontSize:16,fontWeight:800,color:"var(--t1)",marginBottom:6}},"This screen hit an error"),
    React.createElement("div",{style:{fontSize:12.5,color:"var(--t3)",lineHeight:1.6,marginBottom:20}},"The rest of the app is fine — only this view crashed. Reload it, or switch tabs and come back."),
    React.createElement("button",{className:"btn",onClick:()=>this.setState({err:null})},"Reload this screen"))}
    return this.props.children}}
function Sparkline({data,width=104,height=28,color="var(--accent-solid)"}){const vals=(data||[]).map(d=>Number(d.avg_score!=null?d.avg_score:d.avg_adj)).filter(v=>!isNaN(v));if(vals.length<2)return null;const mn=Math.min(...vals),mx=Math.max(...vals),rng=(mx-mn)||1;const pts=vals.map((v,i)=>[(i/(vals.length-1))*width,height-((v-mn)/rng)*(height-4)-2]);const d="M"+pts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L");const last=pts[pts.length-1];return React.createElement("svg",{width,height,style:{display:"block",overflow:"visible"},"aria-hidden":"true"},React.createElement("path",{d,fill:"none",stroke:color,strokeWidth:1.75,strokeLinecap:"round",strokeLinejoin:"round"}),React.createElement("circle",{cx:last[0],cy:last[1],r:2.4,fill:color}));}
function PageError({onRetry,msg}){return<div className="card" style={{padding:"44px 40px",textAlign:"center"}} role="alert"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:12}}><path d="M12 3l9 17H3z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17.5" r=".6" fill="var(--warn)"/></svg><div style={{fontSize:15,fontWeight:800,color:"var(--t1)",marginBottom:5}}>Couldn't load this data</div><div style={{fontSize:12.5,color:"var(--t3)",lineHeight:1.6,maxWidth:340,margin:"0 auto 18px"}}>{msg||"The request failed — the server likely hiccuped. Nothing was lost; this view is showing no numbers rather than wrong ones."}</div>{onRetry&&<button className="btn" onClick={onRetry}>Retry</button>}</div>}
const TZ="America/New_York";
function toUTC(d){if(!d)return null;const s=String(d);return new Date(s.includes('Z')||s.includes('+')?s:s.replace(' ','T')+'Z');}
const fmt=d=>{const dt=toUTC(d);return dt?dt.toLocaleDateString("en-US",{month:"short",day:"numeric",timeZone:TZ}):"—"};
const fmtF=d=>{const dt=toUTC(d);return dt?dt.toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",timeZone:TZ,timeZoneName:"short"}):"—"};
const fmtD=s=>{if(!s&&s!==0)return"—";s=Number(s);if(!isFinite(s))return"—";const m=Math.floor(s/60);return`${m}m ${String(Math.round(s%60)).padStart(2,"0")}s`};
const sClr=s=>{if(s==null)return"var(--t4)";if(s>=8)return"#34d399";if(s>=6)return"#fbbf24";return"#ef4444"};
const stClr=s=>({SCORED:["#052e16","#22c55e","#166534"],NEW:["#14224a","#60a5fa","#1e40af"],REQC:["#1a0c3d","#a78bfa","#5b21b6"],ERROR:["#2a0a0a","#ef4444","#991b1b"],WAIT_RETRY_FULL:["#2a1a00","#f59e0b","#92400e"],WAIT_TRANSCRIPT:["#2a1a00","#f59e0b","#92400e"]}[s]||["#14224a","#60a5fa","#1e40af"]);
const RC_BASE={"Matt":"#6366f1","Kevin":"#8b5cf6","Andrew":"#06b6d4","Steven":"#10b981","Anurag":"#f59e0b"};
// DB stores full names ("Andrew Cluney") but the map is keyed by first name — match on either,
// then fall back to a stable hash so EVERY rep gets a colour, not grey.
const PALETTE=["#6366f1","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ec4899","#14b8a6","#f43f5e","#a855f7","#22c55e"];
function repColor(name){
  if(!name)return "#334155";
  if(RC_BASE[name])return RC_BASE[name];
  const first=String(name).split(" ")[0];
  if(RC_BASE[first])return RC_BASE[first];
  let h=0; for(let i=0;i<String(name).length;i++)h=(h*31+String(name).charCodeAt(i))>>>0;
  return PALETTE[h%PALETTE.length];
}
const RC=new Proxy({},{get:(_,k)=>repColor(String(k))});
const CATS=["discovery","qualification","pitch","frame_control","objections_close","objections","close_next_step"];
const CL={discovery:"Discovery",qualification:"Qualification",pitch:"Pitch",frame_control:"Frame / Control",objections_close:"Objections & Close",objections:"Objections",close_next_step:"Close / Next Step"};
// Only show categories that actually have scores on the current call
function activeCategories(catScores){return CATS.filter(c=>catScores&&catScores[c]!=null);}
const TEAM_NAMES=new Set(["matt","kevin","andrew","steven","anurag","sam","francis","agent","rep"]);
const RECORD_LABELS={SKIP_VOICEMAIL:"Voicemail",SKIP_SHORT:"Too Short",SKIP_RESCHEDULE:"Reschedule",SKIP_FOLLOWUP:"Follow-up",SKIP_WRONG_NUMBER:"Wrong Number",SKIP_INTERNAL:"Internal"};
const RECORD_ICON={SKIP_VOICEMAIL:"voicemail",SKIP_SHORT:"ruler",SKIP_RESCHEDULE:"calendar",SKIP_FOLLOWUP:"refresh",SKIP_WRONG_NUMBER:"x",SKIP_INTERNAL:"building"};

function Badge({status}){const[bg,fg,bd]=stClr(status);return<span className="badge" style={{background:bg,color:fg,border:`1px solid ${bd}`}}>{status}</span>}
function ScorecardPicker({days,preset,from,to}){
  const{data:reps}=useApi("/reps");
  const[rep,setRep]=useState("");
  const[sel,setSel]=useState(new Set());
  const[withTx,setWithTx]=useState(false);
  const[busy,setBusy]=useState(false);
  const q=rep?`&rep=${encodeURIComponent(rep)}`:"";
  // Honour the Reports date window so you can build e.g. "Anurag, yesterday" —
  // then still hand-pick which of those calls go in the PDF.
  const dq=(from||to)?`${from?`&from=${from}`:""}${to?`&to=${to}`:""}`
          :preset==="today"?"&period=day"
          :preset==="yesterday"?"&period=yesterday"
          :days>=90?"" : days>=30?"&period=month" : "&period=week";
  const{data}=useApi(`/calls?status=SCORED&limit=200${q}${dq}`,[rep,days,preset,from,to]);
  const calls=data?.calls||[];
  // Reset selection when the window changes — otherwise you could silently export
  // a call that's no longer in the visible list.
  React.useEffect(()=>{setSel(new Set());},[rep,days,preset,from,to]);

  function toggle(id){setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  async function generate(){
    if(!sel.size){alert("Select at least one call.");return;}
    setBusy(true);
    try{
      // Fetch each selected call in full (list rows don't include transcript/coaching)
      const full=await Promise.all([...sel].map(id=>fetch(API+`/calls/${id}`).then(r=>r.json())));
      printScorecards(full,withTx,`Scorecards — ${rep||"All reps"}`);
    }catch(e){alert("Could not build scorecards.");}
    setBusy(false);
  }

  return<div className="flex-col gap-16">
    <div className="card" style={{padding:18}}>
      <div className="section-head" style={{marginBottom:6}}>Build Scorecards</div>
      <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>Pick a rep, select the calls you want, and generate a printable PDF of their scorecards — ideal for a 1:1.</div>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <select value={rep} onChange={e=>{setRep(e.target.value);setSel(new Set());}} style={{padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13}}>
          <option value="">All reps</option>
          {(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
        </select>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--t2)",cursor:"pointer"}}>
          <input type="checkbox" checked={withTx} onChange={e=>setWithTx(e.target.checked)}/> include transcripts
        </label>
        <div style={{flex:1}}/>
        <button className="btn" onClick={()=>setSel(new Set(calls.map(c=>c.id)))} style={{fontSize:12}}>Select all</button>
        <button className="btn" onClick={()=>setSel(new Set())} style={{fontSize:12}}>Clear</button>
        <button className="btn btn-primary" onClick={generate} disabled={busy||!sel.size} style={{fontSize:12}}>{busy?"Building…":`⎙ Generate ${sel.size||""} Scorecard${sel.size===1?"":"s"}`}</button>
      </div>
    </div>

  return<div className="flex-col gap-20"><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}><div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Calls</h2><p style={{fontSize:12,color:"var(--t3)",marginTop:4}}>{searchResults?`${displayTotal} results for "${searchResults.query}"`:isFiltered&&allCalls?.total!=null?<span><b style={{color:"var(--t1)"}}>{displayTotal}</b> of {allCalls.total} calls <span style={{color:"var(--warn)"}}>· filtered</span></span>:`${displayTotal} calls`}</p></div><div className="flex-col gap-8"><div style={{display:"flex",gap:6,alignItems:"center"}}><input type="text" value={sq} onChange={e=>sSq(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="Search transcripts..." style={{minWidth:200,background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,padding:"6px 12px",color:"var(--t1)",fontSize:11}}/><button className="btn btn-primary btn-sm" onClick={doSearch} disabled={searching}>{searching?"...":"🔍"}</button>{searchResults&&<button className="btn btn-sm" onClick={clearSearch}>✕ Clear</button>}</div><DateFilter period={p} setPeriod={sP} from={f} setFrom={sF} to={t} setTo={sT}/><div style={{display:"flex",gap:8,flexWrap:"wrap"}}><select value={sf} onChange={e=>{sSf(e.target.value);sPg(0)}}><option value="ALL">All Status</option>{["SCORED","NEW","REQC","ERROR","WAIT_RETRY_FULL","WAIT_TRANSCRIPT"].map(s=><option key={s}>{s}</option>)}</select><select value={rf} onChange={e=>{sRf(e.target.value);sPg(0)}}><option value="ALL">All Reps</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select>{isFiltered&&<button className="btn btn-sm" onClick={clearFilters} style={{background:"var(--warn-bg)",color:"var(--warn)",border:"1px solid var(--warn)"}} aria-label="Clear all filters"><Icon name="x" size={12} style={{marginRight:4,verticalAlign:"-2px"}}/>Clear filters</button>}<button className="btn btn-sm" onClick={()=>{reload();setSel(new Set());clearSearch()}}>↻</button>{sel.size>0&&<button className="btn btn-sm" style={{background:"#1e1b4b",color:"#a5b4fc",border:"1px solid #4338ca"}} onClick={bulkRescore}>↻ Re-score {sel.size}</button>}{sel.size>0&&<button className="btn btn-red btn-sm" onClick={bulkDel} disabled={del}>🗑 {sel.size}</button>}</div></div></div>

          <span onClick={()=>setDens("comfortable")} style={{padding:"4px 9px",borderRadius:5,cursor:"pointer",background:dens==="comfortable"?"#6366f133":"transparent",color:dens==="comfortable"?"#a5b4fc":"var(--t3)",fontWeight:dens==="comfortable"?700:500}}>▬ Comfortable</span>
          <span onClick={()=>setDens("compact")} style={{padding:"4px 9px",borderRadius:5,cursor:"pointer",background:dens==="compact"?"#6366f133":"transparent",color:dens==="compact"?"#a5b4fc":"var(--t3)",fontWeight:dens==="compact"?700:500}}>≡ Compact</span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:RG,gap:12,alignItems:"center",padding:"9px 18px",borderBottom:"1px solid var(--border)",background:"var(--bg)"}}>
        <span></span>{th("overall_score_adj","Score","center")}{th("rep_name","Rep → Client")}{th("status","Status")}{th("agent_talk_pct","Talk","right")}{th("call_duration_sec","Dur","right")}{th("received_at","Date","right")}<span></span>
      </div>
      <div style={{maxHeight:"calc(100vh - 320px)",minHeight:380,overflowY:"auto"}}>{sortRows(displayCalls).map(c=><div key={c.id} onClick={()=>onSelect(c)} style={{display:"grid",gridTemplateColumns:RG,gap:12,alignItems:"center",padding:dens==="compact"?"8px 18px":"13px 18px",cursor:"pointer",borderBottom:"1px solid var(--bg)",background:sel.has(c.id)?"#2a3140":c.flagged?"rgba(245,158,11,.03)":"transparent"}}>
        <input type="checkbox" checked={sel.has(c.id)} onChange={()=>{const s=new Set(sel);s.has(c.id)?s.delete(c.id):s.add(c.id);setSel(s)}} onClick={e=>e.stopPropagation()} style={{accentColor:"#6366f1",width:15,height:15}}/>
        <span style={{fontFamily:"var(--m)",fontWeight:900,fontSize:13,borderRadius:7,padding:"4px 0",textAlign:"center",background:sClr(c.overall_score_adj)+"22",color:sClr(c.overall_score_adj)}}>{c.overall_score_adj??"—"}</span>
        <div style={{minWidth:0}}>
          <div style={{fontSize:dens==="compact"?13:14,fontWeight:700,color:"var(--t1)",display:"flex",alignItems:"center",gap:7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            <span style={{fontFamily:"var(--m)",fontSize:11,color:"#818cf8",flexShrink:0}}>#{c.id}</span>
            <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{c.rep_name} → {c.client_name||"?"}</span>
            {c.flagged&&<span style={{color:"#f59e0b",fontSize:10,flexShrink:0}}>⚠</span>}
          </div>
          {(c.stitch_status==="MERGED"||(c.tags||[]).some(t=>t.status!=="DISMISSED"))&&
          <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",margin:"4px 0 3px"}}>
            {c.stitch_status==="MERGED"&&<span title={`Stitched from calls ${c.stitched_from_ids||""} — a dropped call and its redial merged into one`} style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:20,background:"#0f2e2b",border:"1px solid #2dd4bf",color:"#2dd4bf"}}>🔗 STITCHED</span>}
            {(c.tags||[]).filter(t=>t.status!=="DISMISSED").map(t=><span key={t.tag_key} title={t.status==="SUGGESTED"?"Suggested — not yet confirmed, no effect on the average":t.excludes_from_average?"Not counted in this rep's average":"Counts normally"}
              style={{fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:20,background:t.status==="SUGGESTED"?"transparent":t.color+"22",border:`1px ${t.status==="SUGGESTED"?"dashed":"solid"} ${t.color}`,color:t.color}}>
              {t.excludes_from_average&&t.status==="CONFIRMED"?"⊘ ":""}{t.label}
            </span>)}
          </div>}
          {dens!=="compact"&&<div style={{fontSize:12.5,color:"var(--t2)",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden",marginTop:2}}>{c.list_summary||c.quick_summary||c.source}</div>}
        </div>
        <span><Badge status={c.status}/></span>
        <span style={{fontFamily:"var(--m)",fontSize:12,textAlign:"right",color:c.agent_talk_pct>70?"#ef4444":"var(--t3)"}}>{c.agent_talk_pct!=null?c.agent_talk_pct+"%":"—"}</span>
        <span style={{fontFamily:"var(--m)",fontSize:12,textAlign:"right",color:"var(--t3)"}}>{fmtD(c.call_duration_sec)}</span>
        <span style={{fontFamily:"var(--m)",fontSize:11,textAlign:"right",color:"var(--t4)"}}>{fmt(c.received_at)}</span>
        <span style={{color:"#818cf8",textAlign:"center"}}>→</span>
      </div>)}{!displayCalls.length&&<div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>{searchResults?"No results found":"No calls match those filters"}</div>}</div></div>
    {tp>1&&<div style={{display:"flex",justifyContent:"center",gap:6,alignItems:"center"}}><button className="btn btn-sm" disabled={pg===0} onClick={()=>sPg(x=>x-1)}>← Prev</button><span style={{fontSize:11,color:"var(--t4)",fontFamily:"var(--m)"}}>{pg+1}/{tp}</span><button className="btn btn-sm" disabled={pg>=tp-1} onClick={()=>sPg(x=>x+1)}>Next →</button></div>}
  </div>}

function CallComments({callId}){
  const[comments,setComments]=useState([]);
  const[author,setAuthor]=useState("");
  const[body,setBody]=useState("");
  const[type,setType]=useState("note");
  const[busy,setBusy]=useState(false);
  const{data:reps}=useApi("/reps");
  function load(){fetch(`${API}/calls/${callId}/comments`).then(r=>r.json()).then(d=>setComments(d.comments||[])).catch(()=>setComments([]))}
  React.useEffect(()=>{load()},[callId]);
  async function submit(){
    if(!author||!body.trim())return;setBusy(true);
    const rep=(reps||[]).find(r=>r.name===author);
    await fetch(`${API}/calls/${callId}/comments`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({author,author_role:rep?.role||"",body:body.trim(),comment_type:type})});
    setBody("");setBusy(false);load();
  }
  async function del(id){if(!(await qcConfirm({title:"Delete comment?",message:"This comment will be removed permanently.",confirmLabel:"Delete",danger:true})))return;await fetch(`${API}/comments/${id}`,{method:"DELETE"});load();}
  const typeColors={note:"#64748b",praise:"#22c55e",coaching:"#f59e0b",question:"#60a5fa"};
  return<div className="card" style={{padding:24}}>
    <div className="section-head">Team Notes {comments.length>0&&<span style={{color:"#4338ca"}}>· {comments.length}</span>}</div>
    <p style={{fontSize:11,color:"var(--t3)",marginTop:-10,marginBottom:16}}>Share feedback on this call — your own or a teammate's. Everyone on the team can see and add notes.</p>
    <div className="flex-col gap-10" style={{marginBottom:18}}>
      {comments.length===0&&<div style={{fontSize:12,color:"#374151",fontStyle:"italic"}}>No notes yet. Be the first to weigh in.</div>}
      {comments.map(cm=><div key={cm.id} style={{padding:"12px 14px",background:"var(--bg)",borderRadius:10,border:"1px solid #2a3140"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>{cm.author}</span>
            {cm.author_role&&<span style={{fontSize:10,color:"#374151"}}>{cm.author_role}</span>}
            <span className="badge" style={{background:(typeColors[cm.comment_type]||"#64748b")+"22",color:typeColors[cm.comment_type]||"#64748b",border:`1px solid ${typeColors[cm.comment_type]||"#64748b"}44`,fontSize:8}}>{cm.comment_type}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:10,color:"#374151"}}>{cm.created_at}</span><span onClick={()=>del(cm.id)} style={{fontSize:11,color:"#374151",cursor:"pointer"}}>✕</span></div>
        </div>
        <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{cm.body}</div>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
      <select value={author} onChange={e=>setAuthor(e.target.value)} style={{padding:"7px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}><option value="">You are…</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select>
      <select value={type} onChange={e=>setType(e.target.value)} style={{padding:"7px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}><option value="note">Note</option><option value="praise">Praise</option><option value="coaching">Coaching</option><option value="question">Question</option></select>
    </div>
    <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="Add a note about this call…" rows={2} style={{width:"100%",padding:"10px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--t1)",fontSize:13,resize:"vertical",fontFamily:"inherit"}}/>
    <button className="btn btn-primary" onClick={submit} disabled={busy||!author||!body.trim()} style={{marginTop:8}}>{busy?"Posting…":"Post Note"}</button>
  </div>
}

const GM_CATEGORIES=["Discovery","Qualification","Pitch","Frame Control","Objection Handling","Close"];

function GoldenMomentsPage(){
  const{data:reps}=useApi("/reps");
  const[rep,setRep]=useState("");
  const[search,setSearch]=useState("");
  const[q,setQ]=useState("");             // debounced
  const[onlyPinned,setOnlyPinned]=useState(false);
  const[minScore,setMinScore]=useState("");
  const[skill,setSkill]=useState("");   // B2 bot skill_category filter — "Learn from the Team"
  const[busy,setBusy]=useState(null);
  const[page,setPage]=useState(1);
  const PAGE_SIZE=18;
  React.useEffect(()=>{setPage(1);},[rep,q,onlyPinned,minScore,skill]);

  React.useEffect(()=>{const t=setTimeout(()=>setQ(search),350);return()=>clearTimeout(t);},[search]);
  const qs=`?${rep?`rep=${encodeURIComponent(rep)}&`:""}${q?`search=${encodeURIComponent(q)}&`:""}${onlyPinned?"pinned=true&":""}${minScore?`minScore=${minScore}&`:""}${skill?`skill=${skill}&`:""}`;
  const{data,reload}=useApi(`/golden-moments${qs}`,[rep,q,onlyPinned,minScore,skill]);
  const SKILLS=[["discovery","Discovery"],["qualification","Qualification"],["pitch","Pitch"],["frame_control","Frame Control"],["objections_close","Objections & Close"]];
  const SKILL_LABEL=Object.fromEntries(SKILLS);

  async function pin(m,category){
    setBusy(m.call_id+"-"+m.moment_index);
    try{ await postApi("/golden-moments/pin",{call_id:m.call_id,moment_index:m.moment_index,category,by:"Sam"}); reload(); }
    catch(e){ alert("Failed."); }
    setBusy(null);
  }
  async function unpin(m){
    setBusy(m.call_id+"-"+m.moment_index);
    try{ await postApi("/golden-moments/unpin",{call_id:m.call_id,moment_index:m.moment_index}); reload(); }
    catch(e){ alert("Failed."); }
    setBusy(null);
  }

  // Re-look at moments: re-reads transcripts to backfill speaker attribution +
  // tough moments on calls scored before those existed. Runs in bounded batches
  // (server caps each request) so it never times out; loops until done. Never re-scores.
  const{data:relookStatus,reload:reloadStatus}=useApi("/golden-moments/relook-status",[]);
  const[relook,setRelook]=useState(null);
  async function runRelook(){
    if(relook?.running)return;
    setRelook({running:true,done:0,remaining:relookStatus?.need_relook??null});
    try{
      let guard=0;
      while(guard++<300){
        const res=await fetch(`${API}/golden-moments/relook-all`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({limit:8,scope:"missing"})});
        if(!res.ok)throw new Error(`Server returned ${res.status}`);
        const r=await res.json();
        setRelook(s=>({running:true,done:(s?.done||0)+(r.processed||0),remaining:r.remaining}));
        if(!r.processed||(r.remaining!=null&&r.remaining<=0))break;
      }
    }catch(e){ setRelook(s=>({...(s||{}),running:false,error:e.message})); return; }
    setRelook(s=>({...(s||{}),running:false}));
    reload(); reloadStatus();
  }

  const moments=data?.moments||[];

  function Moment({m}){
    const key=m.call_id+"-"+m.moment_index;
    const[picking,setPicking]=useState(false);
    return<div className="card" style={{padding:18,borderColor:m.pinned?"#a16207":"#1e2635",background:m.pinned?"#1a1505":"var(--card)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        {m.speaker&&<span style={{fontSize:9,fontWeight:800,letterSpacing:.5,padding:"2px 8px",borderRadius:20,
          background:m.speaker==="lead"?"#0f2a1a":"#0f1f33",color:m.speaker==="lead"?"#34d399":"#60a5fa",
          border:`1px solid ${m.speaker==="lead"?"#14532d":"#1e3a5f"}`}}>
          {m.speaker==="lead"?"◂ LEAD":"▸ REP"}</span>}
        {m.pinned&&<span style={{fontSize:10,fontWeight:800,color:"#fbbf24",letterSpacing:.5}}>
          ★ PINNED{m.category?` · ${m.category.toUpperCase()}`:""}</span>}
        {m.skill_category&&<span title="Bot-assigned skill — what this moment demonstrates" style={{fontSize:9,fontWeight:800,letterSpacing:.4,padding:"2px 8px",borderRadius:20,background:"#1e1b4b",color:"#a5b4fc",border:"1px solid #3730a3"}}>{(SKILL_LABEL[m.skill_category]||m.skill_category).toUpperCase()}</span>}
      </div>

      {/* The quote — the thing that teaches */}
      <div style={{fontSize:15,color:"var(--t1)",lineHeight:1.7,fontStyle:"italic",
        borderLeft:`3px solid ${m.pinned?"#fbbf24":"#4338ca"}`,paddingLeft:14,marginBottom:10}}>
        "{m.quote}"
      </div>

      {/* Why it worked — the bot already wrote this */}
      {m.why&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:1.6,marginBottom:10}}>
        <b style={{color:"var(--t3)"}}>Why it works: </b>{m.why}
      </div>}

      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",paddingTop:10,borderTop:"1px solid #1e2635"}}>
        <div style={{width:24,height:24,borderRadius:7,background:RC[m.rep_name],display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0}}>{m.rep_name?.[0]}</div>
        <span onClick={()=>goTo("rep",m.rep_name)} style={{fontSize:12,fontWeight:700,color:"var(--t2)",cursor:"pointer"}}>{m.rep_name}</span>
        <span style={{fontSize:11,color:"var(--t3)"}}>→ {m.client_name||"?"}</span>
        {m.timestamp&&<span style={{fontSize:10,color:"var(--t3)",fontFamily:"var(--m)"}}>· {m.timestamp}</span>}
        <span style={{fontSize:12,fontWeight:800,color:sClr(m.score),fontFamily:"var(--m)"}}>{m.score}</span>
        <div style={{flex:1}}/>
        <button className="btn" onClick={()=>goTo("calls",m.call_id)} style={{fontSize:10,padding:"3px 9px"}}>{m.call_moment_total>1?`See all ${m.call_moment_total} on call →`:"Read call →"}</button>
        {m.aloware_contact_id&&m.aloware_call_id&&
          <a href={`https://talk.aloware.io/contacts/${m.aloware_contact_id}/communications/${m.aloware_call_id}`}
             target="_blank" rel="noopener" className="btn" title="Listen in Aloware"
             style={{fontSize:10,padding:"3px 9px",textDecoration:"none"}}>🎧 Listen</a>}
        {m.pinned
          ? <button className="btn" onClick={()=>unpin(m)} disabled={busy===key} style={{fontSize:10,padding:"3px 9px",color:"#fbbf24"}}>★ Unpin</button>
          : picking
            ? <span style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {GM_CATEGORIES.map(c=><button key={c} className="btn" onClick={()=>{pin(m,c);setPicking(false);}}
                  style={{fontSize:9,padding:"3px 7px"}}>{c}</button>)}
                <button className="btn" onClick={()=>setPicking(false)} style={{fontSize:9,padding:"3px 7px"}}>✕</button>
              </span>
            : <button className="btn" onClick={()=>setPicking(true)} disabled={busy===key} style={{fontSize:10,padding:"3px 9px"}}>☆ Pin</button>}
      </div>
    </div>;
  }

  return<div className="flex-col gap-16" style={{maxWidth:900}}>
    <div style={{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:280}}>
        <h2 style={{fontSize:24,fontWeight:900,margin:0}}>Golden Moments</h2>
        <div style={{fontSize:13,color:"var(--t2)",marginTop:3,lineHeight:1.5,maxWidth:620}}>
          The best things your team has actually said, pulled from real calls. Not theory from a book — <b>your own reps, with real prospects.</b>
          {data&&<> <b style={{color:"var(--t2)"}}>{data.total_library}</b> moments in the library{data.pinned_count>0?<>, <b style={{color:"#fbbf24"}}>{data.pinned_count} pinned</b></>:""}. Showing up to 2 per call — open a call for the rest.</>}
        </div>
      </div>
      <div style={{textAlign:"right"}}>
        <button className="btn" onClick={runRelook} disabled={relook?.running}
          style={{fontSize:12,padding:"7px 12px",whiteSpace:"nowrap"}}
          title="Re-read transcripts to add Rep/Lead tags and tough moments to older calls. Does not re-score.">
          {relook?.running?`Re-looking… ${relook.done} done`:"↻ Re-look at moments"}</button>
        {relook?.running&&relook.remaining!=null&&<div style={{fontSize:10,color:"var(--t3)",marginTop:4}}>{relook.remaining} calls left</div>}
        {!relook?.running&&relook&&!relook.error&&<div style={{fontSize:10,color:"#34d399",marginTop:4}}>✓ Done — {relook.done} calls re-looked</div>}
        {relook?.error&&<div style={{fontSize:10,color:"#f87171",marginTop:4}}>{relook.error}</div>}
        {!relook&&relookStatus?.need_relook>0&&<div style={{fontSize:10,color:"var(--t3)",marginTop:4}}>Rep/Lead tags auto-detected · re-look adds tough moments to {relookStatus.need_relook} calls</div>}
      </div>
    </div>

    {/* Filters */}
    <div className="card" style={{padding:14,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search quotes… (e.g. 'objection', 'frame', 'tax')"
        style={{flex:1,minWidth:200,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13}}/>
      <select value={rep} onChange={e=>setRep(e.target.value)} style={{padding:"8px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}>
        <option value="">All reps</option>
        {(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
      </select>
      <select value={minScore} onChange={e=>setMinScore(e.target.value)} style={{padding:"8px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}>
        <option value="">Any score</option>
        <option value="7">7+ only</option>
        <option value="8">8+ only</option>
      </select>
      <button className="btn" onClick={()=>setOnlyPinned(p=>!p)} style={{fontSize:12,
        background:onlyPinned?"#1a1505":"",borderColor:onlyPinned?"#a16207":"",color:onlyPinned?"#fbbf24":""}}>★ Pinned only</button>
    </div>

    {/* Learn from the Team — filter the library by the skill each moment demonstrates (B2 skill_category) */}
    <div style={{marginTop:2}}>
      <div style={{fontSize:10,fontWeight:800,letterSpacing:.6,textTransform:"uppercase",color:"#5b6472",marginBottom:8}}>Learn from the team — filter by skill</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button className="btn" onClick={()=>setSkill("")} style={{fontSize:11,padding:"4px 11px",background:skill?"":"#1e1b4b",borderColor:skill?"":"#3730a3",color:skill?"":"#a5b4fc"}}>All skills</button>
        {SKILLS.map(([k,label])=><button key={k} className="btn" onClick={()=>setSkill(s=>s===k?"":k)} style={{fontSize:11,padding:"4px 11px",background:skill===k?"#1e1b4b":"",borderColor:skill===k?"#3730a3":"",color:skill===k?"#a5b4fc":""}}>{label}</button>)}
      </div>
    </div>

    {/* Who's contributing */}
    {data?.by_rep?.length>0&&!rep&&<div style={{marginTop:2}}>
      <div style={{fontSize:10,fontWeight:800,letterSpacing:.6,textTransform:"uppercase",color:"#5b6472",marginBottom:8}}>Contributors — tap to filter</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {data.by_rep.map(r=><button key={r.rep_name} className="btn" onClick={()=>setRep(r.rep_name)}
          style={{fontSize:11,padding:"4px 10px"}}>{r.rep_name} <b style={{color:"#818cf8"}}>{r.n}</b></button>)}
      </div>
    </div>}

    {(()=>{
      if(!data)return<Skel/>;
      if(moments.length===0)return<div className="card" style={{padding:40,textAlign:"center",color:"var(--t2)"}}>No moments match those filters.</div>;
      const totalPages=Math.max(1,Math.ceil(moments.length/PAGE_SIZE));
      const cur=Math.min(page,totalPages);
      const start=(cur-1)*PAGE_SIZE;
      const pageItems=moments.slice(start,start+PAGE_SIZE);
      const Pager=()=><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
        <div style={{fontSize:11,color:"var(--t3)"}}>Showing <b style={{color:"var(--t2)"}}>{start+1}–{start+pageItems.length}</b> of <b style={{color:"var(--t2)"}}>{moments.length}</b></div>
        {totalPages>1&&<div style={{display:"flex",gap:4,alignItems:"center"}}>
          <button className="btn" disabled={cur<=1} onClick={()=>setPage(cur-1)} style={{fontSize:11,padding:"4px 10px",opacity:cur<=1?.4:1}}>← Prev</button>
          <span style={{fontSize:11,color:"var(--t3)",fontFamily:"var(--m)",minWidth:64,textAlign:"center"}}>Page {cur}/{totalPages}</span>
          <button className="btn" disabled={cur>=totalPages} onClick={()=>setPage(cur+1)} style={{fontSize:11,padding:"4px 10px",opacity:cur>=totalPages?.4:1}}>Next →</button>
        </div>}
      </div>;
      return<div className="flex-col gap-12">
        <Pager/>
        {pageItems.map(m=><Moment key={m.call_id+"-"+m.moment_index} m={m}/>)}
        {totalPages>1&&<Pager/>}
      </div>;
    })()}
  </div>;
}

  const[scanMsg,setScanMsg]=useState(null);

  async function confirm(s){
    setBusy(s.id);
    try{ await postApi(`/calls/${s.call_id}/tag`,{tag:s.tag_key,reason:s.reason,by:"Sam"}); reload(); }
    catch(e){ alert("Failed."); }
    setBusy(null);
  }
  async function dismiss(s){
    setBusy(s.id);
    try{ await postApi(`/calls/${s.call_id}/dismiss-tag`,{tag:s.tag_key}); reload(); }
    catch(e){ alert("Failed."); }
    setBusy(null);
  }

    try{
      const r=await postApi("/tags/backfill-scan",{limit:15});

    return<div className="card" style={{overflow:"hidden"}}>
      <div style={{padding:"10px 16px",background:"#151a24",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:800,letterSpacing:.5,color:color,fontFamily:"var(--m)"}}>{title} ({rows.length})</div>
      <div style={{display:"grid",gridTemplateColumns:"1.8fr 1.3fr 1.7fr 56px 150px",gap:12,padding:"9px 16px",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
        <span className="th">Rep → Client</span><span className="th">Suggested tag</span><span className="th">Why the bot flagged it</span><span className="th" style={{textAlign:"center"}}>Score</span><span className="th" style={{textAlign:"right"}}>Review</span>

      {rows.map((s,i)=><div key={s.id} style={{display:"grid",gridTemplateColumns:"1.8fr 1.3fr 1.7fr 56px 150px",gap:12,padding:"12px 16px",borderBottom:i<rows.length-1?"1px solid #1a1f2b":"none",alignItems:"center",background:i%2?"#131722":"transparent"}}>
        <div style={{minWidth:0,cursor:"pointer"}} onClick={()=>goTo("calls",s.call_id)}><div style={{fontSize:13,fontWeight:700,color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.rep_name} → {s.client_name||"?"}</div><div style={{fontSize:10,color:"var(--t4)",fontFamily:"var(--m)"}}>#{s.call_id} · {s.role} · {fmt(s.received_at)}</div></div>
        <span style={{justifySelf:"start",padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:800,fontFamily:"var(--m)",background:s.color+"22",border:`1px dashed ${s.color}`,color:s.color}}>{s.label}{s.excludes_from_average&&" ⊘"}</span>
        <span style={{fontSize:11,color:"var(--t2)",fontStyle:"italic",lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{s.reason?`"${s.reason}"`:"—"}</span>
        <span className="slab" style={{fontSize:13,color:sClr(s.overall_score_adj),textAlign:"center"}}>{s.overall_score_adj??"—"}</span>

      </div>)}

  return<div className="flex-col gap-20">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
      <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Call Outcomes</h2>
        <div style={{fontSize:12,color:"var(--t3)",marginTop:2,maxWidth:640,lineHeight:1.5}}>Cross-sell & outcome tags the bot suggested. <b style={{color:"var(--t2)"}}>You confirm</b> what's real — the bot never tags on its own. Confirming removes a call from the average (still attributed) or feeds Referrals.</div></div>
      <button className="btn btn-primary" onClick={backfill} disabled={scanning}>{scanning?"Scanning…":"⟳ Scan old calls"}</button>
    </div>

    {scanMsg&&<div className="card" style={{padding:14,fontSize:12,color:"var(--t2)"}}>{scanMsg}</div>}

    {!data?<Skel/>:
     sug.length===0?<div className="card" style={{padding:40,textAlign:"center"}}>
       <div style={{fontSize:14,color:"var(--t2)"}}>No pending suggestions.</div>
       <div style={{fontSize:12,color:"var(--t3)",marginTop:6}}>New calls get checked automatically. Use <b>Scan old calls</b> to review already-scored ones.</div>
     </div>:<>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 15px",borderRadius:10,background:"#0f1a2e",border:"1px solid #1e3a5f"}}>
        <Icon name="target" size={16} color="#93c5fd"/><span style={{fontSize:12,color:"var(--t2)"}}><b style={{color:"#93c5fd"}}>{sug.length} suggestion{sug.length!==1?"s":""}</b> waiting for your review · nothing changes until you confirm</span>
      </div>
      <Section title="LEAD COULDN'T BE CLOSED — WOULD REMOVE FROM AVERAGE" color="#f59e0b" rows={excluding}/>
      <Section title="OUTCOME / CROSS-SELL — NO EFFECT ON SCORE" color="var(--t2)" rows={other}/>
     </>}
  </div>;
}

function TagBox({call}){
  const{data:reg}=useApi("/tags");
  const{data,reload}=useApi(`/calls/${call.id}/tags`,[call.id]);
  const[open,setOpen]=useState(false);
  const[busy,setBusy]=useState(null);
  const tags=data?.tags||[];
  const registry=reg?.tags||[];
  const outcome=tags.find(t=>(t.tag_group==="A_NOT_CLOSEABLE"||t.tag_group==="B_REAL_ATTEMPT")&&t.status!=="DISMISSED");
  const routing=tags.filter(t=>t.tag_group==="C_ROUTING"&&t.status!=="DISMISSED");
  const excluded=tags.some(t=>t.status==="CONFIRMED"&&t.excludes_from_average);
  // Which tag keys are currently on this call (confirmed or suggested)
  const applied=new Set(tags.filter(t=>t.status!=="DISMISSED").map(t=>t.tag_key));

  // Toggle: click an applied tag to remove it, click an unapplied one to add it.
  // The picker STAYS OPEN so you can stack several tags in one go.
  async function toggle(t){
    setBusy(t.key);
    try{
      if(applied.has(t.key)) await postApi(`/calls/${call.id}/untag`,{tag:t.key});
      else await postApi(`/calls/${call.id}/tag`,{tag:t.key,by:"Sam"});
      reload();
    }catch(e){ alert("Could not update tag."); }
    setBusy(null);
  }
  async function remove(key){
    setBusy(key);
    try{ await postApi(`/calls/${call.id}/untag`,{tag:key}); reload(); }
    catch(e){ alert("Could not remove tag."); }
    setBusy(null);
  }
  async function confirmSuggested(key,reason){
    setBusy(key);
    try{ await postApi(`/calls/${call.id}/tag`,{tag:key,reason,by:"Sam"}); reload(); }
    catch(e){ alert("Failed."); }
    setBusy(null);
  }
  async function dismiss(key){
    setBusy(key);
    try{ await postApi(`/calls/${call.id}/dismiss-tag`,{tag:key}); reload(); }
    catch(e){ alert("Failed."); }
    setBusy(null);
  }

  const groupA=registry.filter(t=>t.tag_group==="A_NOT_CLOSEABLE");
  const groupB=registry.filter(t=>t.tag_group==="B_REAL_ATTEMPT");
  const groupC=registry.filter(t=>t.tag_group==="C_ROUTING");

  function Pill({t}){
    const sug=t.status==="SUGGESTED";
    return<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:700,
      background:sug?"transparent":t.color+"22",border:`1px ${sug?"dashed":"solid"} ${t.color}`,color:t.color,marginRight:6,marginBottom:6}}>
      {sug&&<span style={{fontSize:9,opacity:.8}}>suggested</span>}
      {t.label}
      {sug?<>
        <span onClick={()=>confirmSuggested(t.tag_key,t.reason)} title="Confirm — this WILL change the average" style={{cursor:"pointer",color:"#34d399",fontWeight:900}}>✓</span>
        <span onClick={()=>dismiss(t.tag_key)} title="Dismiss — call stays scored" style={{cursor:"pointer",color:"#f87171",fontWeight:900}}>✕</span>
      </>:<span onClick={()=>remove(t.tag_key)} title="Remove tag" style={{cursor:"pointer",opacity:.6}}>✕</span>}
    </div>;
  }

  // A pickable chip in the tag picker. Applied ones are filled; click toggles.
  function Chip({t}){
    const on=applied.has(t.key);
    const b=busy===t.key;
    return<button onClick={()=>toggle(t)} disabled={b} title={t.description}
      style={{padding:"5px 11px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
        background:on?t.color+"33":"transparent",border:`1px solid ${t.color}`,color:t.color,opacity:b?.5:1,
        display:"inline-flex",alignItems:"center",gap:5}}>
      {on&&<span style={{fontWeight:900}}>✓</span>}{t.label}
    </button>;
  }

  return<div className="card" style={{padding:18,borderColor:excluded?"#92400e":"#1e2635",background:excluded?"#161200":"var(--card)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div className="section-head" style={{marginBottom:0,color:excluded?"#f59e0b":"var(--t2)"}}>Call Outcome & Tags</div>
      <button className="btn" onClick={()=>setOpen(o=>!o)} style={{fontSize:11,padding:"4px 10px"}}>{open?"Done":"Tag this call"}</button>
    </div>

    {excluded&&<div style={{fontSize:12,color:"#f59e0b",marginBottom:8,lineHeight:1.5}}>
      ⓘ Not counted in <b>{call.rep_name}</b>'s scored average — the lead couldn't be closed. Still attributed to them.
    </div>}

    {tags.filter(t=>t.status!=="DISMISSED").length===0&&!open&&
      <div style={{fontSize:12,color:"var(--t3)"}}>No tags. This call counts toward the rep's average as a normal call.</div>}

    {(outcome||routing.length>0)&&<div style={{marginTop:4}}>
      {outcome&&<Pill t={outcome}/>}
      {routing.map(t=><Pill key={t.tag_key} t={t}/>)}
    </div>}
    {tags.filter(t=>t.status==="DISMISSED").length>0&&<div style={{fontSize:10,color:"var(--t4)",marginTop:2}}>
      {tags.filter(t=>t.status==="DISMISSED").length} suggestion(s) dismissed
    </div>}

    {open&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #1e2635"}}>
      <div style={{fontSize:11,color:"var(--t3)",marginBottom:12,lineHeight:1.5}}>
        Click to add or remove. You can stack as many cross-sell tags as apply — the picker stays open.
      </div>
      <TagGroup title="OUTCOME — lead couldn't be closed" sub="Removes the call from the rep's average. The rep judged correctly, so their score shouldn't suffer. Picking one replaces any other outcome — a call has one outcome."
        tags={groupA} Chip={Chip}/>
      <TagGroup title="OUTCOME — a real attempt happened" sub="Stays scored. A genuine pitch happened, so execution is fair to judge. Also replaces any other outcome."
        tags={groupB} Chip={Chip}/>

        tags={groupC} Chip={Chip}/>
    </div>}
  </div>;
}

//   HubSpot contact: https://app.hubspot.com/contacts/45099398/record/0-1/{hubspotContactId}
// We never guess an ID we don't have — a wrong link sends someone to the WRONG lead,
// which is worse than no link at all. Buttons only render when the ID exists.
const HUBSPOT_PORTAL = "45099398";
function ExternalLinks({call:c}){

  const L=({href,children,primary,title})=><a href={href} target="_blank" rel="noopener" title={title}
    className={"btn"+(primary?" btn-primary":"")} style={{textDecoration:"none",fontSize:12}}>{children}</a>;

  return<div className="card" style={{padding:"9px 14px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
    <span style={{fontSize:10,fontWeight:700,color:"#55606f",letterSpacing:.5,marginRight:2}}>OPEN IN</span>
    {rec&&<>
      <L href={rec} primary title="Open the recording directly (full player, scrub, download)">▶ Recording</L>
      <a href={rec} download className="btn" style={{textDecoration:"none",fontSize:12}} title="Download the audio file">⤓ Download</a>
    </>}
    {aloContact&&aloCall&&<L href={`https://talk.aloware.io/contacts/${aloContact}/communications/${aloCall}`} title="Open this call in Aloware">📞 Aloware call</L>}
    {aloContact&&<L href={`https://talk.aloware.io/contacts/${aloContact}`} title="Open this lead's Aloware contact">👤 Aloware contact</L>}
    {hsContact
      ? <L href={`https://app.hubspot.com/contacts/${HUBSPOT_PORTAL}/record/0-1/${hsContact}`} title="Open this lead in HubSpot">🅷 HubSpot</L>
      : c.client_name&&<L href={`https://app.hubspot.com/contacts/${HUBSPOT_PORTAL}/objects/0-1/views/all/list?query=${encodeURIComponent(c.client_name)}`}
          title="We don't have a HubSpot ID for this call — this searches HubSpot by name instead of guessing (a wrong link would send you to the wrong lead)">🔍 Find in HubSpot</L>}
  </div>;
}

function CalibrationBox({call}){
  const{data,reload}=useApi(`/calls/${call.id}/override`,[call.id]);
  const[open,setOpen]=useState(false);
  const[mode,setMode]=useState("overall");   // 'overall' | 'detailed'
  const[score,setScore]=useState("");
  const[reason,setReason]=useState("");
  const[catScores,setCatScores]=useState({});
  const[busy,setBusy]=useState(false);
  const existing=data&&data.override;
  const botScore=call.overall_score_adj;
  const botCats=(()=>{try{const c=call.category_scores;return typeof c==="string"?JSON.parse(c):(c||{});}catch(e){return{};}})();

  async function save(){
    const n=Number(score);
    if(!(n>=0&&n<=10)){alert("Enter an overall score from 0 to 10.");return;}
    // Only send categories Sam actually filled in — blanks mean "the bot's score is fine".
    let cats=null;
    if(mode==="detailed"){
      cats={};
      for(const k of Object.keys(catScores)){
        const v=catScores[k];
        if(v!==""&&v!=null&&isFinite(Number(v))) cats[k]=Number(v);
      }
      if(!Object.keys(cats).length) cats=null;
    }
    setBusy(true);
    try{
      const r=await postApi(`/calls/${call.id}/override`,{override_score:n,reason,override_by:"Sam",category_scores:cats});
      if(r.ok){setOpen(false);setScore("");setReason("");setCatScores({});reload();}
      else alert(r.error||"Failed to save.");
    }catch(e){alert("Failed to save.");}
    setBusy(false);
  }

  const delta=existing?(Number(existing.override_score)-Number(existing.original_score)):null;
  return<div className="card" style={{padding:14,borderColor:"#3730a3",background:"#12122a"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
      <div className="section-head" style={{marginBottom:0,color:"#a5b4fc"}}>Sam's Calibration</div>
      {!open&&<button className="btn" onClick={()=>{setOpen(true);setScore(existing?String(existing.override_score):"");setReason(existing?.reason||"");}} style={{fontSize:11,padding:"4px 10px"}}>{existing?"Update":"Add my score"}</button>}
    </div>
    {existing&&!open&&<div style={{marginTop:10,fontSize:13,color:"var(--t2)"}}>
      <span style={{fontFamily:"var(--m)",fontSize:18,fontWeight:800,color:"#818cf8"}}>{existing.override_score}</span>
      <span style={{color:"var(--t3)"}}> vs bot's </span>
      <span style={{fontFamily:"var(--m)",fontWeight:700}}>{existing.original_score}</span>
      {delta!==null&&isFinite(delta)&&delta!==0&&<span style={{color:delta>0?"#34d399":"#f87171",marginLeft:8,fontSize:12}}>({delta>0?"+":""}{delta} vs bot)</span>}
      {existing.reason&&<div style={{fontSize:12,color:"var(--t2)",marginTop:4,fontStyle:"italic"}}>"{existing.reason}"</div>}
    </div>}
    {!existing&&!open&&<div style={{marginTop:6,fontSize:11,color:"var(--t3)"}}>Bot scored <b style={{color:"var(--t2)"}}>{botScore}</b> · you confirm or override.</div>}
    {open&&<div style={{marginTop:12}}>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[["overall","Overall only"],["detailed","Detailed (by category)"]].map(([m,l])=>
          <button key={m} className="btn" onClick={()=>setMode(m)} style={{fontSize:11,padding:"4px 10px",background:mode===m?"#1e1b4b":"",borderColor:mode===m?"#4338ca":"",color:mode===m?"#c7d2fe":""}}>{l}</button>)}
      </div>
      <div style={{fontSize:11,color:"var(--t3)",marginBottom:8}}>Bot scored this <b style={{color:"var(--t2)"}}>{botScore}</b>. What would you give it?</div>

      {mode==="detailed"&&<div style={{marginBottom:12,padding:12,background:"var(--bg)",borderRadius:8,border:"1px solid #1e2635"}}>
        {CATS.map(cat=>{const bot=botCats[cat];
          return<div key={cat} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{fontSize:11,color:"var(--t2)",width:135,flexShrink:0}}>{CL[cat]||cat}</span>
            <span style={{fontSize:11,color:"var(--t3)",fontFamily:"var(--m)",width:38}}>bot {bot??"—"}</span>
            <input type="number" min="0" max="10" step="0.5" value={catScores[cat]??""} onChange={e=>setCatScores(cs=>({...cs,[cat]:e.target.value}))}
              placeholder={bot!=null?String(bot):"0-10"} style={{width:70,padding:"5px 8px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,color:"var(--t1)",fontSize:13}}/>
          </div>;})}
        <div style={{fontSize:10,color:"var(--t4)",marginTop:4}}>Leave blank to accept the bot's score for that category.</div>
      </div>}

      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <input type="number" min="0" max="10" step="0.5" value={score} onChange={e=>setScore(e.target.value)} placeholder="Overall" style={{width:90,padding:"8px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:14}}/>
        <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="Why? (e.g. discovery was better than scored)" style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13}}/>
      </div>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <button className="btn btn-primary" onClick={save} disabled={busy} style={{fontSize:12}}>{busy?"Saving…":"Save my score"}</button>
        <button className="btn" onClick={()=>setOpen(false)} style={{fontSize:12}}>Cancel</button>
      </div>
    </div>}
  </div>;
}

function CallDetail({call:initial,onBack}){const[rs,setRs]=useState(false);const[stx,setStx]=useState(false);const[ed,setEd]=useState(false);const[coachOpen,setCoachOpen]=useState(false);const{data:fc,reload}=useApi(`/calls/${initial.id}`,[initial.id]);const c=fc||initial;

  async function reqc(){setRs(true);await postApi(`/calls/${c.id}/reqc`);alert("Queued for re-score.");reload();setRs(false)}
  async function del(){if(!(await qcConfirm({title:"Delete call?",message:"This call and its scores will be permanently deleted.",confirmLabel:"Delete",danger:true})))return;await deleteApi(`/calls/${c.id}`);onBack()}
  const lines=(c.transcript||'').split('\n').filter(l=>l.trim());
  // Transcript-quality (diarization) grade — from the hygiene analyzer.

    {c.pass_fail?.beliefs_covered&&<div className="card" style={{padding:18}}><div className="section-head" style={{marginBottom:10}}>🎯 Sam's 7 Sales Beliefs</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>{['pain','doubt','desire','cost','money','support','trust'].map(b=>{const ok=c.pass_fail.beliefs_covered[b];return<div key={b} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:ok?"#041a0e":"#1a0a0a",borderRadius:8,border:`1px solid ${ok?"#166534":"#991b1b"}`}}><span style={{fontSize:14}}>{ok?"✓":"✗"}</span><span style={{fontSize:11,fontWeight:700,color:ok?"#22c55e":"#ef4444",textTransform:"capitalize"}}>{b}</span></div>})}</div>{(c.pass_fail.frame_assessment||c.pass_fail.temperature_check)&&<div style={{display:"flex",gap:16,marginTop:12,fontSize:11,flexWrap:"wrap"}}>{c.pass_fail.frame_assessment&&<div><span style={{color:"var(--t3)"}}>Frame:</span> <span style={{color:"var(--t2)",fontWeight:700,textTransform:"capitalize"}}>{c.pass_fail.frame_assessment}</span></div>}{c.pass_fail.temperature_check&&c.pass_fail.temperature_check!=='not-taken'&&<div><span style={{color:"var(--t3)"}}>Temp Check:</span> <span style={{color:"var(--t2)",fontWeight:700}}>{c.pass_fail.temperature_check}</span></div>}</div>}</div>}
    {c.pass_fail?.deductions?.length>0&&<div className="card" style={{padding:18}}><div className="section-head" style={{marginBottom:10}}>⚠ Score Deductions</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{c.pass_fail.deductions.map((d,i)=>{const isCritical=d.severity==='critical';return<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:isCritical?"#1a0a0a":"#1a1400",borderRadius:8,border:`1px solid ${isCritical?"#991b1b":"#92400e"}`}}><span style={{fontSize:18,fontFamily:"var(--m)",fontWeight:900,color:isCritical?"#ef4444":"#f59e0b",minWidth:36}}>{d.points}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>{d.label}</div><div style={{fontSize:10,color:"var(--t3)"}}>{d.source}</div></div>{d.points!=0&&<button className="btn no-print" onClick={()=>goTo("resources",playbookFor(d.label))} style={{fontSize:10,padding:"2px 9px",whiteSpace:"nowrap"}} title="Open the manual that fixes this">Learn →</button>}</div>})}<div style={{fontSize:10,color:"var(--t4)",marginTop:4,fontStyle:"italic"}}>Raw AI score: {c.overall_score}/10 → adjusted: {c.overall_score_adj}/10</div></div></div>}
    {c.mechanics&&(()=>{const m=c.mechanics;const tile=(label,val,sub,flag)=><div style={{background:flag==="amber"?"#241c08":flag==="green"?"#0f2a1a":"#141a24",border:`1px solid ${flag==="amber"?"#5c4a12":flag==="green"?"#14532d":"#1e2635"}`,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:20,fontWeight:900,fontFamily:"var(--m)",color:flag==="amber"?"#f59e0b":flag==="green"?"#34d399":"var(--t1)"}}>{val}</div><div style={{fontSize:11,fontWeight:700,color:"var(--t2)",marginTop:2}}>{label}</div><div style={{fontSize:10,color:"var(--t3)"}}>{sub}</div></div>;
      return<div className="card" style={{padding:18}}>
        <div className="section-head" style={{marginBottom:12}}>📊 Call Mechanics</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10}}>
          {tile("Talk balance",m.rep_talk_pct!=null?`${m.rep_talk_pct}%`:"—","rep share of words",m.rep_talk_pct>75?"amber":(m.rep_talk_pct>=40&&m.rep_talk_pct<=65?"green":null))}
          {tile("Questions asked",m.rep_questions,m.questions_per_min!=null?`${m.questions_per_min}/min by rep`:"by rep",m.rep_questions>=8?"green":(m.rep_questions<=2?"amber":null))}
          {tile("Longest monologue",m.longest_rep_monologue_words,"words, single rep turn",m.longest_rep_monologue_words>250?"amber":null)}
          {tile("Exchanges",m.exchanges,"back-and-forth turns",null)}
        </div>
        <div style={{fontSize:10,color:"var(--t4)",marginTop:10}}>Derived from the transcript — a read on pacing and discovery. Not part of the score.</div>
      </div>;
    })()}
    {c.pass_fail?.rubric_version&&<div style={{fontSize:10,color:"var(--t3)"}}>Scored with rubric v{c.pass_fail.rubric_version}</div>}
    </React.Fragment>}
    {at==="tags"&&(c.status==="SCORED"?<TagBox call={c}/>:<div className="card" style={{padding:40,textAlign:"center",color:"var(--t3)"}}>Tagging is available once a call is scored.</div>)}
    {at==="history"&&<CallScoreHistory callId={c.id}/>}
    {at==="moments"&&(goldenM.length>0||toughM.length>0||c.status==="SCORED")&&<div className="card" style={{padding:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <span className="section-head" style={{marginBottom:0}}>🏆 Moments</span>
        <button className="btn" onClick={relookMoments} disabled={relooking} style={{fontSize:11,padding:"5px 10px"}} title="Re-read the transcript to refresh Rep/Lead tags and tough moments. Does not re-score.">{relooking?"Re-looking…":"↻ Re-look"}</button>
      </div>
      {goldNeedsRelook&&<div style={{fontSize:11,color:"#f59e0b",marginBottom:10}}>These moments predate Rep/Lead tagging — hit Re-look to refresh them.</div>}
      <div style={{fontSize:11,fontWeight:800,letterSpacing:.5,textTransform:"uppercase",color:"#fbbf24",marginBottom:8}}>Golden moments ({goldenM.length})</div>
      {goldenM.length===0?<div style={{fontSize:12,color:"var(--t4)",marginBottom:14}}>None flagged.</div>:
       <div className="flex-col gap-10" style={{marginBottom:16}}>
         {goldenM.map((m,i)=><div key={i} style={{borderLeft:"3px solid #4338ca",paddingLeft:14}}>
           <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}><SpeakerBadge sp={m.speaker}/>{m.timestamp&&<span style={{fontSize:10,color:"var(--t3)",fontFamily:"var(--m)"}}>{m.timestamp}</span>}</div>
           <div style={{fontSize:14,color:"var(--t1)",lineHeight:1.6,fontStyle:"italic",marginBottom:6}}>"{m.quote}"</div>
           {(m.why_it_matters||m.why)&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:1.6}}><b style={{color:"var(--t3)"}}>Why it works: </b>{m.why_it_matters||m.why}</div>}
         </div>)}
       </div>}
      <div style={{fontSize:11,fontWeight:800,letterSpacing:.5,textTransform:"uppercase",color:"#fb7185",marginBottom:8}}>Tough moments ({toughM.length})</div>
      {toughM.length===0?<div style={{fontSize:12,color:"var(--t4)"}}>{c.tough_moments==null?"Not yet extracted — hit Re-look above.":"None flagged — clean call."}</div>:
       <div className="flex-col gap-10">
         {toughM.map((m,i)=><div key={i} style={{borderLeft:"3px solid #9f1239",paddingLeft:14}}>
           <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}><SpeakerBadge sp={m.speaker}/>{m.timestamp&&<span style={{fontSize:10,color:"var(--t3)",fontFamily:"var(--m)"}}>{m.timestamp}</span>}</div>
           <div style={{fontSize:14,color:"var(--t1)",lineHeight:1.6,fontStyle:"italic",marginBottom:6}}>"{m.quote}"</div>
           {m.why_it_was_tough&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:1.6,marginBottom:3}}><b style={{color:"#9f1239"}}>Why it was tough: </b>{m.why_it_was_tough}</div>}
           {m.what_to_do_instead&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:1.6}}><b style={{color:"#34d399"}}>Do instead: </b>{m.what_to_do_instead}</div>}
         </div>)}
       </div>}
    </div>}
    {at==="transcript"&&<div className="card" style={{overflow:"hidden"}}><button onClick={()=>setStx(!stx)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",background:"transparent",border:"none",cursor:"pointer",color:"var(--t1)"}}><span className="section-head" style={{marginBottom:0}}>📝 Transcript</span><span style={{fontSize:12,color:"var(--t4)",fontFamily:"var(--m)"}}>{stx?"▼":"▶"}</span></button>{tqBad&&<div style={{margin:"2px 20px 14px",padding:"12px 14px",background:tqGrade==='degraded'?"#2a1408":"#241c08",border:`1px solid ${tqGrade==='degraded'?"#7c3a12":"#5c4a12"}`,borderRadius:8}}><div style={{fontSize:12,fontWeight:800,color:tqGrade==='degraded'?"#fb923c":"#eab308",marginBottom:5}}>⚠ Transcript quality: {tqGrade} ({tqScore}/100)</div><div style={{fontSize:11,color:"var(--t2)",lineHeight:1.6}}>{hasCode('DIAL_IN')&&<div>• Phone dial-in call — the recording source (Fathom) <b>scrambled the speaker labels</b>. Lines shown under one name may actually be the other person. This is a source-side issue, not the dashboard.</div>}{(hasCode('ECHO')||hasCode('ECHO_MINOR'))&&<div>• Some lines are <b>echoed</b> (transcribed twice, once per audio channel).</div>}{hasCode('SPEAKER_SPRAWL')&&<div>• The source split one speaker into several labels.</div>}<div style={{marginTop:5,color:"var(--t3)"}}>The scorer was told to judge by content rather than these labels, and talk-balance was not penalized on this call.</div></div></div>}{stx&&<div style={{maxHeight:500,overflowY:"auto",padding:"16px 20px",borderTop:"1px solid #2a3140"}}>{!lines.length&&<div style={{color:"#374151",textAlign:"center",padding:20}}>No transcript</div>}{lines.map((line,i)=>{const m=line.match(/^\[([^\]]*)\]\s*([^:]+):\s*(.*)/);if(!m)return<div key={i} style={{fontSize:12,color:"var(--t3)",lineHeight:1.8}}>{line}</div>;const[,ts,sp,tx]=m;const isAg=isRepSpeaker(sp);return<div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:"1px solid #1a1f2b"}}><span style={{fontSize:10,color:"#2a3040",fontFamily:"var(--m)",minWidth:42}}>{ts}</span><div><span style={{fontSize:11,fontWeight:700,color:isAg?"#60a5fa":"#34d399",marginRight:6}}>{sp.trim()}</span><span style={{fontSize:12,color:"var(--t2)"}}>{tx}</span></div></div>})}</div>}</div>
    }
    {at==="notes"&&<CallComments callId={c.id}/>}
    {ed&&<EditModal call={c} onClose={()=>setEd(false)} onSave={()=>{setEd(false);reload()}}/>}
    </div>
    </div>
  </div>}

function EditModal({call,onClose,onSave}){const[fm,setFm]=useState({rep_name:call.rep_name||'',client_name:call.client_name||'',role:call.role||'',call_duration_sec:call.call_duration_sec||'',agent_talk_pct:call.agent_talk_pct||'',contact_talk_pct:call.contact_talk_pct||''});const set=(k,v)=>setFm(f=>({...f,[k]:v}));async function save(){await patchApi(`/calls/${call.id}`,{...fm,call_duration_sec:fm.call_duration_sec?Number(fm.call_duration_sec):null,agent_talk_pct:fm.agent_talk_pct?Number(fm.agent_talk_pct):null,contact_talk_pct:fm.contact_talk_pct?Number(fm.contact_talk_pct):null});onSave()}return<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><h3 style={{fontSize:16,fontWeight:800,marginBottom:20}}>Edit Call</h3><label>Rep</label><input value={fm.rep_name} onChange={e=>set('rep_name',e.target.value)}/><label>Client</label><input value={fm.client_name} onChange={e=>set('client_name',e.target.value)}/><label>Role</label><select value={fm.role} onChange={e=>set('role',e.target.value)}><option>Setter</option><option>Closer</option></select><label>Duration (sec)</label><input type="number" value={fm.call_duration_sec} onChange={e=>set('call_duration_sec',e.target.value)}/><label>Agent Talk %</label><input type="number" value={fm.agent_talk_pct} onChange={e=>set('agent_talk_pct',e.target.value)}/><label>Contact Talk %</label><input type="number" value={fm.contact_talk_pct} onChange={e=>set('contact_talk_pct',e.target.value)}/><div style={{display:"flex",gap:8,marginTop:8}}><button className="btn btn-primary" onClick={save}>Save</button><button className="btn" onClick={onClose}>Cancel</button></div></div></div>}

// ── Records (Voicemails, Reschedules, etc.) ─────────────────
function RecordsPage(){
  const[typeF,setTypeF]=usePersisted("rec.type","ALL");const[repF,setRepF]=usePersisted("rec.rep","ALL");const[p,sP]=useState("");const[f,sF]=useState('');const[t,sT]=useState('');
  const[sel,setSel]=useState([]);const[busy,setBusy]=useState(false);
  const dq=buildDQ(p,f,t);const tQ=typeF!=="ALL"?`&type=${typeF}`:"";const rQ=repF!=="ALL"?`&rep=${repF}`:"";
  const{data,reload}=useApi(`/records?limit=200${tQ}${rQ}${dq}`,[typeF,repF,p,f,t]);
  const{data:reps}=useApi("/reps");
  // Which statuses can be rescued back into scoring (not voicemails, not non-rostered)
  const RESCUABLE=["SKIP_FOLLOWUP","SKIP_RESCHEDULE","SKIP_WRONG_NUMBER","SKIP_INTERNAL","SKIP_SHORT"];
  function toggle(id){setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);}
  async function rescue(force){
    if(!sel.length)return;
    setBusy(true);
    try{
      const r=await postApi("/calls/rescue-nonsales",{ids:sel,force});
      alert(`Rescued ${r.rescued} call(s) back into the queue${force?" (forced full scoring)":""}.${r.skipped?` ${r.skipped} skipped (no transcript or not rescuable).`:""}`);
      setSel([]);reload();
    }catch(e){alert("Rescue failed — nothing changed.");}
    setBusy(false);
  }
  if(!data)return<Skel/>;
  const bd=data.breakdown||[];
  return<div className="flex-col gap-24">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
      <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Non-Sales Calls</h2><p style={{fontSize:12,color:"#374151",marginTop:4}}>Voicemails, reschedules, follow-ups, and other non-scored calls — {data.total} total</p></div>
      <div className="flex-col gap-8">
        <DateFilter period={p} setPeriod={sP} from={f} setFrom={sF} to={t} setTo={sT}/>
        <div style={{display:"flex",gap:8}}>
          <select value={typeF} onChange={e=>setTypeF(e.target.value)}><option value="ALL">All Types</option><option value="SKIP_VOICEMAIL">Voicemails</option><option value="SKIP_RESCHEDULE">Reschedules</option><option value="SKIP_FOLLOWUP">Follow-ups</option><option value="SKIP_SHORT">Too Short</option><option value="SKIP_WRONG_NUMBER">Wrong Number</option><option value="SKIP_INTERNAL">Internal</option></select>
          <select value={repF} onChange={e=>setRepF(e.target.value)}><option value="ALL">All Reps</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select>
        </div>
      </div>
    </div>
    {/* Type breakdown cards */}
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))"}}>
      {bd.map(b=><div key={b.status} className="card stat-card"><div className="stat-label"><Icon name={RECORD_ICON[b.status]||"clipboard"} size={13} style={{marginRight:5,verticalAlign:"-2px"}}/><span>{RECORD_LABELS[b.status]||b.status}</span></div><div className="stat-value" style={{color:"var(--t3)"}}>{Number(b.count)}</div></div>)}
    </div>
    {/* Rescue action bar */}
    {sel.length>0&&<div className="card" style={{padding:"12px 18px",display:"flex",alignItems:"center",gap:12,background:"#0f1729",borderColor:"#4338ca"}}>
      <div style={{flex:1,fontSize:13,color:"var(--t2)"}}><b>{sel.length}</b> selected — pull back into the scoring queue?</div>
      <button className="btn" onClick={()=>rescue(false)} disabled={busy} title="Send back through classification (safe — may re-skip if genuinely non-sales)">{busy?"…":"↩ Re-classify & Score"}</button>
      <button className="btn btn-primary" onClick={()=>rescue(true)} disabled={busy} title="Force full scoring, skip classification (use when you know it's a real sales call)">{busy?"…":"⚡ Force Score"}</button>
      <button className="btn" onClick={()=>setSel([])} disabled={busy}>Clear</button>
    </div>}
    {/* Records list */}
    <div className="card" style={{overflow:"hidden"}}><div style={{maxHeight:600,overflowY:"auto"}}>

          <div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}><span style={{fontFamily:"var(--m)",fontSize:10,color:"#6366f1",marginRight:5}}>#{r.id}</span>{r.rep_name||"Unknown"} → {r.client_name||"Unknown"}</div>

          <div style={{fontSize:10,color:"#4338ca",marginTop:3}}>Open call →</div>

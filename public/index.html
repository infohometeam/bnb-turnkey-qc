function TrainPage() {
  const [phase, setPhase] = React.useState("setup");        // setup | live | scored
  const [voiceOn, setVoiceOn] = React.useState(false);
  const [repName, setRepName] = React.useState("");
  const [repRole, setRepRole] = React.useState("Setter");
  const [businessUnit, setBusinessUnit] = React.useState("BNB Turnkey");
  const [difficulty, setDifficulty] = React.useState("standard");
  const [sessionMode, setSessionMode] = React.useState("text");
  const [persona, setPersona] = React.useState("male");
  const [elevenKey, setElevenKey] = React.useState("");
  const [voiceUri, setVoiceUri] = React.useState("");
  const [browserVoices, setBrowserVoices] = React.useState([]);
  const [showCreator, setShowCreator] = React.useState(false);
  const [elevenVoices, setElevenVoices] = React.useState([]);
  const [elevenVoiceId, setElevenVoiceId] = React.useState("");
  const [listening, setListening] = React.useState(false);
  const recognitionRef = React.useRef(null);
  const [scenarioId, setScenarioId] = React.useState("");
  const [session, setSession] = React.useState(null);
  const [scenario, setScenario] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [draft, setDraft] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const [score, setScore] = React.useState(null);
  const { data: scenarios, reload: reloadScenarios } = useApi("/practice/scenarios");
  const { data: reps } = useApi("/reps");
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, busy]);

  // Load browser TTS voices (free, no key needed)
  React.useEffect(() => {
    function loadVoices(){ const v = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; if(v.length){ setBrowserVoices(v); if(!voiceUri) setVoiceUri(v[0].voiceURI); } }
    loadVoices();
    if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;
    // Also try loading ElevenLabs voices from the SERVER key (so the team gets them without pasting)
    fetch(`${API}/practice/voices`).then(r=>r.json()).then(d=>{
      if(d.configured && d.voices && d.voices.length){ setElevenVoices(d.voices); setElevenVoiceId(pickVoiceForPersona(d.voices, persona)); }
    }).catch(()=>{});
  }, []);

  // Speak text — ElevenLabs (chosen voice) if key present, else browser voice (free)
  function speakText(text){
    // Use ElevenLabs if we have a client key OR the server has voices loaded (server key present).
    const useEleven = elevenKey || elevenVoiceId || elevenVoices.length>0;
    if(useEleven){
      const headers={"Content-Type":"application/json"};
      if(elevenKey) headers["x-eleven-key"]=elevenKey; // else server uses its env key
      fetch(`${API}/practice/tts`,{method:"POST",headers,body:JSON.stringify({text,voiceId:elevenVoiceId||undefined})})
        .then(r=>r.ok?r.arrayBuffer():Promise.reject())
        .then(buf=>{const ctx=new (window.AudioContext||window.webkitAudioContext)();return ctx.decodeAudioData(buf).then(d=>{const s=ctx.createBufferSource();s.buffer=d;s.connect(ctx.destination);s.start(0)})})
        .catch(()=>browserSpeak(text));
    } else browserSpeak(text);
  }
  function browserSpeak(text){
    if(!window.speechSynthesis)return;
    const u=new SpeechSynthesisUtterance(text);
    const v=browserVoices.find(x=>x.voiceURI===voiceUri); if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  }
  function previewVoice(){ speakText("Hi, thanks for taking the time to chat with me today about the investment opportunity."); }
  // Pick an ElevenLabs voice matching the persona's leading gender
  function pickVoiceForPersona(voices, p){
    if(!voices||!voices.length) return "";
    const wantMale = p==="male" || p==="couple_husband";
    const wantFemale = p==="female" || p==="couple_wife";
    const g = wantMale ? "male" : wantFemale ? "female" : null;
    if(g){ const match = voices.find(v => (v.labels?.gender||"").toLowerCase()===g); if(match) return match.id; }
    return voices[0].id;
  }
  function choosePersona(p){ setPersona(p); if(elevenVoices.length) setElevenVoiceId(pickVoiceForPersona(elevenVoices, p)); }

  // Connect ElevenLabs — fetch the account's voices so the user can choose one
  async function connectEleven(){
    if(!elevenKey){alert("Paste your ElevenLabs key first.");return;}
    try{
      const r=await fetch(`${API}/practice/voices`,{headers:{"x-eleven-key":elevenKey}}).then(r=>r.json());
      if(r.voices&&r.voices.length){setElevenVoices(r.voices);setElevenVoiceId(pickVoiceForPersona(r.voices, persona));}
      else alert("Connected, but no voices found (check the key).");
    }catch(e){alert("Could not connect to ElevenLabs — check the key.");}
  }

  // Speech-to-text — rep talks instead of types (voice mode)
  function toggleListen(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Speech recognition isn't supported in this browser. Try Chrome.");return;}
    if(listening){ recognitionRef.current&&recognitionRef.current.stop(); setListening(false); return; }
    const rec=new SR(); rec.lang="en-US"; rec.interimResults=true; rec.continuous=false;
    let finalText="";
    rec.onresult=(e)=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)finalText+=t;else interim+=t;}setDraft((finalText+" "+interim).trim());};
    rec.onend=()=>{setListening(false);};
    rec.onerror=()=>{setListening(false);};
    recognitionRef.current=rec; rec.start(); setListening(true);
  }

  async function startSession() {
    if (!repName || !scenarioId) return;
    setBusy(true);
    try {
      const r = await fetch(`${API}/practice/start`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rep_name: repName, scenario_id: scenarioId, difficulty_overrides: { difficulty, persona }, business_unit: businessUnit })
      }).then(r => r.json());
      setSession({ id: r.session_id });
      setScenario(r.scenario);
      setMessages([]);
      setPhase("live");
    } catch (e) { alert("Could not start: " + e.message); }
    setBusy(false);
  }

  async function sendTurn() {
    if (!draft.trim() || busy) return;
    const myText = draft.trim();
    setDraft("");
    setMessages(m => [...m, { role: "rep", text: myText }]);
    setBusy(true);
    try {
      const r = await fetch(`${API}/practice/${session.id}/message`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: myText })
      }).then(r => r.json());
      if (r.prospect) { setMessages(m => [...m, { role: "prospect", text: r.prospect }]); if (sessionMode==="voice") speakText(r.prospect); }
      if (r.ended) endSession();
    } catch (e) { alert("Error: " + e.message); }
    setBusy(false);
  }

  async function speak(text){
    try{
      const res=await fetch(`${API}/practice/tts`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
      if(!res.ok)return;
      const buf=await res.arrayBuffer();
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const decoded=await ctx.decodeAudioData(buf);
      const src=ctx.createBufferSource();src.buffer=decoded;src.connect(ctx.destination);src.start(0);
    }catch(e){}
  }

  async function endSession() {
    setBusy(true);
    try {
      const r = await fetch(`${API}/practice/${session.id}/end`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: "{}"
      }).then(r => r.json());
      const full = await fetch(`${API}/practice/${session.id}`).then(r => r.json());
      setScore(full);
      setPhase("scored");
    } catch (e) { alert("Could not score: " + e.message); }
    setBusy(false);
  }

  function reset() {
    setPhase("setup"); setSession(null); setScenario(null);
    setMessages([]); setScore(null); setScenarioId("");
  }

  // ─── SETUP ───
  if (phase === "setup") {
    const BUSINESS_UNITS = ["BNB Turnkey","BNB Investor Academy","Hotel Turnkey","Property Management","Legacy Business Services","Surge Tax"];
    const DIFFICULTIES = [["standard","Standard"],["hard","Hard (objection-heavy)"],["extreme","Extreme (cold/hostile)"]];
    const PERSONAS = [["male","Male prospect","Single decision maker"],["female","Female prospect","Single decision maker"],["couple_husband","Couple — husband leads","Wife raises doubts"],["couple_wife","Couple — wife leads","Husband raises price objections"]];
    const scenariosForRole = (scenarios?.scenarios || []).filter(s => !repRole || s.target_role === repRole || s.target_role === "Both");
    return (
      <div className="flex-col gap-20" style={{ maxWidth: 760 }}>
        {showCreator&&<ScenarioCreator onClose={()=>setShowCreator(false)} onCreated={reloadScenarios}/>}
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 900, margin: 0 }}>Train</h2>
          <p style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>Practice against an AI prospect — scored on the same rubric as your real calls.</p>
        </div>

        {/* Rep info */}
        <div className="card" style={{ padding: 24 }}>
          <div className="section-head" style={{marginBottom:4}}>Rep Info</div>
          <p style={{fontSize:11,color:"#64748b",marginBottom:16}}>Who's practicing?</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:.5}}>NAME</label>
              <select value={repName} onChange={e=>{setRepName(e.target.value);const r=(reps||[]).find(x=>x.name===e.target.value);if(r)setRepRole(r.role)}} style={{width:"100%",marginTop:6,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)"}}><option value="">Select rep…</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select></div>
            <div><label style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:.5}}>ROLE</label>
              <select value={repRole} onChange={e=>setRepRole(e.target.value)} style={{width:"100%",marginTop:6,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)"}}><option>Setter</option><option>Closer</option></select></div>
            <div><label style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:.5}}>BUSINESS UNIT</label>
              <select value={businessUnit} onChange={e=>setBusinessUnit(e.target.value)} style={{width:"100%",marginTop:6,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)"}}>{BUSINESS_UNITS.map(b=><option key={b}>{b}</option>)}</select></div>
            <div><label style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:.5}}>DIFFICULTY</label>
              <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} style={{width:"100%",marginTop:6,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)"}}>{DIFFICULTIES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
          </div>
        </div>

        {/* Session mode */}
        <div className="card" style={{ padding: 24 }}>
          <div className="section-head" style={{marginBottom:4}}>Session Mode</div>
          <p style={{fontSize:11,color:"#64748b",marginBottom:14}}>Voice mode speaks the prospect out loud and listens to your response — closest to a real call. Text mode is standard chat.</p>
          <div style={{display:"flex",gap:10}}>
            {[["text","💬 Text chat"],["voice","🎙 Voice call"]].map(([v,l])=><button key={v} onClick={()=>setSessionMode(v)} className="btn" style={{flex:1,padding:"12px",background:sessionMode===v?"#1e1b4b":"",borderColor:sessionMode===v?"#4338ca":"",color:sessionMode===v?"#c7d2fe":""}}>{l}</button>)}
          </div>
        </div>

        {/* Prospect persona */}
        <div className="card" style={{ padding: 24 }}>
          <div className="section-head" style={{marginBottom:4}}>Prospect Persona</div>
          <p style={{fontSize:11,color:"#64748b",marginBottom:14}}>Choose who you're selling to. Couple mode puts both a husband and wife on the call — a common real-world challenge.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {PERSONAS.map(([v,title,sub])=><div key={v} onClick={()=>choosePersona(v)} style={{padding:"14px 16px",borderRadius:10,cursor:"pointer",background:persona===v?"#1e1b4b":"#141925",border:`1px solid ${persona===v?"#4338ca":"#2a3140"}`}}>
              <div style={{fontSize:13,fontWeight:700,color:"#c9d1d9"}}>{title}</div>
              <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{sub}</div>
            </div>)}
          </div>

          {/* Voice picker (only shown in voice mode) */}
          {sessionMode==="voice"&&<div style={{marginTop:20,paddingTop:18,borderTop:"1px solid #2a3140"}}>
            <div style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:.5,marginBottom:8}}>PROSPECT VOICE — PREVIEW BEFORE YOU COMMIT</div>
            <label style={{fontSize:10,color:"#64748b"}}>ELEVENLABS KEY <span style={{color:"#4b5563"}}>(natural AI voices — optional)</span></label>
            <div style={{display:"flex",gap:8,marginTop:6,marginBottom:14}}>
              <input value={elevenKey} onChange={e=>setElevenKey(e.target.value)} placeholder="sk_… paste key from elevenlabs.io/app/settings/api-keys" style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}/>
              <button className="btn" onClick={connectEleven}>Connect</button>
            </div>
            <label style={{fontSize:10,color:"#64748b",fontWeight:700,letterSpacing:.5}}>PROSPECT VOICE {elevenVoices.length>0&&<span style={{color:"#22c55e"}}>· {elevenVoices.length} ElevenLabs voices</span>}</label>
            <div style={{display:"flex",gap:8,marginTop:6}}>
              {elevenVoices.length>0
                ? <select value={elevenVoiceId} onChange={e=>setElevenVoiceId(e.target.value)} style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}>{elevenVoices.map(v=><option key={v.id} value={v.id}>{v.name}{v.labels?.accent?` · ${v.labels.accent}`:""}{v.labels?.gender?` · ${v.labels.gender}`:""}</option>)}</select>
                : <select value={voiceUri} onChange={e=>setVoiceUri(e.target.value)} style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}>{browserVoices.map(v=><option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}</select>}
              <button className="btn" onClick={previewVoice} title="Preview voice">▶</button>
            </div>
            <p style={{fontSize:10,color:"#4b5563",marginTop:8}}>{elevenVoices.length>0?"Using ElevenLabs natural AI voices — pick one above and preview it.":"Using free browser voices. Paste an ElevenLabs key and Connect for natural AI voices."}</p>
          </div>}
        </div>

        {/* Scenario */}
        <div className="card" style={{ padding: 24 }}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div className="section-head" style={{marginBottom:0}}>Pick a Scenario</div><button className="btn" onClick={()=>setShowCreator(true)} style={{fontSize:11,padding:"5px 10px"}}>+ New Scenario</button></div>
          <div className="flex-col gap-8">
            {scenariosForRole.map(s => (
              <div key={s.id} onClick={() => setScenarioId(s.id)} style={{ padding: "14px 16px", borderRadius: 10, cursor: "pointer", background: scenarioId === s.id ? "#1e1b4b" : "#141925", border: `1px solid ${scenarioId === s.id ? "#4338ca" : "#2a3140"}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#c9d1d9" }}>{s.title}</span>
                  <span style={{ fontSize: 10, color: "#64748b" }}>{s.target_role} · Tier {s.difficulty_tier}</span>
                </div>
              </div>
            ))}
            {!scenariosForRole.length && <div style={{ color: "#374151", fontSize: 13 }}>No scenarios for this role yet.</div>}
          </div>
          <button className="btn btn-primary" disabled={!repName || !scenarioId || busy} onClick={startSession} style={{ marginTop: 18, width: "100%", padding: "12px" }}>
            {busy ? "Starting…" : `Start ${sessionMode==="voice"?"Voice ":""}Practice Call →`}
          </button>
        </div>
      </div>
    );
  }
  // ─── LIVE ───
  if (phase === "live") {
    return (
      <div className="flex-col gap-16" style={{ maxWidth: 760 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 900, margin: 0 }}>{scenario?.title}</h2>
            <p style={{ fontSize: 11, color: "#374151", marginTop: 2 }}>{repName} practicing · in character</p>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn" onClick={()=>setVoiceOn(!voiceOn)} style={{background:voiceOn?"#1e1b4b":"",borderColor:voiceOn?"#4338ca":"",color:voiceOn?"#c7d2fe":""}} title="Prospect speaks aloud (ElevenLabs)">{voiceOn?"🔊 Voice on":"🔇 Voice off"}</button>
            <button className="btn btn-green" onClick={endSession} disabled={busy}>End & Score</button>
          </div>
        </div>
        <div className="card" ref={scrollRef} style={{ padding: 18, height: 440, overflowY: "auto" }}>
          {messages.length === 0 && <div style={{ color: "#374151", fontSize: 13, textAlign: "center", marginTop: 40 }}>
            You speak first — open the call.
          </div>}
          {messages.map((m, i) => (
            <div key={i} style={{ display: "flex", justifyContent: m.role === "rep" ? "flex-end" : "flex-start", marginBottom: 10 }}>
              <div style={{
                maxWidth: "75%", padding: "10px 14px", borderRadius: 12, fontSize: 13, lineHeight: 1.5,
                background: m.role === "rep" ? "#1e1b4b" : "#0d1117",
                border: `1px solid ${m.role === "rep" ? "#4338ca" : "#1e293b"}`,
                color: m.role === "rep" ? "#c7d2fe" : "#c9d1d9"
              }}>
                <div style={{ fontSize: 9, color: "#64748b", marginBottom: 3, fontWeight: 700 }}>
                  {m.role === "rep" ? "YOU" : "PROSPECT"}
                </div>
                {m.text}
              </div>
            </div>
          ))}
          {busy && <div style={{ color: "#64748b", fontSize: 12, fontStyle: "italic" }}>Prospect is thinking…</div>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {sessionMode==="voice"&&<button className="btn" onClick={toggleListen} title={listening?"Stop listening":"Talk to the prospect"} style={{background:listening?"#7f1d1d":"",borderColor:listening?"#ef4444":"",color:listening?"#fca5a5":"",minWidth:48}}>{listening?"⏺":"🎤"}</button>}
          <input value={draft} onChange={e => setDraft(e.target.value)}
            onKeyDown={e => e.key === "Enter" && sendTurn()}
            placeholder={listening?"Listening… speak now":"Your line…"} disabled={busy}
            style={{ flex: 1, padding: "10px 14px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, color: "var(--t1)", fontSize: 13 }} />
          <button className="btn btn-primary" onClick={sendTurn} disabled={busy || !draft.trim()}>Send</button>
        </div>
      </div>
    );
  }

  // ─── SCORED ───
  const c = score || {};
  const cats = c.category_scores || {};
  return (
    <div className="flex-col gap-20" style={{ maxWidth: 760 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h2 style={{ fontSize: 24, fontWeight: 900, margin: 0 }}>Practice Scorecard</h2>
        <button className="btn" onClick={reset}>← New Practice</button>
      </div>
      <div className="card" style={{ padding: 24, display: "flex", alignItems: "center", gap: 20 }}>
        <ScoreRing value={c.overall_score_adj} size={72} sw={4.5} />
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#c9d1d9" }}>{scenario?.title}</div>
          <div style={{ fontSize: 11, color: "#374151", marginTop: 4 }}>
            {repName} · scored on rubric v{c.rubric_version} · same engine as real calls
          </div>
        </div>
      </div>
      {Object.keys(cats).length > 0 && (
        <div className="card" style={{ padding: 20 }}>
          <div className="section-head" style={{ marginBottom: 14 }}>Categories</div>
          {CATS.filter(cat => cats[cat] != null).map(cat => (
            <div key={cat} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600, width: 130 }}>{CL[cat] || cat}</span>
              <div style={{ flex: 1 }}><MiniBar value={cats[cat]} /></div>
            </div>
          ))}
        </div>
      )}
      {c.pass_fail?.deductions?.length > 0 && (
        <div className="card" style={{ padding: 18 }}>
          <div className="section-head" style={{ marginBottom: 10 }}>⚠ Deductions</div>
          {c.pass_fail.deductions.map((d, i) => (
            <div key={i} style={{ display: "flex", gap: 10, padding: "8px 12px", marginBottom: 6, background: d.severity === "critical" ? "#1a0a0a" : "#1a1400", borderRadius: 8, border: `1px solid ${d.severity === "critical" ? "#991b1b" : "#92400e"}` }}>
              <span style={{ fontSize: 18, fontWeight: 900, color: d.severity === "critical" ? "#ef4444" : "#f59e0b", minWidth: 36 }}>{d.points}</span>
              <div><div style={{ fontSize: 12, fontWeight: 700, color: "#c9d1d9" }}>{d.label}</div><div style={{ fontSize: 10, color: "#64748b" }}>{d.source}</div></div>
            </div>
          ))}
        </div>
      )}
      {c.coaching_notes && (
        <div className="card" style={{ padding: 20 }}>
          <div className="section-head" style={{ marginBottom: 10 }}>Coaching</div>
          <div style={{ fontSize: 13, color: "#94a3b8", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{c.coaching_notes}</div>
        </div>
      )}
    </div>
  );
}

  </div>}

  return<div className="flex-col gap-20" style={{maxWidth:820}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>

      <select value={rep} onChange={e=>setRep(e.target.value)} style={{padding:"7px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}><option value="">All reps</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select>
    </div>
    {!sessions&&<div style={{padding:40,textAlign:"center",color:"#374151"}}>Loading…</div>}
    {sessions&&sessions.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#64748b"}}>No practice sessions yet. Head to the <b>Train</b> tab to start one.</div>}
    {sessions&&sessions.map(s=><div key={s.id} onClick={()=>s.status==="scored"&&setDetail(s)} className="card" style={{padding:"16px 20px",cursor:s.status==="scored"?"pointer":"default",display:"flex",alignItems:"center",gap:16}}>
      {s.status==="scored"?<ScoreRing value={s.overall_score_adj} size={40} sw={3}/>:<div style={{width:40,height:40,borderRadius:"50%",border:"2px dashed #374151",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#374151"}}>{s.status==="in_progress"?"…":"—"}</div>}
      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#c9d1d9"}}>{s.scenario_id}</div><div style={{fontSize:11,color:"#374151"}}>{s.rep_name} · {s.created_at}{s.status!=="scored"?` · ${s.status}`:""}</div></div>
      {s.status==="scored"&&<span style={{fontSize:11,color:"#64748b"}}>Review →</span>}
    </div>)}
  </div>
}

function ResourcesPage(){

  const[content,setContent]=useState(null);
  const[loading,setLoading]=useState(false);

  if(active&&content){return<div className="flex-col gap-16" style={{maxWidth:820}}>
    <button className="btn" onClick={()=>{setActive(null);setContent(null)}} style={{alignSelf:"flex-start"}}>← All manuals</button>

  </div>}
  return<div className="flex-col gap-20" style={{maxWidth:820}}>
    <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Resources</h2><p style={{fontSize:12,color:"#64748b",marginTop:4}}>The training manuals behind the rubric. Read these to understand what great looks like — then see it reflected in your scores.</p></div>
    {!manuals&&<div style={{padding:40,textAlign:"center",color:"#374151"}}>Loading…</div>}
    <div className="grid" style={{gridTemplateColumns:"1fr 1fr",gap:14}}>
      {(manuals||[]).map(m=><div key={m.id} onClick={()=>open(m.id)} className="card" style={{padding:22,cursor:"pointer",transition:"all .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#4338ca"} onMouseLeave={e=>e.currentTarget.style.borderColor=""}>
        <div style={{fontSize:30,marginBottom:10}}>{m.icon}</div>
        <div style={{fontSize:15,fontWeight:800,color:"#c9d1d9",marginBottom:4}}>{m.title}</div>
        <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>{m.subtitle}</div>
        <div style={{marginTop:12}}><span className="badge" style={{background:"#1e1b4b",color:"#a5b4fc",border:"1px solid #4338ca55",fontSize:9}}>{CL[m.category]||m.category}</span></div>
      </div>)}
    </div>
    {loading&&<div style={{padding:20,textAlign:"center",color:"#374151"}}>Opening…</div>}
  </div>
}

const NAV=[{id:"dashboard",icon:"◉",label:"Dashboard",color:"#818cf8"},{id:"analytics",icon:"📊",label:"Analytics",color:"#34d399"},{id:"coaching",icon:"🎯",label:"Coaching",color:"#f59e0b"},{id:"progress",icon:"📈",label:"My Progress",color:"#4ade80"},{id:"train",icon:"🥊",label:"Train",color:"#22c55e"},{id:"history",icon:"📊",label:"Practice Log",color:"#14b8a6"},{id:"calls",icon:"📞",label:"Calls",color:"#60a5fa"},{id:"rubric",icon:"📏",label:"Rubric",color:"#a855f7"},{id:"resources",icon:"📚",label:"Resources",color:"#f59e0b"},{id:"records",icon:"📋",label:"Non-Sales",color:"#94a3b8"},{id:"queue",icon:"☰",label:"Queue",color:"#a78bfa"},{id:"health",icon:"♥",label:"Health",color:"#f472b6"},{id:"team",icon:"👥",label:"Team",color:"#818cf8"},{id:"stitch",icon:"🔗",label:"Stitching",color:"#2dd4bf"},{id:"calibration",icon:"🎯",label:"Calibration",color:"#a5b4fc"},{id:"export",icon:"📥",label:"Reports",color:"#22d3ee"},{id:"about",icon:"ℹ",label:"About",color:"#64748b"}];

function RubricViewer(){
  const[rb,setRb]=useState(null);const[role,setRole]=useState("Closer");
  React.useEffect(()=>{fetch(`${API}/rubric`).then(r=>r.json()).then(setRb).catch(()=>setRb(null))},[]);
  if(!rb)return null;
  const items=(rb.items||[]).filter(i=>i.role===role);
  const beliefs=[["Pain","A real problem or gap"],["Doubt","What's held them back from doing it themselves"],["Desire","The goals they want to achieve"],["Cost","What it's cost them in time/money"],["Money","How much they'll invest, and how"],["Support","Spouse / partner / investors involved"],["Trust","Why us vs. other companies"]];
  return<div className="flex-col gap-16">
    <div className="card" style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div className="section-head" style={{margin:0}}>The Rubric · v{rb.version}</div>
        <div style={{display:"flex",gap:6}}>{["Closer","Setter"].map(r=><button key={r} onClick={()=>setRole(r)} className="btn" style={{padding:"5px 14px",fontSize:12,background:role===r?"#1e1b4b":"",borderColor:role===r?"#4338ca":"",color:role===r?"#c7d2fe":""}}>{r}</button>)}</div>
      </div>
      <p style={{fontSize:12,color:"#64748b",marginTop:-8,marginBottom:18}}>This is exactly what the bot scores every {role.toLowerCase()} call against. Weights sum to 100. Read the Resources tab for the full how-to behind each.</p>
      {items.map(it=><div key={it.category} style={{padding:"16px 18px",background:"#141925",borderRadius:12,border:"1px solid #2a3140",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:15,fontWeight:800,color:"#c9d1d9"}}>{CL[it.category]||it.category}</span>
          <span className="badge" style={{background:"#1e1b4b",color:"#a5b4fc",border:"1px solid #4338ca55"}}>{it.weight}%</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{padding:"10px 12px",background:"#0f1a14",borderRadius:8,border:"1px solid #14331f"}}><div style={{fontSize:9,fontWeight:700,color:"#22c55e",marginBottom:4,letterSpacing:.5}}>✓ STRONG (9–10)</div><div style={{fontSize:12,color:"#94a3b8",lineHeight:1.55}}>{it.score_10||it.good}</div></div>
          <div style={{padding:"10px 12px",background:"#140a0a",borderRadius:8,border:"1px solid #331414"}}><div style={{fontSize:9,fontWeight:700,color:"#ef4444",marginBottom:4,letterSpacing:.5}}>✗ WEAK (1–3)</div><div style={{fontSize:12,color:"#94a3b8",lineHeight:1.55}}>{it.score_1||it.bad}</div></div>
        </div>
      </div>)}
    </div>
    <div className="card" style={{padding:24}}>
      <div className="section-head">The 7 Beliefs</div>
      <p style={{fontSize:12,color:"#64748b",marginTop:-8,marginBottom:16}}>A 10/10 call uncovers all seven. The bot tracks which were covered on every call.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {beliefs.map(([b,d],i)=><div key={b} style={{display:"flex",gap:12,padding:"10px 14px",background:"#141925",borderRadius:10,border:"1px solid #2a3140"}}><span style={{fontSize:16,fontWeight:900,color:"#4338ca",fontFamily:"var(--m)"}}>{i+1}</span><div><div style={{fontSize:13,fontWeight:700,color:"#c9d1d9"}}>{b}</div><div style={{fontSize:11,color:"#64748b"}}>{d}</div></div></div>)}
      </div>
    </div>
  </div>
}

function RubricPage(){
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);
  const[scope,setScope]=useState('all');const[days,setDays]=useState(30);
  const[estimate,setEstimate]=useState(null);const[running,setRunning]=useState(false);
  async function loadData(){setLoading(true);const r=await fetch(`${API}/rubric-comparison`).then(r=>r.json()).catch(()=>null);setData(r);setLoading(false);}
  async function loadEstimate(){const qs=scope==='recent'?`?scope=recent&days=${days}`:'?scope=all';const r=await fetch(`${API}/rescore-estimate${qs}`).then(r=>r.json()).catch(()=>null);setEstimate(r);}
  React.useEffect(()=>{loadData()},[]);
  React.useEffect(()=>{loadEstimate()},[scope,days]);
  async function rescore(){
    if(!estimate||!estimate.count)return alert('No calls to re-score');
    if(!confirm(`Re-score ${estimate.count} calls?\n\nEstimated cost: $${estimate.estimatedCost}\nCurrent scores will be archived into Score History before re-scoring.\n\nProceed?`))return;
    setRunning(true);
    try{
      const endpoint=scope==='recent'?'/calls/rescore-recent':'/calls/rescore-all';
      const body=scope==='recent'?{days}:{};
      const r=await fetch(`${API}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
      alert(`✓ ${r.queued} calls queued for re-score.\n\nThey'll process on the next worker cycles (every 2 minutes). Check the Queue page for progress.`);
      loadData();
    }catch(e){alert('Error: '+e.message)}
    setRunning(false);
  }
  if(loading)return<div style={{padding:60,textAlign:"center",color:"#374151"}}>Loading rubric data...</div>;
  const current=data?.current||[];const comparisons=data?.perCallComparisons||[];
  return<div className="flex-col gap-20">
    <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Rubric & Re-scoring</h2><p style={{fontSize:12,color:"#374151",marginTop:4}}>Re-score calls with the current rubric, compare versions, and view score history</p></div>
    <RubricViewer/>
    
    <div className="card" style={{padding:24}}>
      <div className="section-head" style={{marginBottom:14}}>Re-score Calls</div>
      <div style={{background:"#141925",padding:14,borderRadius:8,border:"1px solid #2a3140",marginBottom:14}}>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>Current scores are automatically archived into Score History before re-scoring. You can compare v1 vs v2 scores side-by-side after re-running.</div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
          <label style={{fontSize:11,color:"#64748b"}}>Scope:</label>
          <select value={scope} onChange={e=>setScope(e.target.value)} style={{background:"#1a1f2b",border:"1px solid #2a3140",borderRadius:6,padding:"6px 10px",color:"#c9d1d9",fontSize:11}}>
            <option value="all">All scored calls</option>
            <option value="recent">Last X days</option>
          </select>
          {scope==='recent'&&<input type="number" value={days} onChange={e=>setDays(Number(e.target.value))} min="1" max="365" style={{background:"#1a1f2b",border:"1px solid #2a3140",borderRadius:6,padding:"6px 10px",color:"#c9d1d9",fontSize:11,width:70}}/>}
          {scope==='recent'&&<span style={{fontSize:11,color:"#64748b"}}>days</span>}
        </div>
        {estimate&&<div style={{display:"flex",gap:14,alignItems:"center",fontSize:12,color:"#c9d1d9",marginBottom:10}}>
          <div>📊 <b>{estimate.count}</b> calls will be re-scored</div>
          <div>💰 Estimated cost: <b style={{color:"#22c55e"}}>${estimate.estimatedCost}</b></div>
        </div>}
        <button className="btn btn-primary" onClick={rescore} disabled={running||!estimate?.count}>{running?'Queuing...':`↻ Re-score ${estimate?.count||0} calls`}</button>
      </div>
      <div style={{fontSize:11,color:"#64748b",fontStyle:"italic"}}>Tip: To re-score only selected calls, use the checkboxes on the Calls page and choose "Re-score selected" there.</div>
    </div>

    <div className="card" style={{padding:24}}>
      <div className="section-head" style={{marginBottom:14}}>Rubric Version Stats</div>
      {current.length===0?<div style={{fontSize:12,color:"#64748b"}}>No scored calls yet</div>:<div style={{display:"flex",flexDirection:"column",gap:10}}>{current.map(v=><div key={v.rubric_version} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"#141925",borderRadius:8,border:"1px solid #2a3140"}}>
        <div style={{minWidth:60,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:"#a855f7",fontFamily:"var(--m)"}}>v{v.rubric_version}</div>
          <div style={{fontSize:9,color:"#4b5563"}}>rubric</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:"#c9d1d9"}}>{Number(v.count)} scored calls</div>
          <div style={{fontSize:10,color:"#64748b"}}>Avg score: {v.avg_score?Number(v.avg_score).toFixed(1):'—'}/10 · Discovery: {v.avg_discovery?Number(v.avg_discovery).toFixed(1):'—'} · Qualification: {v.avg_qual?Number(v.avg_qual).toFixed(1):'—'} · Pitch: {v.avg_pitch?Number(v.avg_pitch).toFixed(1):'—'}</div>
        </div>
      </div>)}</div>}
    </div>

    {comparisons.length>0&&<div className="card" style={{padding:24}}>
      <div className="section-head" style={{marginBottom:14}}>📈 Per-Call Comparison (v1 → v2)</div>
      <div style={{fontSize:11,color:"#64748b",marginBottom:12}}>Showing {comparisons.length} calls that have been scored under multiple rubric versions. Delta = current score minus previous score.</div>
      <div style={{maxHeight:500,overflowY:"auto"}}>{comparisons.map(c=>{const delta=Number(c.delta)||0;const deltaColor=delta>0.5?"#22c55e":delta<-0.5?"#ef4444":"#f59e0b";return<div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderBottom:"1px solid #141925"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:"#c9d1d9"}}>{c.rep_name} → {c.client_name||'?'}</div>
          <div style={{fontSize:10,color:"#4b5563"}}>{fmtF(c.received_at)}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:12,fontFamily:"var(--m)"}}>
          <span style={{color:"#64748b"}}>v{c.previous_version}: <b style={{color:"#94a3b8"}}>{Number(c.previous_score).toFixed(1)}</b></span>
          <span style={{color:"#4b5563"}}>→</span>
          <span style={{color:"#64748b"}}>v{c.current_version}: <b style={{color:"#c9d1d9"}}>{Number(c.current_score).toFixed(1)}</b></span>
          <span style={{color:deltaColor,fontWeight:800,minWidth:44,textAlign:"right"}}>{delta>0?'+':''}{delta.toFixed(1)}</span>
        </div>
      </div>})}</div>
    </div>}
  </div>
}

function App(){
  const validPages=NAV.map(n=>n.id);
  const pageFromHash=()=>{const h=(window.location.hash||"").replace(/^#\/?/,"");return validPages.includes(h)?h:"dashboard";};
  const[pg,sPgRaw]=useState(pageFromHash());const[dt,sDt]=useState(null);
  // Navigating sets the hash; a hashchange listener (below) syncs state — so this
  // also covers browser back/forward and direct links like yoursite.com/#/team
  const sPg=(id)=>{ if(typeof id==="function")id=id(pg); window.location.hash="/"+id; sPgRaw(id); };
  useEffect(()=>{
    const onHash=()=>{const p=pageFromHash(); sPgRaw(p); sDt(null);};
    window.addEventListener("hashchange",onHash);
    // ensure the hash reflects the initial page on first load
    if(!window.location.hash) window.location.hash="/"+pg;
    return()=>window.removeEventListener("hashchange",onHash);
  // eslint-disable-next-line
  },[]);
  return<><aside><div style={{padding:"18px 20px",display:"flex",alignItems:"center",gap:11,borderBottom:"1px solid #2a3140"}}><div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff"}}>Q</div><span style={{fontSize:15,fontWeight:900,letterSpacing:-.3}}>Turnkey QC</span></div><nav style={{flex:1,padding:"14px 6px",display:"flex",flexDirection:"column",gap:2}}>{NAV.map(n=><button key={n.id} className={pg===n.id?"active":""} onClick={()=>{sPg(n.id);sDt(null)}} style={pg===n.id?{color:n.color,background:`${n.color}12`,borderLeftColor:n.color}:{}}><span style={{fontSize:14,width:22,textAlign:"center",flexShrink:0}}>{n.icon}</span><span>{n.label}</span></button>)}</nav><div style={{padding:"14px 16px",borderTop:"1px solid #2a3140"}}><div style={{fontSize:12,fontWeight:700,color:"#c9d1d9"}}>Sam & Francis</div><div style={{fontSize:10,color:"#6366f1",fontFamily:"var(--m)"}}>ADMIN</div></div></aside>
    <main><div className="max-w">{dt?<CallDetail call={dt} onBack={()=>sDt(null)}/>:pg==="dashboard"?<Dashboard/>:pg==="analytics"?<AnalyticsPage/>:pg==="coaching"?<CoachingPage/>:pg==="progress"?<MyProgressPage/>:pg==="train"?<TrainPage/>:pg==="history"?<PracticeHistoryPage/>:pg==="calls"?<CallsList onSelect={sDt}/>:pg==="rubric"?<RubricPage/>:pg==="resources"?<ResourcesPage/>:pg==="records"?<RecordsPage/>:pg==="queue"?<QueuePage/>:pg==="health"?<HealthPage/>:pg==="team"?<TeamPage/>:pg==="stitch"?<StitchPage/>:pg==="calibration"?<CalibrationPage/>:pg==="export"?<ExportPage/>:pg==="about"?<AboutPage/>:null}</div></main></>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

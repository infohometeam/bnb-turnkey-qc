  const [session, setSession] = React.useState(null);
  const [scenario, setScenario] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [draft, setDraft] = React.useState("");
  const [busy, setBusy] = React.useState(false);
  const [score, setScore] = React.useState(null);
  const { data: scenarios, reload: reloadScenarios } = useApi("/practice/scenarios");
  const { data: reps } = useApi("/reps");
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, busy]);

  // Load browser TTS voices (free, no key needed)
  React.useEffect(() => {
    function loadVoices(){ const v = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; if(v.length){ setBrowserVoices(v); if(!voiceUri) setVoiceUri(v[0].voiceURI); } }
    loadVoices();
    if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;
    // Also try loading ElevenLabs voices from the SERVER key (so the team gets them without pasting)
    fetch(`${API}/practice/voices`).then(r=>r.json()).then(d=>{
      if(d.configured && d.voices && d.voices.length){ setElevenVoices(d.voices); setElevenVoiceId(pickVoiceForPersona(d.voices, persona)); }
    }).catch(()=>{});
  }, []);

  // Speak text — ElevenLabs (chosen voice) if key present, else browser voice (free)
  function speakText(text){
    // Use ElevenLabs if we have a client key OR the server has voices loaded (server key present).
    const useEleven = elevenKey || elevenVoiceId || elevenVoices.length>0;
    if(useEleven){
      const headers={"Content-Type":"application/json"};
      if(elevenKey) headers["x-eleven-key"]=elevenKey; // else server uses its env key
      fetch(`${API}/practice/tts`,{method:"POST",headers,body:JSON.stringify({text,voiceId:elevenVoiceId||undefined})})
        .then(r=>r.ok?r.arrayBuffer():Promise.reject())
        .then(buf=>{const ctx=new (window.AudioContext||window.webkitAudioContext)();return ctx.decodeAudioData(buf).then(d=>{const s=ctx.createBufferSource();s.buffer=d;s.connect(ctx.destination);s.start(0)})})
        .catch(()=>browserSpeak(text));
    } else browserSpeak(text);
  }
  function browserSpeak(text){
    if(!window.speechSynthesis)return;
    const u=new SpeechSynthesisUtterance(text);
    const v=browserVoices.find(x=>x.voiceURI===voiceUri); if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  }
  function previewVoice(){ speakText("Hi, thanks for taking the time to chat with me today about the investment opportunity."); }
  // Pick an ElevenLabs voice matching the persona's leading gender
  function pickVoiceForPersona(voices, p){
    if(!voices||!voices.length) return "";
    const wantMale = p==="male" || p==="couple_husband";
    const wantFemale = p==="female" || p==="couple_wife";
    const g = wantMale ? "male" : wantFemale ? "female" : null;
    if(g){ const match = voices.find(v => (v.labels?.gender||"").toLowerCase()===g); if(match) return match.id; }
    return voices[0].id;
  }
  function choosePersona(p){ setPersona(p); if(elevenVoices.length) setElevenVoiceId(pickVoiceForPersona(elevenVoices, p)); }

  // Connect ElevenLabs — fetch the account's voices so the user can choose one
  async function connectEleven(){
    if(!elevenKey){alert("Paste your ElevenLabs key first.");return;}
    try{
      const r=await fetch(`${API}/practice/voices`,{headers:{"x-eleven-key":elevenKey}}).then(r=>r.json());
      if(r.voices&&r.voices.length){setElevenVoices(r.voices);setElevenVoiceId(pickVoiceForPersona(r.voices, persona));}
      else alert("Connected, but no voices found (check the key).");
    }catch(e){alert("Could not connect to ElevenLabs — check the key.");}
  }

  // Speech-to-text — rep talks instead of types (voice mode)
  function toggleListen(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Speech recognition isn't supported in this browser. Try Chrome.");return;}
    if(listening){ recognitionRef.current&&recognitionRef.current.stop(); setListening(false); return; }
    const rec=new SR(); rec.lang="en-US"; rec.interimResults=true; rec.continuous=false;
    let finalText="";
    rec.onresult=(e)=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)finalText+=t;else interim+=t;}setDraft((finalText+" "+interim).trim());};
    rec.onend=()=>{setListening(false);};
    rec.onerror=()=>{setListening(false);};
    recognitionRef.current=rec; rec.start(); setListening(true);
  }

  async function startSession() {
    if (!repName || !scenarioId) return;
    setBusy(true);
    try {
      const r = await fetch(`${API}/practice/start`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ rep_name: repName, scenario_id: scenarioId, difficulty_overrides: { difficulty, persona }, business_unit: businessUnit })
      }).then(r => r.json());
      setSession({ id: r.session_id });
      setScenario(r.scenario);
      setMessages([]);
      setPhase("live");
    } catch (e) { alert("Could not start: " + e.message); }
    setBusy(false);
  }

  async function sendTurn() {
    if (!draft.trim() || busy) return;
    const myText = draft.trim();
    setDraft("");
    setMessages(m => [...m, { role: "rep", text: myText }]);
    setBusy(true);
    try {
      const r = await fetch(`${API}/practice/${session.id}/message`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: myText })
      }).then(r => r.json());
      if (r.prospect) { setMessages(m => [...m, { role: "prospect", text: r.prospect }]); if (sessionMode==="voice") speakText(r.prospect); }
      if (r.ended) endSession();
    } catch (e) { alert("Error: " + e.message); }
    setBusy(false);
  }

  async function speak(text){
    try{
      const res=await fetch(`${API}/practice/tts`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
      if(!res.ok)return;
      const buf=await res.arrayBuffer();
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const decoded=await ctx.decodeAudioData(buf);
      const src=ctx.createBufferSource();src.buffer=decoded;src.connect(ctx.destination);src.start(0);
    }catch(e){}
  }

  async function endSession() {
    setBusy(true);
    try {
      const r = await fetch(`${API}/practice/${session.id}/end`, {
        method: "POST", headers: { "Content-Type": "application/json" }, body: "{}"
      }).then(r => r.json());
      const full = await fetch(`${API}/practice/${session.id}`).then(r => r.json());
      setScore(full);
      setPhase("scored");
    } catch (e) { alert("Could not score: " + e.message); }
    setBusy(false);
  }

  function reset() {
    setPhase("setup"); setSession(null); setScenario(null);
    setMessages([]); setScore(null); setScenarioId("");
  }

  // ─── SETUP (1b Cockpit) ───
  if (phase === "setup") {
    const BUSINESS_UNITS = ["BNB Turnkey","BNB Investor Academy","Hotel Turnkey","Property Management","Legacy Business Services","Surge Tax"];
    const DIFFICULTIES = [["standard","Standard"],["hard","Hard (objection-heavy)"],["extreme","Extreme (cold/hostile)"]];
    const PERSONAS = [["male","Male","Single DM"],["female","Female","Single DM"],["couple_husband","Couple — husband","Wife doubts"],["couple_wife","Couple — wife","Husband on price"]];
    const scenariosForRole = (scenarios?.scenarios || []).filter(s => !repRole || s.target_role === repRole || s.target_role === "Both");
    const selScenario = scenariosForRole.find(s => s.id === scenarioId);
    const selLabel = "1px solid var(--border)", labelStyle = {fontSize:10,color:"var(--t3)",fontWeight:700,letterSpacing:.5};
    const selStyle = {width:"100%",marginTop:6,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)"};
    return (
      <div className="flex-col gap-16">
        {showCreator&&<ScenarioCreator onClose={()=>setShowCreator(false)} onCreated={reloadScenarios}/>}
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 900, margin: 0 }}>New practice call</h2>
          <p style={{ fontSize: 12, color: "var(--t3)", marginTop: 4 }}>Set it up and see your prospect before you dial — scored on the same rubric as real calls.</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) 340px",gap:16,alignItems:"start"}}>
          {/* LEFT — config */}
          <div className="flex-col gap-14">
            {/* Who's practicing */}
            <div className="card" style={{ padding: "16px 18px" }}>
              <div className="lbl" style={{marginBottom:12}}>Who's practicing</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={labelStyle}>NAME</label>
                  <select value={repName} onChange={e=>{setRepName(e.target.value);const r=(reps||[]).find(x=>x.name===e.target.value);if(r)setRepRole(r.role)}} style={selStyle}><option value="">Select rep…</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select></div>
                <div><label style={labelStyle}>ROLE</label>
                  <select value={repRole} onChange={e=>setRepRole(e.target.value)} style={selStyle}><option>Setter</option><option>Closer</option></select></div>
                <div><label style={labelStyle}>BUSINESS UNIT</label>
                  <select value={businessUnit} onChange={e=>setBusinessUnit(e.target.value)} style={selStyle}>{BUSINESS_UNITS.map(b=><option key={b}>{b}</option>)}</select></div>
                <div><label style={labelStyle}>DIFFICULTY</label>
                  <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} style={selStyle}>{DIFFICULTIES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
              </div>
            </div>
            {/* Mode + voice */}
            <div className="card" style={{ padding: "16px 18px" }}>
              <div className="lbl" style={{marginBottom:10}}>Mode</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:sessionMode==="voice"?14:0}}>
                {[["text","💬 Text chat"],["voice","🎙 Voice call"]].map(([v,l])=><button key={v} onClick={()=>setSessionMode(v)} className="btn" style={{padding:"10px",background:sessionMode===v?"#1e1b4b":"",borderColor:sessionMode===v?"#4338ca":"",color:sessionMode===v?"#c7d2fe":""}}>{l}</button>)}
              </div>
              {sessionMode==="voice"&&<div style={{paddingTop:14,borderTop:"1px solid var(--border)"}}>
                <label style={labelStyle}>ELEVENLABS KEY <span style={{color:"var(--t4)",fontWeight:400}}>(natural AI voices — optional)</span></label>
                <div style={{display:"flex",gap:8,marginTop:6,marginBottom:12}}>
                  <input value={elevenKey} onChange={e=>setElevenKey(e.target.value)} placeholder="sk_… paste key from elevenlabs.io" style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}/>
                  <button className="btn" onClick={connectEleven}>Connect</button>
                </div>
                <label style={labelStyle}>PROSPECT VOICE {elevenVoices.length>0&&<span style={{color:"#22c55e"}}>· {elevenVoices.length} ElevenLabs voices</span>}</label>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  {elevenVoices.length>0
                    ? <select value={elevenVoiceId} onChange={e=>setElevenVoiceId(e.target.value)} style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}>{elevenVoices.map(v=><option key={v.id} value={v.id}>{v.name}{v.labels?.accent?` · ${v.labels.accent}`:""}{v.labels?.gender?` · ${v.labels.gender}`:""}</option>)}</select>
                    : <select value={voiceUri} onChange={e=>setVoiceUri(e.target.value)} style={{flex:1,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}>{browserVoices.map(v=><option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>)}</select>}
                  <button className="btn" onClick={previewVoice} title="Preview voice">▶</button>
                </div>
                <p style={{fontSize:10,color:"var(--t4)",marginTop:7}}>{elevenVoices.length>0?"Natural AI voices — pick one and preview.":"Free browser voices otherwise. Paste a key + Connect for natural voices."}</p>
              </div>}
            </div>
            {/* Persona */}
            <div className="card" style={{ padding: "16px 18px" }}>
              <div className="lbl" style={{marginBottom:10}}>Persona</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {PERSONAS.map(([v,title,sub])=><div key={v} onClick={()=>choosePersona(v)} style={{padding:"11px 13px",borderRadius:10,cursor:"pointer",background:persona===v?"#1e1b4b":"var(--bg)",border:`1px solid ${persona===v?"#4338ca":"var(--border)"}`}}>
                  <div style={{fontSize:12.5,fontWeight:700,color:persona===v?"#c7d2fe":"var(--t2)"}}>{title}</div>
                  <div style={{fontSize:10,color:"var(--t3)",marginTop:2,fontFamily:"var(--m)"}}>{sub}</div>
                </div>)}
              </div>
            </div>
          </div>
          {/* RIGHT — scenario + preview + start */}
          <div className="flex-col gap-12" style={{position:"sticky",top:16}}>
            <div className="card" style={{ padding: "16px 18px" }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div className="lbl" style={{marginBottom:0}}>Scenario</div><button className="btn" onClick={()=>setShowCreator(true)} style={{fontSize:11,padding:"4px 9px"}}>+ New</button></div>
              <div className="flex-col gap-6" style={{maxHeight:200,overflowY:"auto"}}>
                {scenariosForRole.map(s => (
                  <div key={s.id} onClick={() => setScenarioId(s.id)} style={{ padding: "9px 12px", borderRadius: 9, cursor: "pointer", background: scenarioId === s.id ? "#1e1b4b" : "var(--bg)", border: `1px solid ${scenarioId === s.id ? "#4338ca" : "var(--border)"}`, display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: scenarioId===s.id?"#c7d2fe":"var(--t2)" }}>{s.title}</span>
                    <span className="mono" style={{ fontSize: 9, color: "var(--t3)", flexShrink:0 }}>{s.target_role} · T{s.difficulty_tier}</span>
                  </div>
                ))}
                {!scenariosForRole.length && <div style={{ color: "var(--t3)", fontSize: 12 }}>No scenarios for this role yet — click + New.</div>}
              </div>
              {selScenario&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                <div className="lbl" style={{marginBottom:6,color:"#818cf8"}}>Preview · {selScenario.title}</div>
                <div style={{fontSize:11,color:"var(--t2)",lineHeight:1.55}}>{selScenario.persona_description||selScenario.description||selScenario.situation||"Scenario briefing loads when you start the call."}{selScenario.hidden_truth&&<span style={{color:"var(--t4)",fontStyle:"italic"}}> · Hidden truth stays hidden from the rep.</span>}</div>
              </div>}
            </div>
            <button className="btn btn-primary" disabled={!repName || !scenarioId || busy} onClick={startSession} style={{ width: "100%", padding: "14px", fontSize:14, fontWeight:800 }}>
              {busy ? "Starting…" : `Start ${sessionMode==="voice"?"Voice ":""}Practice Call →`}
            </button>
            {(!repName||!scenarioId)&&<div style={{fontSize:10,color:"var(--t4)",textAlign:"center"}}>{!repName?"Pick who's practicing":"Pick a scenario"} to start</div>}
          </div>
        </div>
      </div>
    );
  }
  // ─── LIVE (2a) ───
  if (phase === "live") {
    const initial=(scenario?.title||"P").trim()[0]||"P";
    return (
      <div className="flex-col gap-16" style={{ maxWidth: 940 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap:"wrap", gap:10 }}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:"#4338ca",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"#fff"}}>{initial}</div>
            <div>
              <h2 style={{ fontSize: 17, fontWeight: 800, margin: 0 }}>{scenario?.title}</h2>
              <p className="mono" style={{ fontSize: 10, color: "var(--t3)", marginTop: 2 }}>{repName} · {repRole} · in character{sessionMode==="voice"?" · voice":""}</p>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span className="mono" style={{fontSize:12,color:"var(--t2)",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,padding:"6px 11px"}}>⏱ {String(Math.floor(elapsed/60)).padStart(2,"0")}:{String(elapsed%60).padStart(2,"0")}</span>
            <button className="btn" onClick={()=>setVoiceOn(!voiceOn)} style={{background:voiceOn?"#1e1b4b":"",borderColor:voiceOn?"#4338ca":"",color:voiceOn?"#c7d2fe":""}} title="Prospect speaks aloud (ElevenLabs)">{voiceOn?"🔊 Voice on":"🔇 Voice off"}</button>
            <button className="btn btn-green" onClick={endSession} disabled={busy}>End & Score</button>
          </div>
        </div>
        <div className="card" ref={scrollRef} style={{ padding: 18, height: 440, overflowY: "auto" }}>
          {messages.length === 0 && <div style={{ color: "var(--t3)", fontSize: 13, textAlign: "center", marginTop: 40 }}>
            You speak first — open the call.
          </div>}
          {messages.map((m, i) => (
            <div key={i} style={{ display: "flex", justifyContent: m.role === "rep" ? "flex-end" : "flex-start", marginBottom: 10 }}>
              <div style={{
                maxWidth: "75%", padding: "10px 14px", borderRadius: 12, fontSize: 13, lineHeight: 1.5,
                background: m.role === "rep" ? "#1e1b4b" : "#0d1117",
                border: `1px solid ${m.role === "rep" ? "#4338ca" : "#1e293b"}`,
                color: m.role === "rep" ? "#c7d2fe" : "var(--t2)"
              }}>
                <div style={{ fontSize: 9, color: "var(--t3)", marginBottom: 3, fontWeight: 700 }}>
                  {m.role === "rep" ? "YOU" : "PROSPECT"}
                </div>
                {m.text}
              </div>
            </div>
          ))}
          {busy && <div style={{ color: "var(--t3)", fontSize: 12, fontStyle: "italic" }}>Prospect is thinking…</div>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {sessionMode==="voice"&&<button className="btn" onClick={toggleListen} title={listening?"Stop listening":"Talk to the prospect"} style={{background:listening?"#7f1d1d":"",borderColor:listening?"#ef4444":"",color:listening?"#fca5a5":"",minWidth:48}}>{listening?"⏺":"🎤"}</button>}
          <input value={draft} onChange={e => setDraft(e.target.value)}
            onKeyDown={e => e.key === "Enter" && sendTurn()}
            placeholder={listening?"Listening… speak now":"Your line…"} disabled={busy}
            style={{ flex: 1, padding: "10px 14px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, color: "var(--t1)", fontSize: 13 }} />
          <button className="btn btn-primary" onClick={sendTurn} disabled={busy || !draft.trim()}>Send</button>
        </div>
      </div>
    );
  }

  // ─── SCORED ───
  const c = score || {};
  const cats = c.category_scores || {};
  return (
    <div className="flex-col gap-20" style={{ maxWidth: 760 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h2 style={{ fontSize: 24, fontWeight: 900, margin: 0 }}>Practice Scorecard</h2>
        <button className="btn" onClick={reset}>← New Practice</button>
      </div>
      <div className="card" style={{ padding: 24, display: "flex", alignItems: "center", gap: 20 }}>
        <ScoreRing value={c.overall_score_adj} size={72} sw={4.5} />
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: "var(--t2)" }}>{scenario?.title}</div>
          <div style={{ fontSize: 11, color: "#374151", marginTop: 4 }}>
            {repName} · scored on rubric v{c.rubric_version} · same engine as real calls
          </div>
        </div>
      </div>
      {Object.keys(cats).length > 0 && (
        <div className="card" style={{ padding: 20 }}>
          <div className="section-head" style={{ marginBottom: 14 }}>Categories</div>
          {CATS.filter(cat => cats[cat] != null).map(cat => (
            <div key={cat} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <span style={{ fontSize: 11, color: "var(--t3)", fontWeight: 600, width: 130 }}>{CL[cat] || cat}</span>
              <div style={{ flex: 1 }}><MiniBar value={cats[cat]} /></div>
            </div>
          ))}
        </div>
      )}
      {c.pass_fail?.deductions?.length > 0 && (
        <div className="card" style={{ padding: 18 }}>
          <div className="section-head" style={{ marginBottom: 10 }}>⚠ Deductions</div>
          {c.pass_fail.deductions.map((d, i) => (
            <div key={i} style={{ display: "flex", gap: 10, padding: "8px 12px", marginBottom: 6, background: d.severity === "critical" ? "#1a0a0a" : "#1a1400", borderRadius: 8, border: `1px solid ${d.severity === "critical" ? "#991b1b" : "#92400e"}` }}>
              <span style={{ fontSize: 18, fontWeight: 900, color: d.severity === "critical" ? "#ef4444" : "#f59e0b", minWidth: 36 }}>{d.points}</span>
              <div><div style={{ fontSize: 12, fontWeight: 700, color: "var(--t2)" }}>{d.label}</div><div style={{ fontSize: 10, color: "var(--t3)" }}>{d.source}</div></div>
            </div>
          ))}
        </div>
      )}
      {c.coaching_notes && (
        <div className="card" style={{ padding: 20 }}>
          <div className="section-head" style={{ marginBottom: 10 }}>Coaching</div>
          <div style={{ fontSize: 13, color: "var(--t2)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{c.coaching_notes}</div>
        </div>
      )}
    </div>
  );
}

function PracticeHistoryPage(){
  const[rep,setRep]=usePersisted("plog.rep","");
  const[scen,setScen]=usePersisted("plog.scen","ALL");
  const[stat,setStat]=usePersisted("plog.stat","ALL");
  const[sort,setSort]=usePersisted("plog.sort",{key:"created_at",dir:-1});
  const{data:reps}=useApi("/reps");
  const[sessions,setSessions]=useState(null);
  const[detail,setDetail]=useState(null);
  React.useEffect(()=>{const qs=rep?`?rep=${encodeURIComponent(rep)}`:"";fetch(`${API}/practice${qs}`).then(r=>r.json()).then(d=>setSessions(d.sessions||[])).catch(()=>setSessions([]))},[rep]);

  // Detail view — reuse the same scorecard layout
  if(detail){const cats=detail.category_scores||{};return<div className="flex-col gap-20" style={{maxWidth:760}}>
    <button className="btn" onClick={()=>setDetail(null)} style={{alignSelf:"flex-start"}}>← All sessions</button>
    <div className="card" style={{padding:24,display:"flex",alignItems:"center",gap:20}}>
      <ScoreRing value={detail.overall_score_adj} size={72} sw={4.5}/>
      <div><div style={{fontSize:15,fontWeight:700,color:"var(--t2)"}}>{detail.scenario_id}</div>
      <div style={{fontSize:11,color:"#374151",marginTop:4}}>{detail.rep_name} · {detail.created_at} · scored on rubric v{detail.rubric_version}</div></div>
    </div>

  const all=sessions||[];

  const scored=all.filter(s=>s.status==="scored"&&s.overall_score_adj!=null);
  const avg=scored.length?Math.round(scored.reduce((a,s)=>a+Number(s.overall_score_adj),0)/scored.length*10)/10:null;
  const chron=[...scored].sort((a,b)=>String(a.created_at).localeCompare(String(b.created_at)));
  const trendPts=(()=>{const v=chron.map(s=>Number(s.overall_score_adj));if(v.length<2)return null;const mn=Math.min(...v),mx=Math.max(...v),rng=(mx-mn)||1;return v.map((x,i)=>((i/(v.length-1))*252+4).toFixed(0)+","+(50-((x-mn)/rng)*44).toFixed(0)).join(" ");})();
  const filtered=all.filter(s=>(scen==="ALL"||s.scenario_id===scen)&&(stat==="ALL"||s.status===stat));
  const sorted=[...filtered].sort((a,b)=>{const k=sort.key;let va=a[k],vb=b[k];if(k==="overall_score_adj"){va=Number(va)||0;vb=Number(vb)||0;return(va-vb)*sort.dir;}return String(va||"").localeCompare(String(vb||""))*sort.dir;});
  const setSortKey=k=>setSort(s=>s.key===k?{key:k,dir:-s.dir}:{key:k,dir:1});
  const TH=({k,l,align})=><span onClick={k?()=>setSortKey(k):undefined} className="mono" style={{fontSize:9,fontWeight:700,letterSpacing:.5,color:sort.key===k?"var(--t2)":"var(--t3)",textTransform:"uppercase",cursor:k?"pointer":"default",textAlign:align||"left"}}>{l}{sort.key===k?(sort.dir>0?" ▲":" ▼"):""}</span>;
  const GC="56px 2fr 1.4fr 100px 96px 74px";

      <div className="card" style={{padding:"16px 18px"}}><div className="lbl" style={{color:"var(--t3)"}}>Avg practice score</div><div className="stat-value" style={{fontSize:26,marginTop:6,color:avg!=null?sClr(avg):"var(--t4)"}}>{avg??"—"}</div><div style={{fontSize:10,color:"var(--t4)"}}>on the live rubric</div></div>

      <select value={rep} onChange={e=>setRep(e.target.value)}><option value="">All reps</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select>
      <select value={scen} onChange={e=>setScen(e.target.value)}><option value="ALL">All scenarios</option>{scenOpts.map(x=><option key={x} value={x}>{x}</option>)}</select>
      <select value={stat} onChange={e=>setStat(e.target.value)}><option value="ALL">All statuses</option><option value="scored">Scored</option><option value="in_progress">In progress</option></select>
    </div>
    {sorted.length===0?<div className="card" style={{padding:40,textAlign:"center",color:"var(--t3)"}}>No practice sessions match. Head to the <b>Train</b> tab to start one.</div>:
    <div className="card" style={{overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:GC,gap:12,padding:"11px 16px",borderBottom:"1px solid var(--border)",background:"#151a24",alignItems:"center"}}><TH l="Score" align="center"/><TH k="scenario_id" l="Scenario"/><TH k="rep_name" l="Rep"/><TH k="status" l="Status" align="right"/><TH k="created_at" l="Date" align="right"/><span/></div>

        <span style={{fontSize:13,fontWeight:700,color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.scenario_id}</span>
        <span style={{fontSize:12,color:"var(--t2)"}}>{s.rep_name}</span>

        <span className="mono" style={{fontSize:11,color:"var(--t3)",textAlign:"right"}}>{fmt(s.created_at)}</span>
        <span style={{fontSize:11,color:done?"#818cf8":"var(--t4)",textAlign:"right"}}>{done?"Review →":"—"}</span>
      </div>})}
    </div>}
    <div style={{fontSize:11,color:"var(--t4)"}}>Showing <b style={{color:"var(--t2)"}}>{sorted.length}</b> of {all.length} sessions</div>
    </React.Fragment>}
  </div>
}

// Habits — cross-call patterns for one rep. Watch items first (what coaching acts
// on), strengths after. Developmental framing: never a ranking, always a pattern
// with evidence you can click into.
// Coach's Console — Sam's cockpit. Per rep: the one thing to coach, how to open
// the conversation, what to have them do. Plus team-wide themes: a gap several
// reps share is a team problem, not five separate conversations.
function OneOnOneLog({repId,repName,focusLabel}){
  const{data,reload}=useApi(repId?`/reps/${repId}/one-on-ones`:null,[repId]);
  const[note,setNote]=useState("");const[tag,setTag]=useState(focusLabel||"");const[saving,setSaving]=useState(false);
  React.useEffect(()=>{setTag(focusLabel||"")},[focusLabel,repId]);
  const entries=data?.entries||[];
  async function save(){if(!note.trim())return;setSaving(true);try{await postApi(`/reps/${repId}/one-on-ones`,{note:note.trim(),focus_tag:tag||null});setNote("");reload();}catch(e){console.error(e);}setSaving(false);}
  return<div className="flex-col gap-16">
    <div style={{fontSize:14,fontWeight:800}}>1-on-1s with {repName}</div>
    <div className="card" style={{padding:16,borderColor:"#3730a3",background:"#0f0f24"}}>

      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>

      </div>
      <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="What did you discuss? What did you both agree on? What's the next check-in?" style={{width:"100%",minHeight:70,background:"#0a0e16",border:"1px solid var(--border)",borderRadius:9,padding:12,fontSize:12,color:"var(--t1)",lineHeight:1.6,resize:"vertical",fontFamily:"inherit"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}><span className="mono" style={{fontSize:10,color:"var(--t4)"}}>Saved to this rep · visible to coaches</span><button className="btn btn-primary" onClick={save} disabled={saving||!note.trim()} style={{fontSize:12}}>{saving?"Saving…":"Save note"}</button></div>
    </div>
    {!data?<Skel rows={3}/>:entries.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:"8px 2px"}}>No 1-on-1s logged yet.</div>:

  </div>;
}

function playbookFor(label){
  const s=(label||"").toLowerCase();
  if(s.includes("discovery"))return"discovery";
  if(s.includes("financial")||s.includes("qualification"))return"philosophy";
  if(s.includes("objection"))return"philosophy";
  if(s.includes("pitch"))return"pitching";
  if(s.includes("talk")||s.includes("frame")||s.includes("tonality"))return"tonality";
  return"philosophy";
}

      </div>
      <p style={{fontSize:12,color:"var(--t3)",marginTop:-8,marginBottom:18}}>This is exactly what the bot scores every {role.toLowerCase()} call against. Weights sum to 100. Read the Resources tab for the full how-to behind each.</p>
      {items.length>0&&(()=>{const pal=["#818cf8","#34d399","#fbbf24","#f472b6","#22d3ee","#a855f7","#fb923c"];const tot=items.reduce((s,it)=>s+(Number(it.weight)||0),0)||100;return<div style={{marginBottom:18}}><div className="lbl" style={{marginBottom:8}}>How the points split · {role}</div><div style={{display:"flex",height:26,borderRadius:7,overflow:"hidden",fontSize:10,fontWeight:800,color:"#0b0f1a"}}>{items.map((it,i)=><div key={it.category} title={`${CL[it.category]||it.category} ${it.weight}%`} style={{width:`${(Number(it.weight)||0)/tot*100}%`,background:pal[i%pal.length],display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",whiteSpace:"nowrap"}}>{(CL[it.category]||it.category).slice(0,4)} {it.weight}</div>)}</div></div>;})()}
      {items.map(it=><div key={it.category} style={{padding:"16px 18px",background:"var(--bg)",borderRadius:12,border:"1px solid #2a3140",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:15,fontWeight:800,color:"var(--t2)"}}>{CL[it.category]||it.category}</span>
          <span className="badge" style={{background:"#1e1b4b",color:"#a5b4fc",border:"1px solid #4338ca55"}}>{it.weight}%</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{padding:"10px 12px",background:"#0f1a14",borderRadius:8,border:"1px solid #14331f"}}><div style={{fontSize:9,fontWeight:700,color:"#22c55e",marginBottom:4,letterSpacing:.5}}>✓ STRONG (9–10)</div><div style={{fontSize:12,color:"var(--t2)",lineHeight:1.55}}>{it.score_10||it.good}</div></div>
          <div style={{padding:"10px 12px",background:"#140a0a",borderRadius:8,border:"1px solid #331414"}}><div style={{fontSize:9,fontWeight:700,color:"#ef4444",marginBottom:4,letterSpacing:.5}}>✗ WEAK (1–3)</div><div style={{fontSize:12,color:"var(--t2)",lineHeight:1.55}}>{it.score_1||it.bad}</div></div>
        </div>
      </div>)}
    </div>
    <div className="card" style={{padding:24}}>
      <div className="section-head">The 7 Beliefs</div>
      <p style={{fontSize:12,color:"var(--t3)",marginTop:-8,marginBottom:16}}>A 10/10 call uncovers all seven. The bot tracks which were covered on every call.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {beliefs.map(([b,d],i)=><div key={b} style={{display:"flex",gap:12,padding:"10px 14px",background:"var(--bg)",borderRadius:10,border:"1px solid #2a3140"}}><span style={{fontSize:16,fontWeight:900,color:"#4338ca",fontFamily:"var(--m)"}}>{i+1}</span><div><div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{b}</div><div style={{fontSize:11,color:"var(--t3)"}}>{d}</div></div></div>)}
      </div>
    </div>
  </div>
}

function RubricPage(){
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);
  const[scope,setScope]=useState('all');const[days,setDays]=useState(30);const[rtab,setRtab]=usePersisted("rubric.tab","rubric");
  const[estimate,setEstimate]=useState(null);const[running,setRunning]=useState(false);
  async function loadData(){setLoading(true);const r=await fetch(`${API}/rubric-comparison`).then(r=>r.json()).catch(()=>null);setData(r);setLoading(false);}
  async function loadEstimate(){const qs=scope==='recent'?`?scope=recent&days=${days}`:'?scope=all';const r=await fetch(`${API}/rescore-estimate${qs}`).then(r=>r.json()).catch(()=>null);setEstimate(r);}
  React.useEffect(()=>{loadData()},[]);
  React.useEffect(()=>{loadEstimate()},[scope,days]);
  async function rescore(){
    if(!estimate||!estimate.count)return alert('No calls to re-score');
    if(!(await qcConfirm({title:"Re-score calls?",message:`Re-score ${estimate.count} call${estimate.count!==1?"s":""}.\n\nEstimated cost: $${estimate.estimatedCost}. Current scores are archived into Score History first.`,confirmLabel:"Re-score",danger:false})))return;
    setRunning(true);
    try{
      const endpoint=scope==='recent'?'/calls/rescore-recent':'/calls/rescore-all';
      const body=scope==='recent'?{days}:{};
      const r=await fetch(`${API}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
      alert(`✓ ${r.queued} calls queued for re-score.\n\nThey'll process on the next worker cycles (every 2 minutes). Check the Queue page for progress.`);
      loadData();
    }catch(e){alert('Error: '+e.message)}
    setRunning(false);
  }
  if(loading)return<Skel/>;
  const current=data?.current||[];const comparisons=data?.perCallComparisons||[];
  return<div className="flex-col gap-16">
    <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Rubric</h2><p style={{fontSize:12,color:"var(--t3)",marginTop:4}}>The exact criteria every call is scored against — and the admin tools to re-score and compare versions.</p></div>
    <div style={{display:"flex",gap:4,borderBottom:"1px solid var(--border)",flexWrap:"wrap"}} role="tablist">{[["rubric","📋 The Rubric"],["rescore","↻ Re-score & Compare"]].map(([k,l])=><button key={k} role="tab" aria-selected={rtab===k} onClick={()=>setRtab(k)} style={{padding:"9px 16px",background:"transparent",border:"none",borderBottom:rtab===k?"2px solid #a855f7":"2px solid transparent",color:rtab===k?"#d8b4fe":"var(--t3)",fontWeight:rtab===k?800:600,fontSize:13,cursor:"pointer",marginBottom:-1}}>{l}</button>)}</div>
    {rtab==="rubric"&&<RubricViewer/>}
    {rtab==="rescore"&&<React.Fragment>
    <div className="card" style={{padding:24}}>
      <div className="section-head" style={{marginBottom:14}}>Re-score Calls</div>
      <div style={{background:"var(--bg)",padding:14,borderRadius:8,border:"1px solid #2a3140",marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--t2)",marginBottom:10}}>Current scores are automatically archived into Score History before re-scoring. You can compare v1 vs v2 scores side-by-side after re-running.</div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
          <label style={{fontSize:11,color:"var(--t3)"}}>Scope:</label>
          <select value={scope} onChange={e=>setScope(e.target.value)} style={{background:"#1a1f2b",border:"1px solid #2a3140",borderRadius:6,padding:"6px 10px",color:"var(--t2)",fontSize:11}}>
            <option value="all">All scored calls</option>
            <option value="recent">Last X days</option>
          </select>
          {scope==='recent'&&<input type="number" value={days} onChange={e=>setDays(Number(e.target.value))} min="1" max="365" style={{background:"#1a1f2b",border:"1px solid #2a3140",borderRadius:6,padding:"6px 10px",color:"var(--t2)",fontSize:11,width:70}}/>}
          {scope==='recent'&&<span style={{fontSize:11,color:"var(--t3)"}}>days</span>}
        </div>
        {estimate&&<div style={{display:"flex",gap:14,alignItems:"center",fontSize:12,color:"var(--t2)",marginBottom:10}}>
          <div>📊 <b>{estimate.count}</b> calls will be re-scored</div>
          <div>💰 Estimated cost: <b style={{color:"#22c55e"}}>${estimate.estimatedCost}</b></div>
        </div>}
        <button className="btn btn-primary" onClick={rescore} disabled={running||!estimate?.count}>{running?'Queuing...':`↻ Re-score ${estimate?.count||0} calls`}</button>
      </div>
      <div style={{fontSize:11,color:"var(--t3)",fontStyle:"italic"}}>Tip: To re-score only selected calls, use the checkboxes on the Calls page and choose "Re-score selected" there.</div>
    </div>

    <div className="card" style={{padding:24}}>
      <div className="section-head" style={{marginBottom:14}}>Rubric Version Stats</div>
      {current.length===0?<div style={{fontSize:12,color:"var(--t3)"}}>No scored calls yet</div>:<div style={{display:"flex",flexDirection:"column",gap:10}}>{current.map(v=><div key={v.rubric_version} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"var(--bg)",borderRadius:8,border:"1px solid #2a3140"}}>
        <div style={{minWidth:60,textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:"#a855f7",fontFamily:"var(--m)"}}>v{v.rubric_version}</div>
          <div style={{fontSize:9,color:"var(--t4)"}}>rubric</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{Number(v.count)} scored calls</div>
          <div style={{fontSize:10,color:"var(--t3)"}}>Avg score: {v.avg_score?Number(v.avg_score).toFixed(1):'—'}/10 · Discovery: {v.avg_discovery?Number(v.avg_discovery).toFixed(1):'—'} · Qualification: {v.avg_qual?Number(v.avg_qual).toFixed(1):'—'} · Pitch: {v.avg_pitch?Number(v.avg_pitch).toFixed(1):'—'}</div>
        </div>
      </div>)}</div>}
    </div>

    {comparisons.length>0&&<div className="card" style={{padding:24}}>
      <div className="section-head" style={{marginBottom:14}}>📈 Per-Call Comparison (v1 → v2)</div>
      <div style={{fontSize:11,color:"var(--t3)",marginBottom:12}}>Showing {comparisons.length} calls that have been scored under multiple rubric versions. Delta = current score minus previous score.</div>
      <div style={{maxHeight:500,overflowY:"auto"}}>{comparisons.map(c=>{const delta=Number(c.delta)||0;const deltaColor=delta>0.5?"#22c55e":delta<-0.5?"#ef4444":"#f59e0b";return<div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderBottom:"1px solid var(--bg)"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>{c.rep_name} → {c.client_name||'?'}</div>
          <div style={{fontSize:10,color:"var(--t4)"}}>{fmtF(c.received_at)}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:12,fontFamily:"var(--m)"}}>
          <span style={{color:"var(--t3)"}}>v{c.previous_version}: <b style={{color:"var(--t2)"}}>{Number(c.previous_score).toFixed(1)}</b></span>
          <span style={{color:"var(--t4)"}}>→</span>
          <span style={{color:"var(--t3)"}}>v{c.current_version}: <b style={{color:"var(--t2)"}}>{Number(c.current_score).toFixed(1)}</b></span>
          <span style={{color:deltaColor,fontWeight:800,minWidth:44,textAlign:"right"}}>{delta>0?'+':''}{delta.toFixed(1)}</span>
        </div>
      </div>})}</div>
    </div>}
    </React.Fragment>}
  </div>
}

// Global navigation — any component can deep-link. The hashchange listener syncs state,
// so this also gives working back/forward and shareable URLs like #/calls/474 or #/rep/Andrew%20Cluney
function goTo(page,param){window.location.hash="/"+page+(param!=null&&param!==""?"/"+encodeURIComponent(param):"");}

// ── P8 branded confirm dialog (Design Lab, Jul 21) — replaces native confirm() for destructive/costly actions ──
let _qcConfirm=null;
function qcConfirm(o){o=typeof o==="string"?{message:o}:o;return _qcConfirm?_qcConfirm(o):Promise.resolve(window.confirm(o.message||""));}
function ConfirmHost(){
  const[st,setSt]=useState(null);
  useEffect(()=>{_qcConfirm=(opts)=>new Promise(res=>setSt({opts,resolve:res}));return()=>{_qcConfirm=null};},[]);
  const close=(v)=>{setSt(s=>{if(s)s.resolve(v);return null;});};
  useEffect(()=>{if(!st)return;const on=e=>{if(e.key==="Escape")close(false);};window.addEventListener("keydown",on);return()=>window.removeEventListener("keydown",on);},[st]);
  if(!st)return null;
  const o=st.opts,danger=o.danger!==false;
  return<div className="modal-overlay" onClick={()=>close(false)}>
    <div className="modal" style={{maxWidth:420}} role="alertdialog" aria-modal="true" aria-label={o.title||"Confirm"} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <Icon name={danger?"warn":"info"} size={20} color={danger?"var(--warn)":"var(--info)"}/>
        <div style={{fontSize:16,fontWeight:800,color:"var(--t1)"}}>{o.title||"Are you sure?"}</div>
      </div>
      <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.6,whiteSpace:"pre-line",marginBottom:22}}>{o.message}</div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button className="btn" onClick={()=>close(false)}>{o.cancelLabel||"Cancel"}</button>
        <button className={danger?"btn btn-red":"btn btn-primary"} onClick={()=>close(true)} autoFocus>{o.confirmLabel||"Confirm"}</button>
      </div>
    </div>
  </div>;
}
function App(){
  const validPages=[...NAV.map(n=>n.id),"rep"];
  const parseHash=()=>{
    const h=(window.location.hash||"").replace(/^#\/?/,"");
    const parts=h.split("/").filter(Boolean);
    const page=validPages.includes(parts[0])?parts[0]:"dashboard";
    const param=parts.length>1?decodeURIComponent(parts.slice(1).join("/")):null;
    return{page,param};
  };
  const[route,setRoute]=useState(parseHash());
  const pg=route.page,param=route.param;
  const sPg=(id)=>{ if(typeof id==="function")id=id(pg); goTo(id); };
  useEffect(()=>{ const n=NAV.find(x=>x.id===pg); pingActivity(n?n.label:(pg==="rep"?"Rep page":pg)); },[pg]);
  useEffect(()=>{
    const onHash=()=>setRoute(parseHash());
    window.addEventListener("hashchange",onHash);
    if(!window.location.hash) window.location.hash="/dashboard";
    return()=>window.removeEventListener("hashchange",onHash);
  // eslint-disable-next-line
  },[]);
  return<><ConfirmHost/><aside><div style={{padding:"18px 20px",display:"flex",alignItems:"center",gap:11,borderBottom:"1px solid #2a3140"}}><div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff"}}>Q</div><span style={{fontSize:15,fontWeight:900,letterSpacing:-.3}}>Turnkey QC</span></div><NavList pg={pg} onNav={(id)=>{sPg(id);sDt(null)}}/><div style={{padding:"14px 16px",borderTop:"1px solid #2a3140"}}><div style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>Sam & Francis</div><div style={{fontSize:10,color:"#6366f1",fontFamily:"var(--m)"}}>ADMIN</div></div></aside>
    <main><div className="max-w"><ErrorBoundary resetKey={pg} tag={pg}>{
      pg==="calls"&&param?<CallDetail call={{id:Number(param)}} onBack={()=>goTo("calls")}/>:
      pg==="rep"&&param?<RepDetailPage name={param}/>:
      pg==="dashboard"?<Dashboard/>:pg==="analytics"?<AnalyticsPage/>:pg==="coaching"?<CoachingPage/>:pg==="console"?<CoachConsolePage/>:pg==="progress"?<MyProgressPage/>:pg==="train"?<TrainPage/>:pg==="history"?<PracticeHistoryPage/>:pg==="calls"?<CallsList onSelect={c=>goTo("calls",c.id)}/>:pg==="rubric"?<RubricPage/>:pg==="resources"?<ResourcesPage initial={param}/>:pg==="records"?<RecordsPage/>:pg==="queue"?<QueuePage/>:pg==="health"?<HealthPage/>:pg==="team"?<TeamPage/>:pg==="outcomes"?<OutcomesPage/>:pg==="referrals"?<ReferralsPage/>:pg==="moments"?<GoldenMomentsPage/>:pg==="stitch"?<StitchPage/>:pg==="calibration"?<CalibrationPage/>:pg==="export"?<ExportPage/>:pg==="about"?<AboutPage/>:null
    }</ErrorBoundary></div></main></>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

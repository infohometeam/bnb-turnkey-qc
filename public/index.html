      </div>})}
      {!data.records.length&&<div style={{padding:40,textAlign:"center",color:"#1e293b"}}>No records match filters</div>}
    </div></div>
  </div>
}

// ── Analytics ────────────────────────────────────────────────
function TrendChart({data}){
  // Only days with scored calls form the score line; keep them in date order.
  const pts=(data||[]).filter(d=>d.avg_score!=null).map(d=>({
    date:d.period_date, score:Number(d.avg_score), calls:Number(d.scored||0)
  }));
  if(pts.length<2)return<div style={{fontSize:12,color:"var(--t3)",padding:20}}>Not enough scored days yet to chart a trend.</div>;
  const W=680,H=220,padL=34,padR=16,padB=34,padT=14;
  const iw=W-padL-padR,ih=H-padT-padB;
  const n=pts.length;
  const x=i=>padL+(n===1?iw/2:(i/(n-1))*iw);
  const y=v=>padT+ih-(v/10)*ih;
  const linePath=pts.map((p,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(p.score).toFixed(1)}`).join(" ");
  const areaPath=`${linePath} L${x(n-1).toFixed(1)},${(padT+ih).toFixed(1)} L${x(0).toFixed(1)},${(padT+ih).toFixed(1)} Z`;
  // show ~6 evenly-spaced date labels, upright
  const step=Math.max(1,Math.ceil(n/6));
  // toUTC handles all shapes: ISO-with-Z, "YYYY-MM-DD HH:MM:SS", and plain dates.
  // (Naively appending 'Z' produced "...000ZZ" -> Invalid Date.)
  const fmtDay=s=>{const d=toUTC(s);return d&&!isNaN(d)?d.toLocaleDateString("en-US",{month:"numeric",day:"numeric",timeZone:TZ}):"";};
  // P7: score band → colour + SHAPE (never colour alone). circle=Strong, triangle=Fair, diamond=Weak.
  const band=v=>v>=8?"strong":v>=6?"fair":"weak";
  const Marker=({cx,cy,v,r=4})=>{const b=band(v),c=sClr(v);const co={fill:c,stroke:"#0b0f1a",strokeWidth:1.5};
    if(b==="strong")return<circle cx={cx} cy={cy} r={r} {...co}/>;
    if(b==="fair")return<path d={`M${cx} ${cy-r-1} L${cx+r+1} ${cy+r} L${cx-r-1} ${cy+r} Z`} {...co}/>;
    return<path d={`M${cx} ${cy-r-1} L${cx+r+1} ${cy} L${cx} ${cy+r+1} L${cx-r-1} ${cy} Z`} {...co}/>;};
  const scores=pts.map(p=>p.score);
  const first=scores[0],last=scores[scores.length-1],dir=last>first+0.2?"up":last<first-0.2?"down":"flat";
  const srSummary=`Score trend over ${n} days: latest ${last} out of 10, ${dir==="up"?"trending up from":dir==="down"?"down from":"steady around"} ${first}. Range ${Math.min(...scores)} to ${Math.max(...scores)}.`;
  return<div style={{width:"100%",overflowX:"auto"}}>
    <span className="sr-only">{srSummary}</span>
    <svg viewBox={`0 0 ${W} ${H}`} role="img" aria-label={srSummary} style={{width:"100%",minWidth:520,display:"block"}}>
      <defs><linearGradient id="trendfill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#6366f1" stopOpacity="0.35"/>
        <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
      </linearGradient></defs>
      {/* Y gridlines + labels at 0,2,4,6,8,10 */}
      {[0,2,4,6,8,10].map(v=><g key={v}>
        <line x1={padL} y1={y(v)} x2={W-padR} y2={y(v)} stroke="#1e293b" strokeWidth="1"/>
        <text x={padL-8} y={y(v)+3} textAnchor="end" fontSize="10" fill="var(--t3)" fontFamily="var(--m)">{v}</text>
      </g>)}
      {/* P7: "Strong" target reference line at 8 */}
      <line x1={padL} y1={y(8)} x2={W-padR} y2={y(8)} stroke="#34d399" strokeWidth="1" strokeDasharray="4 4" opacity="0.5"/>
      <text x={W-padR} y={y(8)-4} textAnchor="end" fontSize="9" fill="#34d399" fontFamily="var(--m)">target 8.0</text>
      {/* Y-axis unit */}
      <text x={12} y={padT+ih/2} textAnchor="middle" fontSize="9" fill="var(--t3)" fontFamily="var(--m)" transform={`rotate(-90 12 ${padT+ih/2})`}>SCORE /10</text>
      {/* area + line */}
      <path d={areaPath} fill="url(#trendfill)"/>
      <path d={linePath} fill="none" stroke="#818cf8" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {/* markers: colour + shape */}
      {pts.map((p,i)=><g key={i}><Marker cx={x(i)} cy={y(p.score)} v={p.score}/><title>{`${fmtDay(p.date)}: avg ${p.score} (${p.calls} call${p.calls!==1?"s":""})`}</title></g>)}
      {/* X date labels — upright, evenly spaced */}
      {pts.map((p,i)=> i%step===0||i===n-1 ? <text key={"x"+i} x={x(i)} y={H-12} textAnchor="middle" fontSize="10" fill="var(--t3)" fontFamily="var(--m)">{fmtDay(p.date)}</text> : null)}
    </svg>
    {/* P7 legend: shape + colour + label */}
    <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap",marginTop:6}}>
      {[["strong","Strong ≥8","#34d399"],["fair","Fair 6–7.9","#fbbf24"],["weak","Weak <6","#ef4444"]].map(([b,lbl,c])=>
        <span key={b} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:10,color:"var(--t3)",fontFamily:"var(--m)"}}>
          <svg width="12" height="12" viewBox="0 0 12 12">{b==="strong"?<circle cx="6" cy="6" r="4" fill={c}/>:b==="fair"?<path d="M6 1 L11 10 L1 10 Z" fill={c}/>:<path d="M6 1 L11 6 L6 11 L1 6 Z" fill={c}/>}</svg>{lbl}</span>)}
    </div>
    <div style={{fontSize:11,color:"var(--t3)",textAlign:"center",marginTop:4}}>Average adjusted score per day (0–10) · hover a point for detail</div>
  </div>;
}

function AnalyticsPage(){const[p,sP]=usePersisted("an.period","week");const[f,sF]=usePersisted("an.from","");const[t,sT]=usePersisted("an.to","");const[repSort,setRepSort]=usePersisted("an.repsort",{key:"avg_score",dir:-1});const dq=buildDQ(p,f,t);const{data,error,reload}=useApi(`/analytics?_=1${dq}`,[p,f,t]);const{data:trends}=useApi(`/report?days=${trendScope(p).d}`,[p]);const{data:atr}=useApi(`/analytics/trends?days=${trendScope(p).d}`,[p]);const{data:dist}=useApi(`/analytics/distribution?_=1${dq}`,[p,f,t]);if(error&&!data)return<PageError onRetry={reload}/>;if(!data)return<Skel/>;const s=data.stats||{};

  const heatBg=v=>v==null?"#141a24":v>=8?"#166534":v>=7?"#14532d":v>=6?"#3a2f0f":v>=5?"#4a2410":"#4a1414";
  const heatFg=v=>v==null?"#55606f":v>=8?"#a7f3d0":v>=7?"#6ee7b7":v>=6?"#fbbf24":v>=5?"#fdba74":"#fca5a5";
  const KPI=({label,icon,val,color,delta,dcolor,spark,scolor,sub})=><div className="card" style={{padding:"13px 15px",display:"flex",flexDirection:"column",justifyContent:"space-between",minHeight:96}}><div className="stat-label"><Icon name={icon} size={12} style={{marginRight:5,verticalAlign:"-2px"}}/>{label}</div><div style={{display:"flex",alignItems:"baseline",gap:6,marginTop:5}}><span className="slab" style={{fontSize:23,color:color}}>{val}</span>{delta!=null&&<span className="mono" style={{fontSize:9,color:dcolor}}>{delta>0?"▲":delta<0?"▼":"–"}{delta?Math.abs(delta):""}</span>}</div>{spark?<svg viewBox="0 0 80 14" preserveAspectRatio="none" style={{width:"100%",height:14,marginTop:4}}><polyline points={spark} fill="none" stroke={scolor} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/></svg>:sub?<div className="stat-sub" style={{marginTop:4}}>{sub}</div>:<div style={{height:14,marginTop:4}}/>}</div>;

torEffect="non-scaling-stroke"/></svg>:<span style={{color:"var(--t5)",fontSize:10}}>—</span>}</td><td style={{padding:"8px 10px",fontFamily:"var(--m)",color:"var(--t4)",textAlign:"right"}}>{r.call_count}</td><td style={{padding:"8px 10px",color:r.flagged_count?"#f59e0b":"var(--t4)",fontFamily:"var(--m)",textAlign:"right"}}>{r.flagged_count||0}</td></tr>})}</tbody></table></div></div>}

function QueuePage(){const SHOW_PULL_BUTTON=false; /* set true when Aloware/Fathom API tokens are added to Render */ const{data,reload,error}=useApi("/queue/status");const{data:errors}=useApi("/calls?status=ERROR&limit=20&hideVm=false");const[pr,setPr]=useState(false);const[rt,setRt]=useState(false);const[pl,setPl]=useState(false);

    <div className="card" style={{padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:10,height:10,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 10px #22c55e55"}}/><span style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{data.engine?.toUpperCase()}</span></div><div style={{display:"flex",gap:24}}><div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#22c55e",fontFamily:"var(--m)"}}>{d.scored_today||0}</div><div style={{fontSize:9,color:"#374151"}}>SCORED TODAY</div></div><div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#60a5fa",fontFamily:"var(--m)"}}>{d.full_qc_used||0}</div><div style={{fontSize:9,color:"#374151"}}>API CALLS</div></div><div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:"#f59e0b",fontFamily:"var(--m)"}}>${Number(d.est_cost_usd||0).toFixed(3)}</div><div style={{fontSize:9,color:"#374151"}}>COST</div></div></div></div>
    <div className="grid" style={{gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))"}}>
      {(data.queue||[]).map(qq=>{const[bg,fg,bd]=stClr(qq.status);return<div key={qq.status} style={{background:bg,border:`1px solid ${bd}`,borderRadius:10,padding:"14px 12px",textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:fg,fontFamily:"var(--m)"}}>{Number(qq.count)}</div><div style={{fontSize:9,color:fg,opacity:.7,fontFamily:"var(--m)"}}>{qq.status.replace(/_/g," ")}</div></div>})}
    </div>

// ── Health (detailed) ───────────────────────────────────────

      <div className="card stat-card"><div className="stat-label"><Icon name="x" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Errors</div><div className="stat-value" style={{color:data.errors>0?"#ef4444":"#22c55e"}}>{data.errors||0}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="voicemail" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Voicemails</div><div className="stat-value" style={{color:"var(--t3)"}}>{data.voicemails||0}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="return" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Classified</div><div className="stat-value" style={{color:"var(--t2)"}}>{data.classified_skipped||0}</div><div className="stat-sub">Reschedules, follow-ups</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="ruler" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Too Short</div><div className="stat-value" style={{color:"var(--t3)"}}>{data.too_short||0}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="hourglass" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>In Queue</div><div className="stat-value" style={{color:"#60a5fa"}}>{data.in_queue||0}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="refresh" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Retrying</div><div className="stat-value" style={{color:"#f59e0b"}}>{data.retrying||0}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="gear" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Engine</div><div className="stat-value" style={{fontSize:16,color:"#818cf8"}}>{data.engine?.toUpperCase()}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="dollar" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Total Cost</div><div className="stat-value" style={{fontSize:18,color:"#f59e0b"}}>${Number(data.totalCost||0).toFixed(2)}</div></div>
    </div>
    {/* Daily Processing Stats */}
    {data.dailyStats?.length>0&&<div className="card" style={{padding:24}}><div className="section-head">Daily Processing (Last 7 Days)</div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Date","API Calls","Cost"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 10px",fontSize:10,color:"var(--t3)",fontWeight:700,borderBottom:"1px solid var(--border)",fontFamily:"var(--m)",letterSpacing:".5px"}}>{h}</th>)}</tr></thead><tbody>{data.dailyStats.map(d=><tr key={d.date_key}><td style={{padding:10,fontSize:12,color:"var(--t2)",fontFamily:"var(--m)"}}>{d.date_key}</td><td style={{padding:10,fontSize:12,color:"#60a5fa",fontFamily:"var(--m)"}}>{Number(d.full_qc_used)}</td><td style={{padding:10,fontSize:12,color:"#f59e0b",fontFamily:"var(--m)"}}>${Number(d.est_cost_usd).toFixed(4)}</td></tr>)}</tbody></table></div>}
    {/* Recent Errors */}
    {data.recentErrors?.length>0&&<div className="card" style={{padding:24}}><div className="section-head">Recent Errors</div>{data.recentErrors.map(e=><div key={e.id} style={{padding:"12px 16px",background:"#1a0a0a",borderRadius:8,border:"1px solid #991b1b",marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:700,color:"#fca5a5"}}>{e.rep_name} → {e.client_name||"?"}</span><span style={{fontSize:10,color:"#2a3040"}}>{fmt(e.received_at)}</span></div><div style={{fontSize:11,color:"#ef4444",wordBreak:"break-all"}}>{e.error}</div></div>)}</div>}
    {/* Webhook Health Monitor */}
    {data.webhookHealth?.length>0&&<div className="card" style={{padding:24}}><div className="section-head">Webhook Sources</div>{data.webhookHealth.map(wh=>{const hrs=wh.last_received?Math.round((Date.now()-new Date(wh.last_received+'Z').getTime())/(1000*60*60)):null;const stale=hrs!==null&&hrs>24;return<div key={wh.base_source} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"var(--bg)",borderRadius:10,border:`1px solid ${stale?"#991b1b":"#2a3140"}`,marginBottom:8}}><div style={{width:10,height:10,borderRadius:"50%",background:stale?"#ef4444":"#22c55e",boxShadow:`0 0 8px ${stale?"#ef444455":"#22c55e55"}`}}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{wh.base_source}</div><div style={{fontSize:11,color:"#374151"}}>Last received: {wh.last_received?fmtF(wh.last_received):'Never'}{hrs!==null&&<span style={{color:stale?"#ef4444":"var(--t4)"}}> ({hrs}h ago)</span>}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:800,color:"#60a5fa",fontFamily:"var(--m)"}}>{Number(wh.total_received)}</div><div style={{fontSize:9,color:"#374151"}}>total</div></div></div>})}</div>}
    {data.webhookAlerts?.length>0&&<div className="card" style={{padding:20,background:"#1a0a0a",borderColor:"#991b1b"}}><div className="section-head" style={{color:"#ef4444"}}>⚠ Webhook Alerts</div>{data.webhookAlerts.map(a=><div key={a.source} style={{fontSize:12,color:a.severity==="critical"?"#fca5a5":a.severity==="warning"?"#fcd34d":"#93c5fd",marginBottom:6}}><b>{a.source}</b> — {a.message}.{a.lastReceived?` Last: ${fmtF(a.lastReceived)}.`:""} {a.severity!=="info"?"Check webhook configuration.":""}</div>)}</div>}
    {/* Per-Rep Webhook Health */}
    {data.repHealth?.length>0&&<div className="card" style={{padding:24}}><div className="section-head">Rep Webhook Health</div><div style={{fontSize:11,color:"#374151",marginBottom:14,marginTop:-4}}>When each rep's last call was pulled in. A rep going quiet usually means their webhook stopped.</div>{data.repHealth.map(rh=>{const sc={active:"#22c55e",quiet:"#f59e0b",stale:"#ef4444",none:"var(--t4)"}[rh.status]||"var(--t4)";const lbl={active:"Active",quiet:"Quiet",stale:"Stale",none:"No calls"}[rh.status]||"—";return<div key={rh.rep_name} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"var(--bg)",borderRadius:10,border:`1px solid ${rh.status==='stale'?"#991b1b":rh.status==='quiet'?"#92400e":"#2a3140"}`,marginBottom:8}}><div style={{width:10,height:10,borderRadius:"50%",background:sc,boxShadow:`0 0 8px ${sc}55`}}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{rh.rep_name} <span style={{color:"#374151",fontWeight:500,fontSize:11}}>· {rh.role}</span></div><div style={{fontSize:11,color:"#374151"}}>Last call: {rh.last_call?fmtF(rh.last_call):'Never'}{rh.hours_since!=null&&<span style={{color:rh.status==='active'?"var(--t4)":sc}}> ({rh.hours_since}h ago)</span>}</div></div><div style={{textAlign:"right"}}><div style={{display:"flex",gap:12}}><div><div style={{fontSize:14,fontWeight:800,color:"#60a5fa",fontFamily:"var(--m)"}}>{rh.calls_24h}</div><div style={{fontSize:9,color:"#374151"}}>24h</div></div><div><div style={{fontSize:14,fontWeight:800,color:"var(--t2)",fontFamily:"var(--m)"}}>{rh.calls_7d}</div><div style={{fontSize:9,color:"#374151"}}>7d</div></div></div></div><span className="badge" style={{background:sc+"22",color:sc,border:`1px solid ${sc}55`,fontSize:9,marginLeft:8}}>{lbl}</span></div>})}</div>}
    {data.repAlerts?.length>0&&<div className="card" style={{padding:20,background:"#1a1400",borderColor:"#92400e"}}><div className="section-head" style={{color:"#f59e0b"}}>⚠ Reps Gone Quiet</div>{data.repAlerts.map(a=><div key={a.rep} style={{fontSize:12,color:"#fcd34d",marginBottom:6}}><b>{a.rep}</b> ({a.role}) — no calls in {a.hoursSince}h. {a.status==='stale'?'Likely a webhook issue.':'Worth a glance.'}</div>)}</div>}
    {/* Live System Metrics */}
    <div className="card" style={{padding:24}}><div className="section-head">Live System Metrics</div><div className="grid grid-stats">
      <div className="card stat-card"><div className="stat-label"><Icon name="database" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>DB Latency</div><div className="stat-value" style={{fontSize:20,color:data.dbLatencyMs<300?"#22c55e":data.dbLatencyMs<800?"#f59e0b":"#ef4444"}}>{data.dbLatencyMs!=null?data.dbLatencyMs+"ms":"—"}</div><div className="stat-sub">Supabase query time</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="check" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Last Scored</div><div className="stat-value" style={{fontSize:14}}>{data.lastScoredAt?fmtF(data.lastScoredAt):"—"}</div><div className="stat-sub">most recent score</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="dollar" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Today's Cost</div><div className="stat-value" style={{fontSize:18,color:"#f59e0b"}}>${Number(data.today?.cost||0).toFixed(3)}</div><div className="stat-sub">{data.today?.budget>0?`of $${data.today.budget} budget`:`${data.today?.scored||0} scored today`}</div></div>
      <div className="card stat-card"><div className="stat-label"><Icon name="gear" size={13} style={{marginRight:5,verticalAlign:"-2px"}}/>Engine</div><div className="stat-value" style={{fontSize:16,color:"#818cf8"}}>{data.engine?.toUpperCase()}</div><div className="stat-sub">scoring model</div></div>
    </div></div>
    {/* Safeguards */}
    <div className="card" style={{padding:24}}><div className="section-head">Safeguards</div>{[
      {n:"Call Classification",d:"Reschedules, follow-ups, and wrong numbers auto-detected and skipped",i:"🏷"},
      {n:"Voicemail Detection",d:"6 methods: Aloware flags, short+outbound, transcript phrases, single speaker",i:"📵"},
      {n:"Duplicate Prevention",d:"SHA-256 hash + Aloware call ID linking",i:"🛡"},
      {n:"Auto-Retry",d:"Failed calls retried every 2 minutes with backoff",i:"🔄"},
      {n:"Persistent Database",d:"Supabase Postgres — no data loss on deploys or restarts",i:"💾"},
    ].map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 16px",background:"var(--bg)",borderRadius:10,border:"1px solid #2a3140",marginBottom:8}}><span style={{fontSize:20}}>{s.i}</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{s.n}</div><div style={{fontSize:11,color:"#374151"}}>{s.d}</div></div><span style={{fontSize:10,fontWeight:700,color:"#22c55e",fontFamily:"var(--m)",padding:"3px 10px",background:"#052e16",borderRadius:5,border:"1px solid #166534"}}>ACTIVE</span></div>)}</div>
  </div>}

// ── Coaching ─────────────────────────────────────────────────
function CoachingCard({c}){
  const[open,setOpen]=useState(false);
  const note=c.coaching_notes||"";
  const preview=note.length>120?note.slice(0,120).trim()+"…":note;
  return<div onClick={()=>setOpen(!open)} style={{padding:"14px 16px",background:"var(--bg)",borderRadius:10,border:"1px solid #2a3140",marginBottom:10,cursor:"pointer"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:open?10:6}}>
      <span style={{fontSize:12,fontWeight:700,color:"#aab4c5"}}><span style={{fontFamily:"var(--m)",fontSize:10,color:"#6366f1",marginRight:5}}>#{c.id}</span>{c.rep_name} → {c.client_name||"?"}</span>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button className="btn" onClick={e=>{e.stopPropagation();goTo("calls",c.id);}} title="Open this call" style={{fontSize:10,padding:"3px 8px"}}>Open call →</button>
        <ScoreRing value={c.overall_score_adj} size={26} sw={2}/>
        <span style={{fontSize:14,color:"#6b7686",transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}>⌄</span>
      </div>
    </div>
    <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{open?note:preview}</div>
  </div>
}

function CoachingPage(){const[p,sP]=usePersisted("coach.period","week");const[f,sF]=usePersisted("coach.from","");const[t,sT]=usePersisted("coach.to","");const{data:reps}=useApi("/reps");const[aud,setAud]=usePersisted("coach.aud","team");const[view,setView]=usePersisted("coach.view","overview");const roleF=aud==="closers"?"&role=Closer":aud==="setters"?"&role=Setter":aud.startsWith("rep:")?`&rep=${aud.split(":")[1]}`:"";const dq=buildDQ(p,f,t);const{data}=useApi(`/calls?status=SCORED&limit=100${roleF}${dq}`,[p,f,t,aud]);if(!data)return<Skel/>;const calls=data.calls||[];
  const av=arr=>{const ff=arr.filter(v=>v!=null&&isFinite(v));return ff.length?+(ff.reduce((a,b)=>a+b,0)/ff.length).toFixed(1):0};
  const catAvgs=Object.fromEntries(CATS.map(c=>[c,av(calls.map(x=>x.category_scores?.[c]))]));
  const sorted=Object.entries(catAvgs).filter(e=>e[1]>0).sort((a,b)=>a[1]-b[1]);
  const weak=sorted[0], strong=sorted[sorted.length-1];
  const impFreq={};calls.forEach(c=>(c.improvements||[]).forEach(i=>{impFreq[i]=impFreq[i]||{count:0,reps:new Set()};impFreq[i].count++;impFreq[i].reps.add(c.rep_name)}));
  const topImps=Object.entries(impFreq).map(([k,v])=>[k,v.count,[...v.reps]]).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const notes=calls.filter(c=>c.coaching_notes);
  const byRep={};calls.forEach(c=>{if(!c.rep_name)return;(byRep[c.rep_name]=byRep[c.rep_name]||[]).push(c)});
  const repRows=Object.entries(byRep).map(([rep,cs])=>({rep,cats:Object.fromEntries(CATS.map(c=>[c,av(cs.map(x=>x.category_scores?.[c]))]))}));
  const whoNeeds=weak?repRows.map(r=>({rep:r.rep,v:r.cats[weak[0]]})).filter(x=>x.v>0).sort((a,b)=>a.v-b.v).slice(0,2):[];
  const heatBg=v=>!v?"#141a24":v>=8?"#166534":v>=7?"#14532d":v>=6?"#3a2f0f":v>=5?"#4a2410":"#4a1414";
  const heatFg=v=>!v?"#55606f":v>=8?"#a7f3d0":v>=7?"#6ee7b7":v>=6?"#fbbf24":v>=5?"#fdba74":"#fca5a5";
  const AUD=[{id:"team",l:"Team"},{id:"closers",l:"Closers"},{id:"setters",l:"Setters"},...(reps||[]).map(r=>({id:`rep:${r.name}`,l:r.name}))];
  const VIEWS=[["overview","Overview"],["notes","Coaching Notes "+(notes.length||"")],["improvements","Recurring Improvements "+(topImps.length||"")]];
  return<div className="flex-col gap-16">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}><div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Coaching</h2><div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{calls.length} calls scored · {trendScope(p).l.toLowerCase()} window</div></div><DateFilter period={p} setPeriod={sP} from={f} setFrom={sF} to={t} setTo={sT}/></div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{AUD.map(tt=><button key={tt.id} className={`tab-btn${aud===tt.id?" active":""}`} onClick={()=>setAud(tt.id)} style={aud===tt.id?{background:RC[tt.l]||"#f59e0b",borderColor:RC[tt.l]||"#f59e0b"}:{}}>{tt.l}</button>)}</div>
    <div className="grid" style={{gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
      <div className="card stat-card"><div className="stat-label">Calls scored · {trendScope(p).l.toLowerCase()}</div><div className="stat-value" style={{color:"#60a5fa"}}>{calls.length}</div></div>
      {weak&&<div className="card stat-card" style={{background:"#1a0a0a",borderColor:"#991b1b"}}><div style={{fontSize:10,color:"#ef4444",fontWeight:700,fontFamily:"var(--m)",marginBottom:4}}>FOCUS</div><div style={{fontSize:20,fontWeight:900,color:"#fca5a5"}}>{CL[weak[0]]} <span style={{fontFamily:"var(--m)",fontSize:13}}>{weak[1]}</span></div></div>}
      {strong&&<div className="card stat-card" style={{background:"#041a0e",borderColor:"#166534"}}><div style={{fontSize:10,color:"#22c55e",fontWeight:700,fontFamily:"var(--m)",marginBottom:4}}>STRONGEST</div><div style={{fontSize:20,fontWeight:900,color:"#a7f3d0"}}>{CL[strong[0]]} <span style={{fontFamily:"var(--m)",fontSize:13}}>{strong[1]}</span></div></div>}
    </div>
    <div style={{display:"flex",gap:4,borderBottom:"1px solid var(--border)",flexWrap:"wrap"}} role="tablist">{VIEWS.map(([k,l])=><button key={k} role="tab" aria-selected={view===k} onClick={()=>setView(k)} style={{padding:"9px 15px",background:"transparent",border:"none",borderBottom:view===k?"2px solid #818cf8":"2px solid transparent",color:view===k?"#a5b4fc":"var(--t3)",fontWeight:view===k?800:600,fontSize:12.5,cursor:"pointer",marginBottom:-1,whiteSpace:"nowrap"}}>{l}</button>)}</div>
    {view==="overview"&&<React.Fragment>
      {weak&&<div className="card" style={{padding:20,background:"linear-gradient(150deg,#1c1206,#161b26)",borderColor:"#5c4a12"}}>
        <div className="mono" style={{fontSize:10,fontWeight:800,color:"#fbbf24",letterSpacing:1,marginBottom:14}}>◎ COACH THIS WEEK</div>
        <div style={{display:"grid",gridTemplateColumns:"1.1fr 1.2fr 1fr",gap:18,alignItems:"center"}}>
          <div><div className="stat-label">Weakest area</div><div style={{fontSize:24,fontWeight:900,color:"#fca5a5",marginTop:4}}>{CL[weak[0]]}</div><div className="mono" style={{fontSize:11,color:"#f59e0b",marginTop:2}}>avg {weak[1]}{sorted[1]?` · ${(weak[1]-sorted[1][1]).toFixed(1)} vs next`:""}</div></div>
          <div style={{borderLeft:"1px solid #3a3320",paddingLeft:18}}><div className="stat-label">Who needs it most</div><div style={{display:"flex",flexDirection:"column",gap:5,marginTop:6}}>{whoNeeds.length?whoNeeds.map(w=><span key={w.rep} onClick={()=>goTo("rep",w.rep)} style={{fontSize:12,color:"var(--t1)",cursor:"pointer"}}><b style={{color:w.v<6?"#ef4444":"#f59e0b"}}>{w.rep}</b> · {CL[weak[0]]} {w.v}</span>):<span style={{fontSize:12,color:"var(--t4)"}}>—</span>}</div></div>
          <div style={{borderLeft:"1px solid #3a3320",paddingLeft:18}}><div className="stat-label">Fix it with</div><div style={{fontSize:13,fontWeight:800,color:"#c7d2fe",marginTop:6,lineHeight:1.4}}>{CL[weak[0]]} playbook</div><button className="btn btn-sm" style={{fontSize:11,marginTop:8}} onClick={()=>goTo("resources")}>Assign resource →</button></div>
        </div>
      </div>}
      {repRows.length>0&&<div className="card" style={{padding:20}}><div className="section-head">Category Averages · by rep</div><div style={{overflowX:"auto"}}><div style={{display:"grid",gridTemplateColumns:`88px repeat(${CATS.length},1fr)`,gap:5,alignItems:"center",minWidth:440}}><span></span>{CATS.map(c=><span key={c} className="mono" style={{fontSize:9,color:"var(--t3)",textAlign:"center"}}>{(CL[c]||c).slice(0,5)}</span>)}{repRows.map(r=>[<span key={r.rep+"l"} style={{fontSize:11,color:"var(--t2)",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.rep}</span>,...CATS.map(c=><span key={r.rep+c} style={{borderRadius:6,textAlign:"center",padding:"8px 0",fontFamily:"var(--m)",fontWeight:800,fontSize:13,background:heatBg(r.cats[c]),color:heatFg(r.cats[c])}}>{r.cats[c]||"·"}</span>)])}</div></div>{weak&&<div className="mono" style={{fontSize:9,color:"#f59e0b",marginTop:10}}>↑ {CL[weak[0]]} is the team-wide weak column</div>}</div>}
    </React.Fragment>}
    {view==="notes"&&<div className="card" style={{padding:20}}><div className="section-head">Coaching Notes</div><div style={{fontSize:11,color:"var(--t3)",marginTop:-8,marginBottom:14}}>Each note links to its call.</div>{notes.length?notes.slice(0,40).map(c=><CoachingCard key={c.id} c={c}/>):<div style={{fontSize:12,color:"var(--t4)"}}>No coaching notes in this window.</div>}</div>}
    {view==="improvements"&&<div className="card" style={{padding:20}}><div className="section-head">Recurring Improvements</div><div style={{fontSize:11,color:"var(--t3)",marginTop:-8,marginBottom:14}}>Ranked by frequency, with which reps show each theme.</div>{topImps.length?<div style={{display:"flex",flexDirection:"column",gap:9}}>{topImps.map(([imp,ct,rs],i)=><div key={i} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 15px",background:"var(--bg)",borderRadius:11,border:"1px solid var(--border)"}}><span className="slab" style={{fontSize:19,color:ct>=8?"#ef4444":ct>=4?"#f59e0b":"#fbbf24",width:40,textAlign:"center"}}>{ct}×</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:"var(--t1)",fontWeight:600}}>{imp}</div><div className="mono" style={{fontSize:10,color:"var(--t4)"}}>{rs.slice(0,4).join(", ")}{rs.length>4?" +"+(rs.length-4):""}</div></div></div>)}</div>:<div style={{fontSize:12,color:"var(--t4)"}}>No recurring improvements in this window.</div>}</div>}
  </div>}

// Each report mode has a default window that MAKES SENSE for it.
// Trends needs many days to draw a line; a daily digest needs exactly one.
// The date filter is an OPTIONAL override on top of the default.
const MODE_DEFAULTS={
  digest:   {days:7,  preset:"",         label:"Last 7 days"},
  daily:    {days:0,  preset:"today",    label:"Today"},
  cards:    {days:30, preset:"",         label:"Last 30 days"},
  trends:   {days:30, preset:"",         label:"Last 30 days"},
  scorecards:{days:30,preset:"",         label:"Last 30 days"},
};

function ExportPage(){
  const[mode,setModeRaw]=useState("digest");
  const[days,setDays]=useState(7);
  const[preset,setPreset]=useState("");      // '', 'today', 'yesterday'
  const[from,setFrom]=useState("");          // custom range
  const[to,setTo]=useState("");
  const[touched,setTouched]=useState(false); // has the user picked a filter themselves?
  // Switching mode restores that mode's default window (unless the user has set one).
  function setMode(m){
    setModeRaw(m);
    const d=MODE_DEFAULTS[m]||MODE_DEFAULTS.digest;
    setDays(d.days||30); setPreset(d.preset); setFrom(""); setTo(""); setTouched(false);
  }
  const[rep,setRep]=useState("");
  const{data:reps}=useApi("/reps");
  const[report,setReport]=useState(null);
  const[loading,setLoading]=useState(false);
  const[copied,setCopied]=useState(false);
  const[copiedId,setCopiedId]=useState(null);
  function copyLink(c){
    const url=c.link||`${location.origin}/#/calls/${c.id}`;
    navigator.clipboard?.writeText(url).then(()=>{setCopiedId(c.id);setTimeout(()=>setCopiedId(null),1600);},()=>alert("Copy failed."));
  }
  function copySlack(){
    const t=report?.sam_digest_slack||"";
    if(!t){alert("No digest to copy yet.");return;}
    navigator.clipboard?.writeText(t).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1800);},()=>alert("Copy failed — select and copy manually."));
  }
  // Precedence: custom range > named preset > rolling N days
  function buildQS(){
    let qs;
    if(from||to) qs=`?${from?`from=${from}`:""}${from&&to?"&":""}${to?`to=${to}`:""}`;
    else if(preset) qs=`?preset=${preset}`;
    else qs=`?days=${days}`;
    return qs+(rep?`&rep=${encodeURIComponent(rep)}`:"");
  }
  async function load(){setLoading(true);const r=await fetch(`${API}/report${buildQS()}`).then(r=>r.json()).catch(()=>null);setReport(r);setLoading(false);}
  React.useEffect(()=>{load()},[days,preset,from,to,rep]);
  const windowLabel=(from||to)?`${from||"…"} → ${to||"…"}`:preset==="today"?"Today (ET)":preset==="yesterday"?"Yesterday (ET)":`Last ${days} days`;
  const arrow=d=>d==null?"":d>0?`▲ +${d}`:d<0?`▼ ${d}`:"– 0";
  const aClr=d=>d==null?"var(--t3)":d>0?"#22c55e":d<0?"#ef4444":"var(--t3)";
  const maxT=Math.max(1,...((report?.trend)||[]).map(t=>Number(t.avg_adj)||0));
  const failed=report&&report.error;
  return<div className="flex-col gap-20">
    {failed&&<div className="card" style={{padding:16,borderColor:"#7f1d1d",background:"#1a0a0a"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#f87171"}}>Report failed to load</div>
      <div style={{fontSize:12,color:"var(--t2)",marginTop:4}}>{String(report.error).slice(0,200)}</div>
    </div>}
    <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:12}}>
      <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Reports <span style={{fontSize:12,fontWeight:600,color:"#818cf8",marginLeft:8}}>{windowLabel}{!touched&&<span style={{color:"var(--t4)"}}> (default)</span>}</span></h2><p style={{fontSize:12,color:"var(--t3)",marginTop:4}}>Per-rep report cards, weekly digest, and trends — print any view to PDF.</p></div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn" onClick={()=>{
          const rows=(report&&report.perRep)||[];
          if(!rows.length){alert("No report data to export yet.");return;}
          downloadCSV(rows.map(r=>({
            rep:r.rep_name,role:r.role,scored:r.scored,
            avg_adjusted:r.avg_adj,avg_raw:r.avg_raw,
            voicemails:r.voicemails,total_calls:r.total_calls,avg_talk_pct:r.avg_talk
          })),`qc-report-${days}d-${new Date().toISOString().slice(0,10)}.csv`);
        }}>⤓ Download CSV</button>
        <button className="btn btn-primary" onClick={()=>window.print()}>⎙ Print / Save PDF</button>
      </div>
    </div>
    <div className="no-print card" style={{padding:18,display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{display:"flex",gap:6}}>{[["digest","Weekly Digest"],["daily","Daily Digest"],["cards","Rep Cards"],["trends","Trends"],["scorecards","Scorecards"]].map(([id,l])=><button key={id} onClick={()=>setMode(id)} className="btn" style={{padding:"6px 14px",fontSize:12,background:mode===id?"#1e1b4b":"",borderColor:mode===id?"#4338ca":"",color:mode===id?"#c7d2fe":""}}>{l}</button>)}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        {[["today","Today"],["yesterday","Yesterday"]].map(([pv,l])=>{const on=preset===pv&&!from&&!to;
          return<button key={pv} onClick={()=>{setPreset(on?"":pv);setFrom("");setTo("");setTouched(true);}} className="btn" style={{padding:"6px 12px",fontSize:12,background:on?"#1e1b4b":"",borderColor:on?"#4338ca":"",color:on?"#c7d2fe":""}}>{l}</button>;})}
        {[[7,"7d"],[14,"14d"],[30,"30d"],[90,"90d"]].map(([d,l])=>{const on=days===d&&!preset&&!from&&!to;
          return<button key={d} onClick={()=>{setDays(d);setPreset("");setFrom("");setTo("");setTouched(true);}} className="btn" style={{padding:"6px 12px",fontSize:12,background:on?"#1e1b4b":"",borderColor:on?"#4338ca":"",color:on?"#c7d2fe":""}}>{l}</button>;})}
        <span style={{color:"#2a3040"}}>|</span>
        <input type="date" value={from} onChange={e=>{setFrom(e.target.value);setPreset("");setTouched(true);}} title="From" style={{padding:"5px 8px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}/>
        <span style={{color:"var(--t3)",fontSize:12}}>→</span>
        <input type="date" value={to} onChange={e=>{setTo(e.target.value);setPreset("");setTouched(true);}} title="To" style={{padding:"5px 8px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}/>
        {touched&&<button className="btn" onClick={()=>setMode(mode)} title="Back to this report's default window" style={{padding:"5px 10px",fontSize:11}}>↺ Default</button>}
      </div>
      <select value={rep} onChange={e=>setRep(e.target.value)} style={{padding:"7px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:12}}><option value="">All reps</option>{(reps||[]).map(r=><option key={r.id} value={r.name}>{r.name}</option>)}</select>
    </div>
    {loading&&<div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>Building report…</div>}
    {report&&<div className="report-sheet flex-col gap-20">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingBottom:14,borderBottom:"2px solid #2a3140"}}><div><div style={{fontSize:20,fontWeight:900,color:"var(--t1)"}}>BNB Turnkey — QC Report</div><div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>The Rise Collective · {windowLabel}{report.rep?` · ${report.rep}`:""} · generated {report.generated?new Date(report.generated).toLocaleDateString():"—"}</div></div></div>

      {(mode==="digest"||mode==="daily")&&<div className="flex-col gap-20">
        {mode==="daily"&&report.sam_digest&&(()=>{
          const D=report.sam_digest;
          const CallCard=({c,kind})=>{
            if(!c)return<div className="card" style={{padding:16,marginBottom:14,opacity:.6}}><div style={{fontSize:11,fontWeight:800,letterSpacing:.5,textTransform:"uppercase",color:kind==="best"?"#fbbf24":"#fb7185"}}>{kind==="best"?"🏆 Best call":"💪 Toughest call"}</div><div style={{fontSize:12,color:"var(--t4)",marginTop:6}}>No calls in this window.</div></div>;
            const gm=c.golden&&c.golden[0]; const tm=c.tough&&c.tough[0];
            return<div className="card" style={{padding:16,marginBottom:14,borderColor:kind==="best"?"#3f3610":"#3f1622"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:800,letterSpacing:.5,textTransform:"uppercase",color:kind==="best"?"#fbbf24":"#fb7185"}}>{kind==="best"?"🏆 Best call":"💪 Toughest call"}</span>
                <span style={{fontSize:16,fontWeight:900,fontFamily:"var(--m)",color:sClr(c.score)}}>{c.score??"—"}</span>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>{c.rep_name} → {c.client_name||"?"}{kind==="toughest"&&c.tough_count>0&&<span style={{fontSize:10,color:"#fb7185",marginLeft:6}}>{c.tough_count} tough</span>}</div>
              {kind==="best"&&gm&&<div style={{fontSize:12,color:"var(--t2)",fontStyle:"italic",lineHeight:1.55,marginTop:8,borderLeft:"3px solid #4338ca",paddingLeft:10}}>"{gm.quote}"</div>}
              {kind==="toughest"&&tm&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:1.55,marginTop:8,borderLeft:"3px solid #9f1239",paddingLeft:10}}>{tm.why_it_was_tough&&<div><b style={{color:"#fb7185"}}>Tough: </b>{tm.why_it_was_tough}</div>}{tm.what_to_do_instead&&<div style={{marginTop:2}}><b style={{color:"#34d399"}}>Fix: </b>{tm.what_to_do_instead}</div>}</div>}
              {kind==="toughest"&&!tm&&c.why_tough_fallback&&<div style={{fontSize:12,color:"var(--t2)",lineHeight:1.55,marginTop:8,borderLeft:"3px solid #9f1239",paddingLeft:10}}><b style={{color:"#fb7185"}}>Why it's tough: </b>{c.why_tough_fallback}</div>}
              <div style={{display:"flex",gap:6,marginTop:10}}>
                <button className="btn no-print" onClick={()=>goTo("calls",c.id)} style={{fontSize:10,padding:"3px 9px"}}>Read call →</button>
                <button className="btn no-print" onClick={()=>copyLink(c)} style={{fontSize:10,padding:"3px 9px",color:copiedId===c.id?"#34d399":"",borderColor:copiedId===c.id?"#14532d":""}}>{copiedId===c.id?"✓ Copied":"⧉ Copy link"}</button>
              </div>
            </div>;
          };
          return<div className="card" style={{padding:22,borderColor:"#312e81"}}>
            <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
              <div className="section-head" style={{marginBottom:0,color:"#c7d2fe"}}>📋 Daily Digest for Sam</div>
              <button className="btn" onClick={copySlack} style={{fontSize:12,padding:"6px 12px",background:copied?"#0f2a1a":"",borderColor:copied?"#14532d":"",color:copied?"#34d399":""}}>{copied?"✓ Copied":"⧉ Copy Slack block"}</button>
            </div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:18}}>Setters and closers — best and toughest call for {windowLabel.toLowerCase()}. Toughest blends a low score with tough-moment load.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
              <div><div style={{fontSize:12,fontWeight:800,color:"#818cf8",marginBottom:12}}>🎧 Setters <span style={{color:"var(--t4)",fontWeight:600}}>({D.setters.count})</span></div><CallCard c={D.setters.best} kind="best"/><CallCard c={D.setters.toughest} kind="toughest"/></div>
              <div><div style={{fontSize:12,fontWeight:800,color:"#60a5fa",marginBottom:12}}>📞 Closers <span style={{color:"var(--t4)",fontWeight:600}}>({D.closers.count})</span></div><CallCard c={D.closers.best} kind="best"/><CallCard c={D.closers.toughest} kind="toughest"/></div>
            </div>
          </div>;
        })()}
        <div className="grid grid-stats">
          <div className="card stat-card"><div className="stat-label">Team Avg</div><div className="stat-value" style={{color:sClr(report.team?.avg_adj)}}>{report.team?.avg_adj??"—"}</div><div className="stat-sub">adjusted /10</div></div>
          <div className="card stat-card"><div className="stat-label">Scored</div><div className="stat-value">{report.team?.scored||0}</div><div className="stat-sub">calls</div></div>
          <div className="card stat-card"><div className="stat-label">Voicemails</div><div className="stat-value" style={{color:"var(--t3)"}}>{report.team?.voicemails||0}</div><div className="stat-sub">skipped</div></div>
          <div className="card stat-card"><div className="stat-label">Reps</div><div className="stat-value">{report.reps?.length||0}</div><div className="stat-sub">active</div></div>
        </div>

        {/* Team weak spots — the coaching focus, weakest category first */}
        {report.team_categories?.length>0&&<div className="card" style={{padding:20}}>
          <div className="section-head" style={{marginBottom:6}}>Team Category Averages</div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:12}}>Weakest first — this is where coaching moves the needle most.</div>
          {report.team_categories.map((c,i)=><div key={c.category} style={{marginBottom:9}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
              <span style={{color:"var(--t2)"}}>{CL[c.category]||c.category}{i===0&&<span style={{color:"#f59e0b",fontSize:10,marginLeft:6}}>← focus area</span>}</span>
              <span style={{fontFamily:"var(--m)",fontWeight:700,color:sClr(c.avg)}}>{c.avg}</span></div>
            <div style={{height:6,background:"var(--bg)",borderRadius:3,overflow:"hidden"}}><div style={{width:`${c.avg*10}%`,height:"100%",background:sClr(c.avg)}}/></div>
          </div>)}
        </div>}

        {/* Best & worst call of the period */}
        <div className="grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {report.best_call&&<div className="card" style={{padding:18,borderColor:"#166534"}}>
            <div className="section-head" style={{color:"#4ade80",marginBottom:8}}>★ Best call</div>
            <div onClick={()=>goTo("calls",report.best_call.id)} style={{cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:22,fontWeight:900,color:sClr(report.best_call.overall_score_adj),fontFamily:"var(--m)"}}>{report.best_call.overall_score_adj}</span>
                <span style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{report.best_call.rep_name} → {report.best_call.client_name}</span>
              </div>
              <div style={{fontSize:11,color:"var(--t3)",lineHeight:1.6}}>{(report.best_call.quick_summary||"").slice(0,150)}…</div>
              <div style={{fontSize:10,color:"#4ade80",marginTop:6}}>Open call →</div>
            </div>
          </div>}
          {report.worst_call&&<div className="card" style={{padding:18,borderColor:"#7f1d1d"}}>
            <div className="section-head" style={{color:"#f87171",marginBottom:8}}>⚠ Needs review</div>
            <div onClick={()=>goTo("calls",report.worst_call.id)} style={{cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span style={{fontSize:22,fontWeight:900,color:sClr(report.worst_call.overall_score_adj),fontFamily:"var(--m)"}}>{report.worst_call.overall_score_adj}</span>
                <span style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{report.worst_call.rep_name} → {report.worst_call.client_name}</span>
              </div>
              <div style={{fontSize:11,color:"var(--t3)",lineHeight:1.6}}>{(report.worst_call.quick_summary||"").slice(0,150)}…</div>
              <div style={{fontSize:10,color:"#f87171",marginTop:6}}>Open call →</div>
            </div>
          </div>}
        </div>

        <div className="card" style={{padding:20}}><div className="section-head">Rep Leaderboard</div>
          <div style={{fontSize:11,color:"var(--t3)",marginTop:-8,marginBottom:10}}>Click a rep to open their full page.</div>
          {(report.reps||[]).map(r=><div key={r.rep_name} onClick={()=>goTo("rep",r.rep_name)} style={{display:"flex",alignItems:"center",gap:14,padding:"10px 8px",margin:"0 -8px",borderRadius:8,borderBottom:"1px solid #2a3140",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#131c30"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{width:32,height:32,borderRadius:9,background:RC[r.rep_name],display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#fff"}}>{r.rep_name?.[0]}</div>

              {r.top_improvements?.[0]&&<div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>Focus: {r.top_improvements[0].text?.slice(0,70)}…</div>}</div>
            <span style={{fontSize:11,fontWeight:700,color:aClr(r.delta),fontFamily:"var(--m)"}}>{arrow(r.delta)}</span>
            <span style={{fontSize:18,fontWeight:800,color:sClr(r.avg_adj),fontFamily:"var(--m)",width:42,textAlign:"right"}}>{r.avg_adj??"—"}</span>
          </div>)}
        </div>

        {/* Non-sales breakdown */}
        {report.non_sales?.length>0&&<div className="card" style={{padding:20}}>
          <div className="section-head" style={{marginBottom:10}}>Non-Sales Calls (this period)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {report.non_sales.map(n=><div key={n.status} style={{background:"var(--bg)",border:"1px solid #2a3140",borderRadius:8,padding:"8px 14px"}}>
              <div style={{fontSize:18,fontWeight:800,color:"var(--t2)",fontFamily:"var(--m)"}}>{n.n}</div>
              <div style={{fontSize:10,color:"var(--t3)"}}>{RECORD_LABELS[n.status]||n.status.replace("SKIP_","")}</div>
            </div>)}
          </div>
        </div>}
      </div>}

      {mode==="scorecards"&&<ScorecardPicker days={days} preset={preset} from={from} to={to}/>}

      {mode==="cards"&&<div style={{display:"flex",flexDirection:"column",gap:24}}>{(report.reps||[]).map(r=><div key={r.rep_name} className="card rep-card" style={{padding:28}}>
        <div onClick={()=>goTo("rep",r.rep_name)} title={`Open ${r.rep_name}`} style={{display:"flex",alignItems:"center",gap:16,marginBottom:24,cursor:"pointer"}}>
          <div style={{width:48,height:48,borderRadius:13,background:RC[r.rep_name],display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,fontWeight:800,color:"#fff",flexShrink:0}}>{r.rep_name?.[0]}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:17,fontWeight:800,color:"var(--t1)"}}>{r.rep_name}</div><div style={{fontSize:11,color:"var(--t3)",marginTop:3}}>{r.role} · {r.scored} calls scored · {r.voicemails} voicemails</div></div>
          <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:30,fontWeight:900,color:sClr(r.avg_adj),fontFamily:"var(--m)",lineHeight:1}}>{r.avg_adj??"—"}</div><div style={{fontSize:10,color:aClr(r.delta),fontWeight:700,marginTop:4}}>{arrow(r.delta)} vs prev</div></div>
        </div>

        {Object.keys(r.categories||{}).length>0&&<div style={{paddingTop:20,borderTop:"1px solid #1e2635"}}>
          <div style={{fontSize:10,color:"#55606f",fontWeight:700,marginBottom:14,letterSpacing:.5}}>BY CATEGORY</div>

}

function RepForm({editing,prefill,onClose,onSaved}){
  const init=editing||prefill||{};
  const[name,setName]=useState(init.name||"");
  const[role,setRole]=useState(init.role||"Closer");
  const[team,setTeam]=useState(init.team||"");
  const[srcTag,setSrcTag]=useState(init.src_tag||"");
  const[userId,setUserId]=useState(init.aloware_user_id||"");
  const[color,setColor]=useState(init.color||"#6366f1");
  const[err,setErr]=useState("");const[busy,setBusy]=useState(false);
  const[webhookUrl,setWebhookUrl]=useState("");
  const[copied,setCopied]=useState(false);

  // When adding a closer (not editing), auto-suggest the next free src_tag
  useEffect(()=>{
    if(!editing&&role==="Closer"&&!srcTag){
      fetch(API+"/reps/next-src-tag?role=Closer").then(r=>r.json()).then(d=>{if(d.src_tag)setSrcTag(d.src_tag);}).catch(()=>{});
    }
  // eslint-disable-next-line
  },[role,editing]);

  async function save(){
    if(!name.trim()){setErr("Name is required.");return;}
    setBusy(true);setErr("");

    else body.aloware_user_id=userId;
    try{
      const r=editing?await patchApi(`/reps/${editing.id}`,body):await postApi("/reps",body);
      if(r.ok){ if(r.webhook_url){setWebhookUrl(r.webhook_url);} else {onSaved();} }

    setBusy(false);

  const inp={width:"100%",padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13,marginTop:4};

    <div className="card" style={{padding:28,maxWidth:560,width:"100%"}} onClick={e=>e.stopPropagation()}>

      <p style={{fontSize:13,color:"var(--t2)",lineHeight:1.7,marginTop:10}}>One more step to start scoring their calls: create a Fathom webhook pointing to this URL (replace <code>&lt;WEBHOOK_SECRET_KEY&gt;</code> with your webhook key from Render):</p>
      <div style={{display:"flex",gap:8,alignItems:"stretch",marginTop:6}}>
        <div style={{flex:1,background:"#0a0e18",border:"1px solid #2a3140",borderRadius:8,padding:12,fontFamily:"var(--m)",fontSize:12,color:"#7dd3fc",wordBreak:"break-all"}}>{webhookUrl}</div>
        <button className="btn" onClick={()=>{navigator.clipboard?.writeText(webhookUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});}} style={{flexShrink:0,whiteSpace:"nowrap"}}>{copied?"✓ Copied":"⧉ Copy"}</button>
      </div>
      <div style={{fontSize:12,color:"var(--t3)",marginTop:14,lineHeight:1.8}}>
        <div style={{fontWeight:700,color:"var(--t2)",marginBottom:4}}>Checklist:</div>
        ☑ Roster row created<br/>
        ☐ Fathom webhook added (paste URL above)<br/>
        ☐ First test call scored
      </div>
      <p style={{fontSize:11,color:"var(--t3)",marginTop:12}}>Until the webhook is added, their calls will safely park in Non-Sales (not lost). Once it's live, they'll score automatically.</p>
      <button className="btn btn-primary" onClick={onSaved} style={{marginTop:18,width:"100%"}}>Done</button>
    </div>
  </div>;

  const isCloser=role==="Closer";
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"40px 20px"}} onClick={onClose}>
    <div className="card" style={{padding:28,maxWidth:560,width:"100%"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <h2 style={{fontSize:20,fontWeight:900,margin:0}}>{editing?"Edit Rep":"Add Rep"}</h2>
        <span onClick={onClose} style={{fontSize:20,color:"var(--t3)",cursor:"pointer"}}>✕</span>
      </div>
      {prefill&&prefill._fromUnrostered&&<div style={{fontSize:12,color:"#f59e0b",marginBottom:8}}>Onboarding from the unrostered queue — details pre-filled.</div>}

      <label style={lbl}>NAME *</label>
      <input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Chris Johnson"/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><label style={lbl}>ROLE</label>
          <select style={inp} value={role} onChange={e=>setRole(e.target.value)} disabled={!!editing}>
            <option>Closer</option><option>Setter</option><option>Both</option>
          </select></div>
        <div><label style={lbl}>COLOR</label>
          <input type="color" style={{...inp,height:38,padding:4}} value={color} onChange={e=>setColor(e.target.value)}/></div>
      </div>

      <label style={lbl}>TEAM</label>
      <input style={inp} value={team} onChange={e=>setTeam(e.target.value)} placeholder={isCloser?"Turnkey - Closers":"Turnkey - Setters"}/>

      {isCloser?<>
        <label style={lbl}>SRC TAG (unique — maps to a Fathom webhook)</label>
        <input style={inp} value={srcTag} onChange={e=>setSrcTag(e.target.value)} placeholder="fathom-closers-3"/>
        <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>Auto-suggested next free tag. You'll create a Fathom webhook with this after saving.</div>
      </>:<>
        <label style={lbl}>ALOWARE USER ID *</label>
        <input style={inp} value={userId} onChange={e=>setUserId(e.target.value)} placeholder="e.g. 112769"/>

        <button className="btn" onClick={onClose}>Cancel</button>
      </div>
    </div>
  </div>;
}

  const teamCat={};(report?.team_categories||[]).forEach(c=>{teamCat[c.category]=c.avg;});
  const mkPts=(arr,W,H,pad,key)=>{const a=(arr||[]).map(x=>Number(key?x[key]:x)).filter(v=>!isNaN(v));if(a.length<2)return null;const mn=Math.min(...a),mx=Math.max(...a),rng=(mx-mn)||1;return a.map((v,i)=>((i/(a.length-1))*W).toFixed(1)+","+(H-((v-mn)/rng)*(H-pad*2)-pad).toFixed(1)).join(" ");};
  return<div className="flex-col gap-16">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
      <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>My Progress</h2><div style={{fontSize:13,color:"var(--t3)",marginTop:2}}>Where you shine and what to sharpen.</div></div>

      const trendVals=data.trend.map(t=>t.avg_score);
      const delta=trendVals.length>1?Math.round((trendVals[trendVals.length-1]-trendVals[0])*10)/10:null;
      const railSpark=mkPts(data.trend,260,44,4,"avg_score");
      const lowCat=[...data.categories].sort((a,b)=>a.avg-b.avg)[0];
      return<div style={{display:"grid",gridTemplateColumns:"320px minmax(0,1fr)",gap:16,alignItems:"stretch"}}>
      <aside className="cd-rail" style={{alignSelf:"stretch"}}>
        <div className="card" style={{padding:18,textAlign:"center",background:"linear-gradient(160deg,#1c2333,#161b26)",borderColor:"#3a4256"}}>
          <div className="stat-label" style={{justifyContent:"center"}}>Your avg score</div>

function CalibrationPage(){
  const{data}=useApi("/calibration");
  const{data:dw}=useApi("/deduction-weights");
  if(!data)return<Skel/>;
  const ovr=data.overrides||[];
  const avg=data.avg_delta;
  // Per-rep and per-role rollups of the gap
  const byRole={};
  ovr.forEach(o=>{if(!isFinite(o.delta))return;const k=o.role||"?";(byRole[k]=byRole[k]||[]).push(o.delta);});
  const roleAvg=Object.entries(byRole).map(([role,ds])=>({role,n:ds.length,avg:Math.round(ds.reduce((a,b)=>a+b,0)/ds.length*10)/10}));

  return<div className="flex-col gap-20" style={{maxWidth:900}}>
    <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Calibration</h2>
      <div style={{fontSize:13,color:"var(--t3)",marginTop:2}}>How Sam's scores compare to the bot's. This is the data that tunes the rubric.</div></div>

    {ovr.length===0?<div className="card" style={{padding:40,textAlign:"center"}}>
      <div style={{fontSize:14,color:"var(--t2)"}}>No calibration scores yet.</div>
      <div style={{fontSize:12,color:"var(--t3)",marginTop:6}}>Open any scored call and use <b style={{color:"#a5b4fc"}}>Sam's Calibration Score</b> to add one. They'll show up here.</div>
    </div>:<>
      {/* Summary stats */}
      <div className="grid grid-stats">
        <div className="card stat-card"><div className="stat-label">Calibrated calls</div><div style={{fontSize:26,fontWeight:900,color:"#818cf8"}}>{data.count}</div></div>
        <div className="card stat-card"><div className="stat-label">Avg gap (Sam − bot)</div><div style={{fontSize:26,fontWeight:900,color:avg>0?"#34d399":avg<0?"#f87171":"var(--t2)"}}>{avg>0?"+":""}{avg}</div></div>
        <div className="card stat-card"><div className="stat-label">Agreement</div><div style={{fontSize:26,fontWeight:900,color:"var(--t2)"}}>{Math.abs(avg)<=1?"Close":Math.abs(avg)<=2?"Some drift":"Diverging"}</div></div>
      </div>

      {/* Interpretation hint */}
      <div className="card" style={{padding:16,background:avg>1?"#161200":avg<-1?"#1a0a0a":"#0d1420",borderColor:avg>1?"#92400e":avg<-1?"#991b1b":"#1e3a5f"}}>
        <div style={{fontSize:13,color:"var(--t2)",lineHeight:1.6}}>
          {Math.abs(avg)<=1&&<>The bot is scoring close to Sam on average — the rubric is well calibrated. No changes needed yet.</>}
          {avg>1&&<>Sam scores <b>{avg} higher</b> than the bot on average — the rubric or deductions may be <b>too harsh</b>. Check the Deduction Tuning page to soften where you consistently disagree.</>}
          {avg<-1&&<>Sam scores <b>{Math.abs(avg)} lower</b> than the bot on average — the bot may be <b>too generous</b>. The rubric could use tightening.</>}
        </div>
      </div>

      {/* Per-role gap */}
      {roleAvg.length>0&&<div className="card" style={{padding:18}}>
        <div className="section-head" style={{marginBottom:10}}>Gap by role</div>
        {roleAvg.map(r=><div key={r.role} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",fontSize:13}}>
          <span style={{color:"var(--t2)"}}>{r.role} <span style={{color:"var(--t3)",fontSize:11}}>({r.n} call{r.n!==1?"s":""})</span></span>
          <span style={{fontFamily:"var(--m)",fontWeight:700,color:r.avg>0?"#34d399":r.avg<0?"#f87171":"var(--t2)"}}>{r.avg>0?"+":""}{r.avg}</span>
        </div>)}
      </div>}

      {/* Per-call list */}
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid var(--card)",fontSize:12,fontWeight:700,color:"var(--t2)",letterSpacing:.5}}>EVERY CALIBRATION ({ovr.length})</div>
        {ovr.map((o,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 18px",borderBottom:"1px solid var(--bg)"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{o.rep_name||"?"} → {o.client_name||"?"} <span style={{fontSize:11,fontWeight:400,color:"var(--t3)"}}>· {o.role}</span></div>
            {o.reason&&<div style={{fontSize:11,color:"var(--t3)",fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{o.reason}"</div>}
          </div>
          <div style={{textAlign:"right",flexShrink:0,fontFamily:"var(--m)",fontSize:12}}>
            <span style={{color:"#818cf8",fontWeight:800}}>{o.override_score}</span>
            <span style={{color:"var(--t3)"}}> vs </span>
            <span style={{color:"var(--t2)"}}>{o.original_score}</span>
            {isFinite(o.delta)&&o.delta!==0&&<span style={{marginLeft:8,color:o.delta>0?"#34d399":"#f87171"}}>{o.delta>0?"+":""}{o.delta}</span>}
          </div>
        </div>)}
      </div>
    </>}

    {/* Deduction weights — the tuning lever */}
    {dw&&dw.weights&&<div className="card" style={{padding:18}}>
      <div className="section-head" style={{marginBottom:6}}>Deduction Weights</div>
      <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>How many points each non-negotiable subtracts. If calibration shows the bot is too harsh, lower these. {dw.note}</div>
      {dw.weights.map(w=><div key={w.rule} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderTop:"1px solid var(--card)"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--t2)"}}>{w.label} <span style={{fontSize:10,color:w.severity==="critical"?"#f87171":"#fbbf24"}}>· {w.severity}</span></div>
          <div style={{fontSize:10,color:"var(--t4)",fontFamily:"var(--m)"}}>{w.env}</div>
        </div>
        <div style={{fontFamily:"var(--m)",fontWeight:800,fontSize:18,color:"#f87171"}}>−{w.points}</div>
      </div>)}
    </div>}
  </div>;
}

function StitchPage(){
  const[data,setData]=useState(null);
  const[scanning,setScanning]=useState(false);
  const[busy,setBusy]=useState(null);
  const[done,setDone]=useState([]);
  const[mA,setMA]=useState("");
  const[mB,setMB]=useState("");
  const[mBusy,setMBusy]=useState(false);
  const[mMsg,setMMsg]=useState(null);

  async function scan(){
    setScanning(true);setData(null);
    try{const r=await fetch(API+"/stitch/detect").then(r=>r.json());setData(r);}
    catch(e){alert("Scan failed.");}
    setScanning(false);
  }
  async function merge(p){
    setBusy(p.first_id+"-"+p.second_id);
    try{
      const r=await postApi("/stitch/merge",{first_id:p.first_id,second_id:p.second_id,merged_by:"Sam"});
      if(r.ok){setDone(d=>[...d,p.first_id+"-"+p.second_id]);}
      else alert(r.error||"Merge failed.");
    }catch(e){alert("Merge failed.");}
    setBusy(null);
  }
  async function manualMerge(){
    const a=parseInt(mA,10),b=parseInt(mB,10);
    if(!a||!b||a===b){setMMsg({err:true,text:"Enter two different call IDs."});return;}
    setMBusy(true);setMMsg(null);
    try{
      const r=await postApi("/stitch/manual-merge",{id_a:a,id_b:b});
      if(r.ok){setMMsg({err:false,text:`Merged #${a} + #${b} into one call (survivor #${r.survivor}). It's re-scoring now.${r.warning?" "+r.warning:""}`});setMA("");setMB("");}
      else setMMsg({err:true,text:r.error||"Merge failed."});
    }catch(e){setMMsg({err:true,text:"Merge failed."});}
    setMBusy(false);
  }

  function Pair({p,auto}){
    const key=p.first_id+"-"+p.second_id;
    const isDone=done.includes(key);
    return<div className="card" style={{padding:16,opacity:isDone?.5:1,borderColor:auto?"#166534":"#92400e"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:14,fontWeight:700,color:"var(--t2)"}}>{p.rep_name} → {p.client_name}</div>
          <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>Call #{p.first_id} (scored {p.first_score}) + Call #{p.second_id} (scored {p.second_score}) · {p.gap_min} min apart</div>
          <div style={{fontSize:12,color:"var(--t2)",marginTop:6,fontStyle:"italic"}}>"{p.cue.reason}"</div>
          <div style={{fontSize:11,color:"var(--t4)",marginTop:4}}>
            {p.cue.call1_cut_off?"✓ call 1 cut off":"✗ call 1 cut off"} · {p.cue.call2_reconnects?"✓ call 2 reconnects":"✗ call 2 reconnects"} · confidence: {p.cue.confidence}
          </div>
        </div>
        <div style={{flexShrink:0}}>
          {isDone?<span style={{fontSize:12,color:"#34d399",fontWeight:700}}>✓ Merged</span>:
            <button className="btn btn-primary" onClick={()=>merge(p)} disabled={busy===key} style={{fontSize:12}}>{busy===key?"Merging…":"Merge into one"}</button>}
        </div>
      </div>
    </div>;
  }

  return<div className="flex-col gap-20" style={{maxWidth:860}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
      <div><h2 style={{fontSize:24,fontWeight:900,margin:0}}>Call Stitching</h2>
        <div style={{fontSize:13,color:"var(--t3)",marginTop:2}}>Finds cut-off calls that were redialed and merges them into one score.</div></div>
      <button className="btn btn-primary" onClick={scan} disabled={scanning}>{scanning?"Scanning…":"⟳ Scan for cut-off calls"}</button>
    </div>

    {/* Manual merge — escape hatch for pairs auto-detect misses */}
    <div className="card" style={{padding:16}}>
      <div className="section-head" style={{marginBottom:6}}>Manually merge two calls</div>
      <div style={{fontSize:12,color:"var(--t3)",marginBottom:10}}>Know two calls are really one cut-off conversation but the scan didn't catch them? Enter both call IDs (find them on each call's detail page). The earlier call becomes the survivor.</div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <input value={mA} onChange={e=>setMA(e.target.value)} placeholder="Call ID" style={{width:110,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13}}/>
        <span style={{color:"var(--t3)"}}>+</span>
        <input value={mB} onChange={e=>setMB(e.target.value)} placeholder="Call ID" style={{width:110,padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13}}/>
        <button className="btn btn-primary" onClick={manualMerge} disabled={mBusy} style={{fontSize:12}}>{mBusy?"Merging…":"Merge"}</button>
      </div>
      {mMsg&&<div style={{marginTop:10,fontSize:12,color:mMsg.err?"#f87171":"#34d399"}}>{mMsg.text}</div>}
    </div>

    {/* Honest status — no auto-stitch is running */}
    <div className="card" style={{padding:14,background:"#0d1420",borderColor:"#1e3a5f",fontSize:12,color:"var(--t2)",lineHeight:1.6}}>
      <b style={{color:"#7dd3fc"}}>Detection is manual.</b> Nothing is stitched automatically — the bot only looks when you click <b>Scan</b>, and only merges when you click <b>Merge</b>. There is no background job doing this on its own.
    </div>

    {!data&&!scanning&&<div className="card" style={{padding:40,textAlign:"center",color:"var(--t3)"}}>
      Click <b style={{color:"var(--t2)"}}>Scan</b> to look for calls that dropped and were redialed within 60 minutes. Same rep, same client, with the transcript showing a cut-off and a reconnect.
    </div>}

    <StitchLog/>

    {data&&<>
      {data.auto.length>0&&<div>
        <div style={{fontSize:12,fontWeight:700,color:"#4ade80",letterSpacing:.5,marginBottom:10}}>HIGH CONFIDENCE — CLEAR CUT-OFF PAIRS ({data.auto.length})</div>
        <div className="flex-col gap-12">{data.auto.map(p=><Pair key={p.first_id+"-"+p.second_id} p={p} auto/>)}</div>
      </div>}

      {data.suggested.length>0&&<div>
        <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",letterSpacing:.5,marginBottom:10,marginTop:8}}>WORTH A LOOK — POSSIBLE PAIRS ({data.suggested.length})</div>
        <div className="flex-col gap-12">{data.suggested.map(p=><Pair key={p.first_id+"-"+p.second_id} p={p}/>)}</div>
      </div>}

      {data.auto.length===0&&data.suggested.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"var(--t3)"}}>
        No cut-off pairs found. Checked {data.checked} candidate{data.checked!==1?"s":""}.
      </div>}
    </>}
  </div>;
}

function ScenarioCreator({onClose,onCreated}){
  const[f,setF]=useState({title:"",target_role:"Setter",difficulty_tier:3,persona_name:"",persona_bg:"",persona_style:"",situation:"",stated_interest:"",hidden_truth:"",real_objection:"",obj1:"",obj2:"",obj3:"",focus:""});
  const[busy,setBusy]=useState(false);const[err,setErr]=useState("");
  function up(k,v){setF(s=>({...s,[k]:v}))}
  async function save(){
    if(!f.title.trim()){setErr("Give it a title.");return;}
    setBusy(true);setErr("");
    const id=f.title.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40)+"-"+Date.now().toString().slice(-4);
    const body={
      id,title:f.title.trim(),type:"custom",target_role:f.target_role,difficulty_tier:Number(f.difficulty_tier),
      persona:{name:f.persona_name,background:f.persona_bg,communication_style:f.persona_style},
      situation:{summary:f.situation,stated_interest:f.stated_interest},
      hidden_truth:{summary:f.hidden_truth,real_objection:f.real_objection},
      layered_objections:[f.obj1,f.obj2,f.obj3].filter(x=>x.trim()),
      scoring_focus:{notes:f.focus},author:"Sam"
    };
    try{
      const r=await fetch(`${API}/practice/scenarios`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json());
      if(r.ok){onCreated&&onCreated();onClose();}else setErr(r.error||"Failed to save.");
    }catch(e){setErr("Failed to save.");}
    setBusy(false);
  }
  const inp={width:"100%",padding:"8px 12px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:7,color:"var(--t1)",fontSize:13,marginTop:4};
  const lbl={fontSize:10,color:"var(--t3)",fontWeight:700,letterSpacing:.5,marginTop:12,display:"block"};
  return<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"40px 20px"}} onClick={onClose}>
    <div className="card" style={{padding:28,maxWidth:640,width:"100%"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <h2 style={{fontSize:20,fontWeight:900,margin:0}}>Create a Scenario</h2>
        <span onClick={onClose} style={{fontSize:20,color:"var(--t3)",cursor:"pointer"}}>✕</span>
      </div>
      <p style={{fontSize:12,color:"var(--t3)",marginBottom:8}}>Build a custom practice scenario. The AI prospect will embody the persona and hidden truth you define, and reps get scored on the same rubric.</p>

      <label style={lbl}>SCENARIO TITLE *</label>
      <input style={inp} value={f.title} onChange={e=>up("title",e.target.value)} placeholder="e.g. The Skeptical Retiree"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><label style={lbl}>ROLE</label><select style={inp} value={f.target_role} onChange={e=>up("target_role",e.target.value)}><option>Setter</option><option>Closer</option><option>Both</option></select></div>
        <div><label style={lbl}>DIFFICULTY TIER (1-5)</label><select style={inp} value={f.difficulty_tier} onChange={e=>up("difficulty_tier",e.target.value)}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}</select></div>
      </div>

      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #2a3140"}}><b style={{fontSize:12,color:"var(--t2)"}}>The Prospect</b></div>
      <label style={lbl}>NAME</label><input style={inp} value={f.persona_name} onChange={e=>up("persona_name",e.target.value)} placeholder="e.g. Robert"/>
      <label style={lbl}>BACKGROUND</label><input style={inp} value={f.persona_bg} onChange={e=>up("persona_bg",e.target.value)} placeholder="Who they are, their situation"/>
      <label style={lbl}>COMMUNICATION STYLE</label><input style={inp} value={f.persona_style} onChange={e=>up("persona_style",e.target.value)} placeholder="e.g. Blunt, asks a lot of questions"/>

      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #2a3140"}}><b style={{fontSize:12,color:"var(--t2)"}}>The Situation</b></div>
      <label style={lbl}>WHAT'S HAPPENING</label><textarea style={{...inp,minHeight:50}} value={f.situation} onChange={e=>up("situation",e.target.value)} placeholder="The setup — where the call picks up"/>
      <label style={lbl}>STATED INTEREST (what they SAY)</label><input style={inp} value={f.stated_interest} onChange={e=>up("stated_interest",e.target.value)} placeholder="e.g. Seems interested but noncommittal"/>

      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #2a3140"}}><b style={{fontSize:12,color:"var(--t2)"}}>The Hidden Truth</b> <span style={{fontSize:10,color:"var(--t3)"}}>(what the rep must uncover)</span></div>
      <label style={lbl}>THE REAL TRUTH</label><textarea style={{...inp,minHeight:50}} value={f.hidden_truth} onChange={e=>up("hidden_truth",e.target.value)} placeholder="What's actually going on beneath the surface"/>
      <label style={lbl}>THE REAL OBJECTION</label><input style={inp} value={f.real_objection} onChange={e=>up("real_objection",e.target.value)} placeholder="The true barrier"/>

      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #2a3140"}}><b style={{fontSize:12,color:"var(--t2)"}}>Objections They'll Raise</b></div>
      <input style={inp} value={f.obj1} onChange={e=>up("obj1",e.target.value)} placeholder="Objection 1 (what they'll actually say)"/>
      <input style={{...inp,marginTop:8}} value={f.obj2} onChange={e=>up("obj2",e.target.value)} placeholder="Objection 2"/>
      <input style={{...inp,marginTop:8}} value={f.obj3} onChange={e=>up("obj3",e.target.value)} placeholder="Objection 3"/>

      <label style={lbl}>SCORING FOCUS / COACHING NOTES</label>
      <textarea style={{...inp,minHeight:50}} value={f.focus} onChange={e=>up("focus",e.target.value)} placeholder="What separates a good rep from a bad one here? What should they be rewarded/penalized for?"/>

      {err&&<div style={{color:"#ef4444",fontSize:12,marginTop:12}}>{err}</div>}
      <div style={{display:"flex",gap:10,marginTop:20}}>
        <button className="btn btn-primary" onClick={save} disabled={busy} style={{flex:1}}>{busy?"Saving…":"Create Scenario"}</button>
        <button className="btn" onClick={onClose}>Cancel</button>
      </div>
    </div>
  </div>
}
